<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>南昌大学 · MTI 上岸日志</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#f3efe6;--side:#efe9dd;--card:#fdfcf8;--green:#2e4a38;--green2:#27402f;--rust:#bf5130;--ink:#2d2a23;--mut:#938c7c;--line:#e4ddcd;--sh:0 1px 2px rgba(60,50,30,.05),0 8px 22px rgba(60,50,30,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC",-apple-system,"PingFang SC",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
.serif{font-family:"Noto Serif SC",serif}
.layout{display:flex;min-height:100vh}
.side{width:236px;flex:none;background:var(--side);border-right:1px solid var(--line);padding:26px 20px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{font-family:"Noto Serif SC",serif;font-weight:700;font-size:19px;letter-spacing:1px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.logo small{display:block;font-size:11px;font-style:italic;color:var(--mut);font-weight:500;letter-spacing:.5px;margin-top:5px;line-height:1.5}
nav{margin-top:18px;display:flex;flex-direction:column;gap:3px;flex:1}
.nav{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:11px;cursor:pointer;font-size:14px;color:var(--ink);transition:.15s}
.nav:hover{background:rgba(46,74,56,.07)}
.nav.on{background:var(--green);color:#f3efe6;box-shadow:0 6px 16px rgba(46,74,56,.25)}
.nav svg{width:17px;height:17px;flex:none;opacity:.85}
.count{margin-top:14px;padding-top:16px;border-top:1px solid var(--line)}
.count .lab{font-size:11px;color:var(--mut);letter-spacing:1px}
.count .d{font-family:"Noto Serif SC",serif;font-size:38px;font-weight:700;color:var(--rust);line-height:1}
.count .d small{font-size:13px;color:var(--mut);font-weight:400;margin-left:4px}
.count .ex{font-size:11px;color:var(--mut);margin-top:6px}
main{flex:1;padding:30px 40px 60px;max-width:1000px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.date{color:var(--rust);font-size:13px;font-weight:500;margin-bottom:8px}
h1{font-family:"Noto Serif SC",serif;font-size:32px;font-weight:700;letter-spacing:1px}
.modes{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px}
.modes button{border:0;background:transparent;font-family:inherit;font-size:13px;color:var(--mut);padding:7px 15px;border-radius:8px;cursor:pointer}
.modes button.on{background:var(--ink);color:var(--paper)}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.gcard{background:var(--green);color:#eef2ec;border-radius:18px;padding:26px 28px;position:relative;overflow:hidden}
.gcard::after{content:"";position:absolute;right:-40px;top:-30px;width:180px;height:180px;border:1px solid rgba(255,255,255,.08);border-radius:50%}
.gcard .l{font-size:13px;opacity:.75;letter-spacing:1px}
.gcard .big{font-family:"Noto Serif SC",serif;font-size:62px;font-weight:700;line-height:1.1;margin:6px 0}
.gcard .big small{font-size:22px;opacity:.7}
.gcard .sub{font-size:13px;opacity:.8;margin-bottom:14px}
.gbar{height:7px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden}
.gbar i{display:block;height:100%;background:#e6a23c;border-radius:99px;transition:width .5s}
.rcol{display:flex;flex-direction:column;gap:16px}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.wcard .l{font-size:13px;color:var(--mut)}
.wcard .l .pt{color:var(--rust)}
.wcard .n{font-family:"Noto Serif SC",serif;font-size:34px;font-weight:700;margin-top:4px}
.wcard .n small{font-size:14px;color:var(--mut);font-weight:400}
.cta{background:var(--rust);color:#fff;border:0;border-radius:16px;padding:20px 22px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;text-align:left;box-shadow:0 10px 24px rgba(191,81,48,.25);transition:.15s}
.cta:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(191,81,48,.3)}
.streak{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.sdot{width:46px;height:46px;border-radius:50%;background:#f6ece4;color:var(--rust);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif SC",serif;font-size:20px;font-weight:700;flex:none}
.streak .t{font-size:14px}.streak .t small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.streak .pg{flex:1;text-align:right}
.streak .pg .nm{font-size:13px;color:var(--mut)}
.minibar{height:5px;background:var(--line);border-radius:99px;margin-top:6px;overflow:hidden}.minibar i{display:block;height:100%;background:var(--green);border-radius:99px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;cursor:pointer;transition:.15s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.stat .n{font-family:"Noto Serif SC",serif;font-size:30px;font-weight:700}
.stat .l{font-size:13px;margin-top:4px}
.stat .s{font-size:11px;color:var(--mut);margin-top:7px;letter-spacing:.5px}
.secttl{font-family:"Noto Serif SC",serif;font-size:22px;font-weight:700;margin-bottom:4px}
.sectsub{color:var(--mut);font-size:13px;margin-bottom:18px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-size:13px;padding:6px 14px;border:1px solid var(--line);background:var(--card);border-radius:99px;cursor:pointer;color:var(--mut)}
.chip.on{background:var(--green);color:#eef2ec;border-color:var(--green)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(166px,1fr));gap:11px}
.fc{height:122px;perspective:1000px;cursor:pointer}
.fci{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.75,.25,1);transform-style:preserve-3d}
.fc.flip .fci{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12px}
.ffr{background:var(--card);border:1px solid var(--line);box-shadow:var(--sh)}
.ffr .tm{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700}
.ffr .h{position:absolute;bottom:9px;font-size:10px;color:var(--mut);opacity:.7}
.ffb{transform:rotateY(180deg);background:var(--green);color:#eef2ec}
.ffb .an{font-size:13px;line-height:1.5}
.gr{display:flex;gap:6px;position:absolute;bottom:9px;left:10px;right:10px}
.gr button{flex:1;border:0;font-family:inherit;font-size:11px;padding:5px;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.2);color:#fff}
.fc.done .ffr{opacity:.45}
.fc.done .ffr::before{content:"\2713";position:absolute;top:8px;right:10px;color:var(--green);font-weight:700;font-size:13px}
.row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 18px;margin-bottom:9px;cursor:pointer;box-shadow:var(--sh)}
.row .rt{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700}
.row .ra{max-height:0;overflow:hidden;transition:max-height .3s;color:var(--mut);font-size:13.5px;line-height:1.7}
.row.show .ra{max-height:240px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.subj{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:0 13px 13px 0;padding:15px 18px;margin-bottom:10px}
.subj .h{display:flex;justify-content:space-between;align-items:baseline}
.subj .nm{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700}
.subj .w{color:var(--rust);font-size:13px;letter-spacing:1px}
.subj .d{color:var(--mut);font-size:13px;margin-top:5px;line-height:1.6}
.src{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:10px}
.src .h{font-weight:700;font-size:14px;margin-bottom:6px}
.src .d{color:var(--mut);font-size:13px;line-height:1.7}
.src a{color:var(--green);text-decoration:none}
.warn{background:#faf3e8;border:1px solid #ecdcc0;border-radius:13px;padding:14px 18px;font-size:13px;color:#7a5a2a;line-height:1.7;margin-bottom:16px}
/* 抽背 overlay */
.ovl{position:fixed;inset:0;background:rgba(40,34,24,.55);display:none;align-items:center;justify-content:center;z-index:9;padding:20px}
.ovl.on{display:flex}
.quizbox{background:var(--paper);border-radius:22px;padding:26px;width:480px;max-width:100%;box-shadow:0 30px 70px rgba(0,0,0,.3)}
.quizbox .pg{font-size:13px;color:var(--mut);display:flex;justify-content:space-between;margin-bottom:14px}
.qcard{height:200px;perspective:1200px;cursor:pointer;margin-bottom:16px}
.qcard .tm{font-family:"Noto Serif SC",serif;font-size:26px;font-weight:700}
.qbtns{display:flex;gap:10px}
.qbtns button{flex:1;border:0;font-family:inherit;font-size:15px;padding:13px;border-radius:13px;cursor:pointer}
.qno{background:#f0e6dd;color:var(--rust)}.qyes{background:var(--green);color:#fff}
.qclose{position:absolute;top:18px;right:20px;cursor:pointer;color:#fff;font-size:24px}
.hidden{display:none}
@media(max-width:760px){.side{display:none}.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}main{padding:20px}}
.sb{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;margin-right:7px;font-weight:500;vertical-align:1px}
.fc{position:relative}
.fcb{position:absolute;top:7px;left:9px;z-index:3;font-size:9px;padding:1px 6px;border-radius:5px;font-weight:500;pointer-events:none}
.grm{display:flex;gap:8px;margin-top:11px}
.grm button{flex:0 0 auto;min-width:96px;border:0;font-family:inherit;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer}
.grm .yes{background:var(--green);color:#fff}.grm .no{background:#f0e6dd;color:var(--rust)}
</style>

，中国 2001 年加入。"], ["数字经济", "以数据为关键生产要素、数字技术为核心驱动的新型经济形态。"], ["普惠金融", "以可负担成本为社会各阶层尤其弱势群体提供平等金融服务的体系。"], ["货币政策三大工具", "法定存款准备金率、再贴现率、公开市场业务。"], ["联合国（UN）", "1945 年成立的最具普遍性的政府间组织，维护国际和平与安全。"], ["安理会五常", "中美俄英法，对实质性问题拥有否决权，负主要维和责任。"], ["和平共处五项原则", "1953 年中国提出（互相尊重主权领土完整、互不侵犯、互不干涉内政、平等互利、和平共处），中国外交基石。"], ["三权分立", "孟德斯鸠阐述的立法行政司法相互制衡原则，美国宪法典型体现。"], ["人民代表大会制度", "中国根本政治制度，国家权力属于人民，通过各级人大行使。"], ["一国两制", "邓小平为解决港澳台问题提出，统一国家内大陆主体社会主义、特区资本主义。"], ["G20", "主要发达国家和新兴经济体组成的国际经济合作主要论坛，全球经济治理重要平台。"], ["北约（NATO）", "1949 年成立的美国主导军事政治同盟，冷战产物，冷战后东扩引发紧张。"], ["多边主义", "通过国际制度和多国协商合作处理国际事务、反对单边霸权的理念。"], ["软实力", "约瑟夫·奈提出，通过文化价值观政策吸引力而非强制获得影响力的能力。"], ["信达雅", "严复《天演论》提出的翻译三原则——忠实、通顺、典雅，影响中国译论百余年。"], ["直译与意译", "直译保留原文形式字面，意译重在传达内容精神，相辅相成的基本方法。"], ["归化与异化", "韦努蒂提出，归化贴近目的语读者、异化保留源语异国情调，处理文化差异两大策略。"], ["功能对等（functional equivalence）", "奈达提出，译文读者反应应与原文读者反应基本一致，强调效果对等。"], ["目的论（Skopos Theory）", "弗米尔创立的德国功能派理论，翻译策略由译文目的决定。"], ["交替传译", "译员在讲话人停顿时口译，借助笔记，口译基本形式之一。"], ["同声传译", "译员几乎同步将讲话译为目标语，多用于国际会议，口译难度最高形式。"], ["CAT（计算机辅助翻译）", "借助翻译记忆库、术语库等软件辅助人工翻译，如 Trados。"], ["语料库", "按标准收集、可计算机检索的大规模真实语料集合，语言研究与翻译重要资源。"], ["音译", "按源语读音用目的语近似音节转写，如 sofa→沙发，常用于人名地名外来词。"], ["不可译性", "因语言文化差异致双关、文字游戏、文化专有项难以完整转换，翻译固有局限。"], ["乔姆斯基/转换生成语法", "认为人类有先天语言能力，语言由深层结构经转换生成表层结构。"], ["索绪尔", "现代语言学之父，区分语言/言语、能指/所指，奠定结构主义语言学基础。"], ["人工智能（AI）", "研究使机器模拟人类智能的科学技术，正引发新一轮科技与产业革命。"], ["大数据", "规模巨大、类型多样、处理快速的数据集合（4V 特征），数字经济关键要素。"], ["区块链", "去中心化、不可篡改、可追溯的分布式账本技术，比特币底层技术。"], ["量子计算", "利用量子叠加和纠缠实现并行计算，运算能力远超经典计算机，前沿战略科技。"], ["碳基/硅基", "碳基指以碳为基础的生命，硅基常指芯片/人工智能，喻人机关系。"], ["赤道", "到南北极距离相等的最大纬线圈，纬度 0°，划分南北半球的基准。"], ["本初子午线", "经度 0° 的经线，经过英国格林尼治天文台，划分东西经和时区的起算基准。"], ["板块构造学说", "岩石圈分六大板块、板块运动引发地震火山造山，解释海陆变迁。"], ["季风气候", "海陆热力差异致风向随季节反向，亚洲东南部最典型，影响中国农业降水。"], ["撒哈拉沙漠", "非洲北部、世界最大的热带沙漠，约 900 多万平方千米，极端干旱。"], ["亚马逊雨林", "南美亚马逊河流域世界最大热带雨林，\"地球之肺\"，生物多样性极丰富。"], ["世界三大宗教", "基督教、伊斯兰教、佛教，按形成时间与传播范围并称。"], ["形而上学", "亚里士多德所创、研究存在本身的哲学分支；马克思语境中指与辩证法对立的孤立静止观点。"], ["唯物主义与唯心主义", "哲学两大基本派别，前者主张物质第一性，后者主张意识第一性。"], ["辩证法", "关于事物普遍联系和永恒发展的学说，核心是矛盾对立统一规律，与形而上学相对。"], ["文艺复兴人文主义", "以人为中心、肯定人的价值尊严和现世幸福、反对神权禁欲的思想体系。"], ["儒家\"仁\"", "孔子思想核心，\"仁者爱人\"，强调忠恕克己复礼，传统伦理最高范畴。"], ["大陆法系与英美法系", "两大法系，前者以成文法典为主（源于罗马法），后者以判例法为主（源于英国普通法）。"], ["《罗马法》", "古罗马奴隶制国家法律总称，体系完备，近现代大陆法系民法的源头。"], ["《拿破仑法典》", "1804 年《法国民法典》，世界第一部资产阶级民法典，确立私有财产神圣等原则。"], ["宪法", "国家根本大法，规定根本制度和公民基本权利义务，最高法律效力。"], ["罪刑法定原则", "法无明文规定不为罪不处罚，现代刑法基本原则，保障人权。"], ["印象派", "19 世纪后期法国画派，户外写生捕捉光与色的瞬间印象，莫奈《日出·印象》。"], ["巴洛克艺术", "16 世纪末至 18 世纪欧洲，富丽繁复、动感强烈、追求戏剧效果。"], ["交响乐", "管弦乐队演奏的大型套曲（通常四乐章），海顿确立规范，贝多芬莫扎特推向巅峰。"], ["《蒙娜丽莎》", "达·芬奇油画杰作，神秘微笑与\"渐隐法\"著称，世界艺术史不朽名作。"], ["维纳斯", "罗马神话爱与美女神（希腊称阿芙洛狄忒），《断臂的维纳斯》是古希腊艺术典范。"], ["阿基米德", "阿基米德是古希腊伟大的数学家、力学家。他在诸多科学领域作出了突出贡献，在力学方面的成绩最为突出。他发现了浮力定理，此外，他系统并严格地证明了杠杆定律。阿基米德在几何学领域也颇有建树，他的数学思想蕴含微积分的原理。他与牛顿、高斯并称为“世界三大数学家”。“给我一个支点，我就能撬起整个地球”就是阿基米德的名言。"], ["奥本海默", "奥本海默是20世纪美国著名的核物理学家，被誉为“原子弹之父”，也是第二次世界大战期间美国“曼哈顿计划”的负责人之一。他参与了美国向日本广岛投放原子弹的讨论。原子弹在广岛爆炸后，他产生了负罪感，开始反思科学家的工作、思考科学技术是造福人类还是为人类制造灾难。因而“奥本海默式自责”是指滥用科学技术而造成了对人类社会的威胁。"], ["奥尔加·托卡尔丘克", "奥尔加·托卡尔丘克，波兰女作家、心理学家和诗人，是当代波兰代表性的作家之一，获得2018年诺贝尔文学奖。她的作品聚焦现实和人物的心理活动。她写作的特点是善于用碎片化叙事的方式，以众多小故事合成一部小说。她的代表作主要有《太古和其他的时间》《白天的房子，夜晚的房子》《雅各书》。"], ["鲍勃·迪伦", "鲍勃·迪伦，原名罗伯特·艾伦·齐默曼，1941年出生于美国明尼苏达州，是美国摇滚、民谣艺术家。他从青少年时期开始，就在各种乐队参加表演。1962年，他发行了首张同名专辑《鲍勃·迪伦》。2016年,鲍勃·迪伦因“在美国歌曲的伟大传统里，创造了新的诗意表现手法”获得诺贝尔文学奖。鲍勃·迪伦是第一位获得该奖项的作曲家。"], ["布鲁诺", "乔尔丹诺·布鲁诺是意大利杰出的自然科学家、思想家、唯物主义哲学家，也是反对教会神学世界观的不屈斗士。他主张无限宇宙和多种世界理论，是第一个奋起捍卫和发展哥白尼学说的人。其主要著作有《论原因、本原和统一》《论无限性、宇宙和诸世界》《驱逐趾高气扬的野兽》等。"], ["陈寅恪", "陈寅恪祖籍江西，是著名的历史学家、文学家。他对隋唐史、梵文、突厥文等多个领域都有深入研究。其主要作品有《隋唐制度渊源略论稿》《元白诗笺证稿》等。"], ["村上春树", "村上春树是当今日本文坛最具代表性的作家之一。他的小说敏感、准确而又含蓄地传递出了20世纪80年代日本青年孤独、哀愁和无奈的情绪，凸显出了特定社会环境中生态的真实和“感性”的真实。其代表作有《挪威的森林》《且听风吟》《海边的卡夫卡》等。其中，《且听风吟》获得日本第23届群像新人奖。"], ["德莱塞", "德莱塞，美国作家、小说家，美国现实主义代表作家。他的作品多长句，注重细节，作品贴近人民生活，极具现实性。其写作主题突破了美国文学以往的传统，开始贴近生活，反映和批判现实。代表作有《嘉莉妹妹》《金融家》《美国悲剧》等。"], ["多丽丝·莱辛", "多丽丝·莱辛，英国女作家，笔名简·萨默斯。莱辛多次获得世界级文学奖项，并获得2007年诺贝尔文学奖。莱辛小说的主题主要可分为四类。第一类以民族独立为主题；第二类以妇女寻求自身解放为主题；第三类以人类世界未来危机为主题；第四类以社会现实问题为主题。代表作有《金色笔记》《暴力的孩子们》等。"], ["厄普顿·辛克莱", "厄普顿·辛克莱，美国现实主义代表作家之一。他的小说多以揭露社会黑暗而闻名。他一生创作了80余部作品，主要代表作有《屠场》《石油》等。其中，《屠场》的问世推动了食品卫生检查法的制订，书中描写了芝加哥屠宰场的不卫生情况以及企业对员工的压榨，引起人们对肉类加工质量的愤怒和质疑。"], ["弗吉尼亚·伍尔夫", "弗吉尼亚·伍尔夫，英国女作家、文学理论家和文学批评家。她是意识流文学代表人物之一，被称为“二十世纪现代主义与女性主义的先锋”。她是伦敦文学界有名的核心人物，是20世纪最伟大的小说家之一。她在小说中采用意识流的手法，描绘人们内心的想法和潜意识。她的代表作主要有《达洛维夫人》《到灯塔去》《存在的瞬间》等。"], ["顾炎武", "顾炎武，初名绛，字忠清，后改名炎武，字宁人，世称亭林先生，是明末清初经学家、思想家、文学家。他学识渊博，对天文、地理、经史百家等都有研究，著有《日知录》《亭林文集》等。"], ["哈金", "哈金，本名金雪飞，出生于辽宁省，1985年赴美留学并移居美国，现任教于波士顿大学。他因长篇小说《等待》于1999年获得美国国家图书奖，是第一个获得该奖的华人作家。哈金的第一本短篇小说集《词海》获得1997年海明威文学奖。哈金创作的小说《疯狂》于2004年由兰登书屋出版。此外，哈金还创作有诗集《沉默之间》和《面对阴影》等。"], ["海明威", "海明威是美国现代著名小说家。1953年，海明威以其作品《老人与海》获普利策奖，1954年又因该作品获诺贝尔文学奖。他是美国“迷惘的一代”作家"], ["赫拉克利特", "赫拉克利特，古希腊哲学家，爱菲斯学派的创始人。他是辩证法的奠基人之一。赫拉克利特认为万物都处于不断的变化之中，并按照一定规律进行变化；事物是对立统一的。代表作有《论自然》。"], ["亨利·詹姆斯", "亨利·詹姆斯，英籍美裔小说家、文学批评家、散文家和剧作家。他开创了西方心理分析类型小说的先河。他的作品着重描写常人的内心想法，颂扬资本主义。国际主题是他作品的主旋律。他的作品影响了现代派及后现代派文学。主要代表作有《鸽翼》《使节》《金碗》《黛西·米勒》等。"], ["后印象派三大巨匠", "后印象派三大巨匠指梵高、高更和塞尚。梵高是荷兰后印象派画家，代表画作有《吃土豆的人》《向日葵系列》《星月夜》等。高更是法国后印象派画家，代表作品有《我们从哪里来？我们是谁？我们到哪里去？》《黄色的基督》等。塞尚是法国后印象派画家，被称为“现代绘画之父”，代表作品有《埃斯泰克的海湾》《静物苹果篮子》《圣维克多山》等。"], ["黄宗羲", "黄宗羲，字太冲，号南雷，浙江余姚人，是明末清初的著名学者、思想家，学者称其为梨洲先生。他曾提出“天下为主，君为客”的民主思想，被誉为“中国思想启蒙之父”。黄宗羲学问渊博，著述丰厚，涉及史学、经学、地理、数学、诗文等方面，著有《明儒学案》《宋元学案》《南雷文案》等。"], ["金庸", "金庸，本名查良镛，曾用笔名林欢，原籍浙江海宁，是香港著名武侠小说家。金庸将其作品及其人物形象有机地融入到鲜明的历史背景之中，通过塑造"], ["李悝", "李悝，又名李克，战国时期魏国人，是杰出的政治家、法家的重要代表人物之一。魏文侯时期，他担任相国，推行变法，使魏国富强起来。其“重农”与“法治”结合的思想与实践，对商鞅、韩非影响极大，被称为“法家始祖”。"], ["路遥", "路遥，本名王卫国，中国当代作家。路遥将现实主义的人生百态和浪漫主义的热烈情感融合并体现到自己的作品当中。《平凡的世界》生动表现了当时城乡社会生活的现状，路遥凭借这部作品获得第三届茅盾文学奖。2018年，党中央、国务院授予路遥改革先锋称号，颁授改革先锋奖章。路遥作品众多，代表作有长篇小说《平凡的世界》《人生》等。"], ["路易斯·巴斯德", "路易斯·巴斯德，1822年出生于法国东尔城，是法国著名的微生物学家、化学家、近代微生物学的奠基人。巴斯德对同分异构现象、发酵、细菌培养和疫苗等的研究取得重大成就，从而奠定了工业微生物学和医学微生物学的基础，并开创了微生物生理学，被后人誉为“微生物学之父”。他是世界上第一个成功研制出狂犬病疫苗的人，为免疫学的发展做出了贡献。"], ["罗伯特·彭斯", "罗伯特·彭斯，英国诗人。彭斯的大部分诗歌作品都使用了苏格兰方言，并多为抒情短诗。他的作品生动形象地描写了苏格兰的乡村生活，赞美了劳动人民的淳朴，抒发了对故土的热爱。此外，彭斯收集并整理了大部分苏格兰的民谣，让苏格兰民歌重新绽放光彩。他的代表作主要有《一朵红红的玫瑰》《苏格兰人》《致拉布雷克书》《友谊地久天长》等。"], ["马丁·路德·金", "马丁·路德·金，非裔美国人，美国牧师、社会活动家。1964年，马丁·路德·金被授予诺贝尔和平奖。他是著名的黑人民权运动领袖，曾领导了蒙哥马利巴士抵制运动，并于1963年组织了“华盛顿工作与自由游行”，来为黑人争取工作机会和自由权。同年，马丁·路德·金在林肯纪念馆的台阶上发表了“我有一个梦想”的演讲。1968年4月4日，马丁·路德·金被种族主义分子暗杀，终年39岁。"], ["孟德尔", "孟德尔，是19世纪奥地利遗传学家、现代遗传学的奠基人。通过豌豆实验，孟德尔发现了遗传学三大基本规律中的两个，分离规律和自由组合规律，被称为“现代遗传学之父”。"], ["孟浩然", "孟浩然，襄州襄阳（今湖北）人，是唐朝著名诗人。孟浩然的作品以山水诗最多，也有不少描写田园风光的作品，是盛唐山水田园诗派的代表，有《孟浩然集》三卷传世。其代表作品有《春晓》《过故人庄》《宿建德江》等。"], ["米开朗琪罗", "米开朗琪罗是意大利文艺复兴时期著名雕塑家、画家、诗人、建筑师，文艺复兴时期三巨匠之一。他在创作上多表现当时市民阶层的爱国主义和为自由而斗争的精神面貌，作品有丰厚、新颖、雄伟的气魄。其代表作有雕塑作品《哀悼基督》《大卫》等，壁画《最后的审判》等。"], ["纳兰性德", "纳兰性德，原名成德，字容若，号楞伽山人，满洲正黄旗人，清康熙时期大学士明珠长子，是清初著名词人。纳兰性德善书能诗，长于词，尤以“哀感顽艳”的悼亡词最为人称道。其代表作品有词《画堂春》《木兰花令·拟古决绝词》等，词集《饮水词》经后人增补为《纳兰词》。"], ["娜拉", "娜拉是挪威剧作家易卜生的经典社会问题剧《玩偶之家》的主人公。她在经历了一系列变故后，终于认清丈夫的真实面目和自己在家中的“傀儡”地位，遂摔门而出。鲁迅在演讲《娜拉走后怎么样》中借娜拉离家引出了一个社会问题，即“娜拉离家之后怎么样?”，并借此来表达女性只有拥有了经济基础，参与社会生活，才能真正获得“自由”的观点。"], ["聂耳", "聂耳，原名聂守信，原籍云南玉溪，生于昆明，是著名的人民音乐家。其谱曲的《义勇军进行曲》被选定为中国的国歌，并入选中宣部“庆祝中华人民共和国成立70周年优秀歌曲100首”。此外，聂耳还创作了儿歌《卖报歌》、管弦乐曲《金蛇狂舞》等耳熟能详的曲目。"], ["牛顿", "牛顿是英国皇家学会会长、英国著名的数学家、天文学家、物理学家，是百科全书式的“全才”。在力学上，牛顿阐明了动量和角动量守恒的原理，提出牛顿运动定律。在光学上，他发明了反射望远镜，并基于对三棱镜将白光发散成可见光谱的观察，发展出了颜色理论。他还系统地表述了冷却定律，并研究了音速。牛顿著有《自然哲学的数学原理》《光学》等作品。"], ["普契尼", "普契尼，是继威尔第之后意大利最伟大的歌剧作曲家、“真实主义”歌剧乐派的代表人物。他的作品充满异国情调，剧情紧凑，题材罕见而又吸引观众，"], ["契诃夫", "契诃夫，是俄国小说家、戏剧家。他创作了中、短篇小说470多篇。这些作品大体分作两类：一类无情地嘲笑和揭露警察专制制度和小市民的奴性心理；另一类通过日常生活琐事的描写，对下层人民的愁苦给予深切的同情。其代表作品有《小公务员之死》《变色龙》等，小说集《在黄昏》等。"], ["钱谦益", "钱谦益，字受之，号牧斋，晚号蒙叟、东涧遗老，常熟（今属江苏）人，是明末清初文学家。他不仅诗、文创作成就突出，而且有颇为系统的文学思想和理论，在当时学界文坛享有极高的地位。其主要作品有《牧斋诗抄》《有学集》《初学集》等。"], ["乔治·艾略特", "乔治·艾略特，是19世纪英国著名女小说家。她的作品以广泛的社会内容和对女性生活的关注著称于世，表达出了非常强烈的女性意识。其代表作品有《亚当·比德》《弗洛斯河上的磨坊》《织工马南》《米德尔马契》等。"], ["萨克雷", "萨克雷是19世纪英国维多利亚时代杰出的现实主义作家。他擅长描写英国资产阶级的风俗人情，尤其擅长揭露英国上流社会的黑暗面。其代表作长篇讽刺小说《名利场》描写了两个年轻美丽的少女艾米丽亚和蓓基的人生之路。"], ["塞缪尔·贝克特", "塞缪尔·贝克特，爱尔兰作家，出生于都柏林（爱尔兰首都）。他的创作领域主要集中在戏剧、小说和诗歌。前期主要是小说创作，其代表作《莫洛伊》《马龙之死》等也是20世纪文学史坛中璀璨的瑰宝。后期专注于戏剧创作，其代表作《等待戈多》在法国巴黎引起轰动，连演三百多场。同时，他为荒诞派"], ["商鞅", "商鞅，姓公孙，名鞅，卫国人，后因被秦封于商，故称商鞅，是战国时期著名的政治家、法家的代表人物。商鞅通过在秦国实行较为彻底的政治经济革新使其成为富裕强大的国家，史称“商鞅变法”。公元前338年，秦孝公死后，商鞅被公子虔指为谋反，虽战死于彤地，其尸身仍被带回咸阳，处以车裂之刑后示众。"], ["沈宋", "沈宋，指初唐诗人沈佺期、宋之问。沈、宋在前人创作经验的基础上，进一步研究文章的平仄、粘对，形成了完整的律诗体制。两人的五、七言近体诗，标志着五、七言律体的定型。"], ["世界推理小说三巨匠", "世界推理小说三巨匠，指日本的松本清张、英国的阿瑟·柯南·道尔和阿加莎·克里斯蒂。松本清张，出生于日本九州小仓市，是日本著名推理小说作家。20世纪50年代他撰写推理小说，1957年发表的《点与线》引起轰动，被誉为世界十大推理小说之一。他开创了推理小说的黄金时代，对日本推理小说的发展影响深远。阿瑟·柯南·道尔，1859年生于苏格兰爱丁堡的天主教徒家庭，是英国小说家，以写福尔摩斯探案故事闻名于世。他创作了以私人侦探福尔摩斯和他的助手华生医生为主角的一系列侦探故事，共68篇，分别…"], ["叔本华", "叔本华，是德国哲学家、唯意志主义的创始人和主要代表之一。其思想受康德、柏拉图以及佛教理论的影响，一反德国古典哲学的思辨传统，力求在对非理性的研究中另辟蹊径。他认为世界的本源是生命意志，而意志是一种盲目的冲动。其代表作品有《充足理由律的四重根》《作为意志和表象的世界》《伦理学的两个基本问题》等。"], ["司马迁", "司马迁，字子长，西汉著名的史学家、文学家。司马迁游历各地，采集见闻，收集了大量历史资料。他继承父业，开始编写史书。后因替李陵辩解而受宫刑。之后，司马迁仍发奋继续完成《史记》。《史记》是中国第一部纪传体通史，被鲁迅誉为“史家之绝唱，无韵之离骚”。"], ["汤显祖", "汤显祖，字义仍，号海若、若士、清远道人，临川（今江西抚州）人，是明代戏曲家、文学家。汤显祖毕生从事写作，有诗、文、赋、曲等留世，其中尤以戏剧创作的成就最高。其戏剧作品《牡丹亭》《邯郸记》《南柯记》《紫钗记》合称“临川四梦”，其中以《牡丹亭》最著名。"], ["田汉", "田汉，原名寿昌，笔名陈瑜，湖南长沙人，是中国著名戏剧家、中国现代戏剧的奠基人之一。其代表作品有话剧《名优之死》《关汉卿》《丽人行》等。此外，由田汉作词、聂耳作曲的《义勇军进行曲》被选定为中国的国歌。"], ["田纳西·威廉斯", "田纳西·威廉斯，美国剧作家，本名为托马斯·拉尼尔·威廉斯三世，笔名为田纳西·威廉斯，曾获得普利策奖和戏剧评论奖。他的作品主要反映了20"], ["屠呦呦", "屠呦呦，药学家，中国中医研究院终身研究员兼首席研究员、青蒿素研究开发中心主任。屠呦呦因发现青蒿素治疗疟疾的新疗法而获得2015年的诺贝尔生理学或医学奖，是第一位获得诺贝尔科学奖项的中国本土科学家。2017年1月9日，她被授予2016年度国家最高科学技术奖。"], ["托妮·莫里森", "托妮·莫里森，美国黑人女作家，1993年获得诺贝尔文学奖。她的作品以描述黑人生活以及黑人女性主义为主。她主编的《黑人之书》被誉为“美国黑人史的百科全书”。她的代表作主要有《最蓝的眼睛》《所罗门之歌》《柏油娃》等。"], ["王熙凤", "王熙凤是中国四大名著之一——《红楼梦》中塑造的最为成功的重要人物形象之一。她出身于封建贵族，嫁给贾琏后成为贾家的实际掌权人，最终随着家族的覆灭悲惨死去。她才貌双全、长袖善舞，却又凶残跋扈。王熙凤这样一个悲剧形象，一定程度揭示了封建伦理道德的腐朽以及封建社会灭亡的必然趋势。"], ["文坛三杰", "文坛三杰，即但丁、彼特拉克、薄伽丘。他们是文艺复兴的先驱者，被称为“文艺复兴三颗巨星”，也被称为“文坛三杰”（文艺复兴前三杰）。其中，但丁的代表作为《神曲》；彼特拉克被誉为“人文主义之父”，代表作为《歌集》；薄伽丘是意大利民族文学的奠基者，代表作是《十日谈》。"], ["吴敬梓", "吴敬梓，字敏轩，清朝诗人、著名小说家。因其书斋署“文木山房”，晚年自号“文木老人”，其代表作是诗集《文木山房诗文集》和长篇讽刺小说《儒林外史》。"], ["五柳先生", "五柳先生，即陶渊明。陶渊明，又名潜，字元亮，号“五柳先生”，私谥“靖节”，世称“靖节先生”，是东晋著名诗人、辞赋家。陶渊明是中国第一位田园诗人，被称为“古今隐逸诗人之宗”。他在诗歌、散文、辞赋等多方面都有很高的成就，最有代表性的是田园诗。其代表作有组诗《饮酒》，散文《桃花源记》,辞赋《归去来兮辞》等。"], ["夏洛蒂·勃朗特", "夏洛蒂·勃朗特是19世纪英国女作家。其带有自传性质的代表作《简·爱》讲述了孤儿简·爱敢于冲破重重藩篱，争取个人自由和幸福的故事，表达了女性对独立、平等和自由的强烈渴望。作者在书中探讨了情感与理智之间的矛盾与平衡，捍卫了妇女的平等权利。"], ["徐志摩", "徐志摩，原名章垿，字槱森，浙江海宁人，是中国现代诗人、散文家。在剑桥大学期间，徐志摩深受西方教育的熏陶及欧美浪漫主义和唯美派诗人的影响，为其奠定浪漫主义诗风。其代表作品有《再别康桥》《翡冷翠的一夜》。"], ["雅克·德里达", "雅克·德里达，法国哲学家，西方解构主义哲学的代表人物。他是著名的法国思想家之一，他的理论与传统的“结构主义”相对。他是欧美知识界具有争议性的人物。主要代表作有《论文字学》《声音与现象》《哲学的边缘》等。"], ["叶芝", "叶芝，全名威廉·巴特勒·叶芝，是爱尔兰著名诗人、剧作家、爱尔兰文艺复兴运动领导人之一，被诗人艾略特誉为“当代最伟大的诗人”。他初期的创作带有唯美主义倾向和浪漫主义色彩，后期的诗风趋向现实主义。其代表作有戏剧《胡里痕的凯瑟琳》《心愿之乡》，诗《乌辛漫游记》《当你老了》等。1923年，叶芝因“用鼓舞人心的诗篇，以高度的艺术形式表达了整个民族的精神风貌”获诺贝尔文学奖。"], ["余华", "余华，浙江海盐人，祖籍山东高唐，当代作家，先锋文学的代表作家之一。余华的代表作品有《兄弟》《活着》《许三观卖血记》《第七天》等。"], ["元稹", "元稹，字微之，河南洛阳人，唐朝大臣、文学家。在散文、小说、诗歌等方面，元稹都卓有成就。他曾与白居易共同倡导新乐府运动，创立了由元稹开先河、白居易参与完备的诗歌派别——元和体。元稹和白居易被世人并称为“元白”。元稹的代表作有传奇《莺莺传》（又名《会真记》）《离思五首》《遣悲怀三首》等。"], ["张爱玲", "张爱玲，笔名梁京，中国现代女作家。其小说中蕴涵女性的细腻与古典的美感，对人物心理的把握令人惊异，其独特的人生态度在当时极为罕见。代表作品有《金锁记》《倾城之恋》《半生缘》《沉香屑·第一炉香》等。"], ["张载", "张载，字子厚，世称“横渠先生”，是宋代的理学家、哲学家、教育家。张载是关学创始人，他在中国哲学史上第一次建立了比较完整的气一元论哲学体系，也是中国哲学史上第一个从思维与存在关系的哲学理论高度批判佛教唯心主义的哲学家，成为宋代理学的奠基人。其著有《正蒙》《西铭》《横渠易说》《经学理窟》等，今编为《张载集》。1"], ["张芝", "张芝，字伯英，东汉敦煌渊泉（今甘肃酒泉）人，是东汉著名书法家。张芝师法崔瑗、杜度的章草，后结合新兴楷法，省减章草点画波磔，创“今草”，被世人推崇为“草圣”。其代表作品有《冠军帖》《二月八日帖》等。"], ["赵公明", "赵公明，是民间崇信的道教神灵。相传，赵公明为秦朝人，于终南山得道，戴铁冠、执铁鞭、黑面浓须、骑黑虎，因其护张天师炼丹有功，被封为“正一玄坛元帅”。其专司迎祥纳福、商贾买卖，被民间称为“财神”。"], ["《阿 Q 正传》", "《阿Q正传》是鲁迅创作的优秀中篇小说，写于1921年12月至1922年2月间，后收入小说集《呐喊》。全书分《序》《优胜记略》《续优胜记略》《恋爱的悲剧》《生计问题》《从中兴到末路》《革命》《不准革命》《大团圆》9章，以辛亥革命前后的农村未庄为背景，通过对阿Q悲剧一生的描写，深刻地反映了封建势力残酷剥削、压迫农民的现实，批判了资产阶级领导的旧民主主义革命的妥协性和不彻底性。"], ["《阿房宫赋》", "《阿房宫赋》是唐代诗人杜牧作的脍炙人口的辞赋名篇。赋中描写阿房宫建筑之宏伟，秦始皇宫廷生活之穷奢极欲、荒淫无度，引出秦王朝苛敛百姓自取灭亡的结果。作者有感于唐敬宗“大起宫室，广声色，故作《阿房宫赋》”以讽谏之。"], ["《哀悼》", "《哀悼》是奥尼尔创作的长篇戏剧。奥尼尔通过描写曼农家族复仇的故事以及曼农一家的悲剧结局，突出了理想和现实之间的矛盾。《哀悼》是奥尼尔戏剧创作的高峰之作。"], ["《陈情表》", "《陈情表》是三国两晋时期李密写给晋武帝的奏章。晋武帝为稳固统治，想要拉拢蜀汉旧臣李密入朝为官。李密上《陈情表》请求晋武帝批准他暂缓赴任，言辞恳切。《陈情表》讲述了李密和祖母相依为命的深厚感情，祖母病重自己应该侍奉身旁报答养育之恩，同时表达了对于朝廷赏识自己的感恩之情。"], ["春秋三传", "“春秋三传”指《春秋左氏传》《春秋公羊传》《春秋谷梁传》，是解释《春秋》经义的“传”体著作。《春秋左氏传》即《左传》，亦称《左氏春"], ["《道林·格雷的画像》", "《道林·格雷的画像》是英国戏剧家、小说家奥斯卡·王尔德创作的长篇小说。小说的主人公道林·格雷是一个相貌俊美、心地善良的贵族少年，后看见画家为他画的画像后，发现自己的美并想永葆青春，于是祈愿用自己的灵魂交换，让自己永远年轻美貌，画像替他老去。此后，每当道林做了坏事，画像就会变得丑陋。在之后的发展中，道林无法控制自己的恶行，画像也变得奇丑无比，最后自己亲手刺向了画像，自己也倒地身亡。"], ["《二泉映月》", "《二泉映月》是民间音乐家阿炳（华彦钧）创作的二胡独奏曲。江苏无锡锡惠公园内的惠山泉，世称“天下第二泉”，阿炳经常于此卖艺。阿炳以《二泉映月》为名，借景抒情，描绘了旧社会民间艺人坎坷痛苦的一生。"], ["《共产党宣言》", "《共产党宣言》由马克思和恩格斯合著。1848年，《共产党宣言》发表，标志着马克思主义的诞生。《共产党宣言》阐述了科学社会主义理论，运用辩证唯物主义和历史唯物主义论证了资本主义必然灭亡和社会主义必然胜利的客观规律。《共产党宣言》是无产阶级进行革命的行动指南。"], ["《哈克贝利·费恩历险记》", "《哈克贝利·费恩历险记》是美国作家马克·吐温发表的长篇小说，小说《汤姆·索亚历险记》的续集。故事的主人公哈克贝利·费恩聪明善良，但他为了追求自由，就开始了逃亡的生活，途中遇到黑人奴隶吉姆。吉姆勤劳能干，但为了逃脱再次被主人贩卖的命运，选择出逃。在逃亡过程中，两人经历了走错方向、吉姆被卖、哈克贝利成功解救吉姆等过程。小说完美地将浪漫主义和现实主义结合起来，既描写了他们逃亡过程的传奇色彩，又痛斥了蓄奴制的黑暗。"], ["《还乡》", "《还乡》是英国作家托马斯·哈代创作的一部长篇小说，是欧洲文学史上著名的爱情悲剧小说。故事发生在英国南部偏僻荒凉的埃格敦荒原上，小说通过女主人公游苔莎和男主人公克林的爱情悲剧，反映了工业资本侵入宗法制农村后所引起的变化和矛盾。"], ["《呼啸山庄》", "《呼啸山庄》是英国女作家艾米莉·勃朗特的长篇小说代表作。故事的男主人公希思克利夫是呼啸山庄主人老恩萧收养的孤儿，他因受到新主人小恩萧的虐待及恋情不顺而愤然出走。三年归来后，希思克利夫对他的仇人们进行了残酷的报复，但最终自杀。全篇充满强烈的斗争精神，又笼罩着离奇紧张的气氛，向人们展示了一幅畸形的社会画面。"], ["《荒原》", "《荒原》是英国现代著名诗人艾略特的长诗，于1922年发表。全诗共分5章：《死者葬仪》《对弈》《火诫》《水里的死亡》《雷霆的话》。诗以寻找"], ["激流三部曲", "《激流三部曲》是巴金所著的系列小说，包括《家》《春》《秋》3部。作品通过描写五四运动后一个封建大家族——高氏家族的没落，反映了封建宗法制度的崩溃和革命潮流在青年一代中的激荡。其中，《家》的艺术成就和影响最大。"], ["《艰难时世》", "《艰难时世》是英国小说家查尔斯·狄更斯的长篇小说代表作。故事发生在虚拟的焦煤镇。国会议员兼“教育家”格莱恩逼迫自己的女儿露易莎嫁给比她大几十岁的工厂主、银行家庞得贝，造成她婚姻的不幸，其子也客死他乡，而为人冷酷、傲慢、厚颜无耻的庞得贝最终众叛亲离、中风猝死。小说描写了底层人民生活的艰难，反映了十九世纪四五十年代英国社会中尖锐的劳资矛盾。"], ["《拉德斯基进行曲》", "《拉德斯基进行曲》是奥地利作曲家老约翰·施特劳斯最著名的代表作。这首曲子是老约翰·施特劳斯为赞颂拉德斯基将军在诺瓦拉战役的胜利而创作，曲风欢快振奋、有感染力。著名的维也纳新年音乐会以这首曲子作为结束曲，并已成为一种传统。"], ["《雷雨》", "《雷雨》是中国现代杰出戏剧家曹禺的经典话剧剧本，共4幕。作品通过周、鲁两家8个人物前后30年错综复杂的关系与矛盾冲突，揭露和控诉了具有浓厚封建色彩的资本家周朴园的冷酷、专横和虚伪，表现了对被侮辱被损害者的深厚同情。"], ["临川四梦", "“临川四梦”为明代剧作家汤显祖所著的《牡丹亭》《邯郸记》《紫钗记》《南柯记》四剧的合称。这些戏剧主要描写了爱情和社会风情，体现了人生哲理以及对当时社会现实的讽刺和不满。“临川四梦”蕴含着汤显祖对于人生和社会的深刻感受和思考。"], ["《论语》", "《论语》是儒家经典著作之一，由孔子的弟子及其再传弟子编撰而成。全书共20篇492章，以语录体为主，记录了孔子及其弟子的言行，集中体现了孔子及儒家学派的政治主张、伦理思想、道德观念及教育原则。作品语言简单易懂，但传递的思想却极为深刻，有很多语录流传至今。《论语》的思想核心是“仁”，《论语》中蕴含的哲学思想对中国文化产生了广泛而深远的影响。"], ["《骆驼祥子》", "《骆驼祥子》是现代长篇小说，老舍著。小说以20世纪20年代旧军阀统治下的北平为背景，描写了人力车夫祥子在黑暗社会的摧残下，逐渐丧失生活理想，最后被迫走向堕落的悲剧，控诉了旧社会的罪恶。《骆驼祥子》文笔朴实明快、语言洗练，形象丰满生动，富有地方色彩，被认为是老舍的代表作之一。"], ["《马可·波罗游记》", "《马可·波罗游记》，又名《东方见闻录》，是元朝时意大利人马可·波罗撰写的游记。书中讲述了作者在中国的见闻，对当时的欧洲产生了巨大的冲击，堪称西方世界第一部真正意义上“发现东方”的巨著。"], ["《孟子》", "《孟子》是孟子及其弟子合著的儒家经典著作之一。全书分为《梁惠王》《公孙丑》《滕文公》《离娄》《万章》《告子》《尽心》7篇。《孟子》以语录体的形式，详细记载了孟子的思想与言行，内容广泛涉及孟子的政治活动及主张、哲学思想、美学思想以及个性修养等。"], ["《名利场》", "《名利场》是19世纪英国小说家萨克雷创作的批判现实主义长篇小说。小说描写了富裕家庭出身的艾米丽亚和穷画师女儿蓓基的人生经历，以诙谐幽默的笔触描绘了英国上流社会的冷酷自私、尔虞我诈。"], ["《琵琶记》", "《琵琶记》是元末戏曲作家高明所创作的南戏。高明根据民间流传的《赵贞女蔡二郎》创作出了《琵琶记》，将《赵贞女蔡二郎》中女子遇到负心汉书生的悲剧变为了《琵琶记》中蔡伯喈与赵五娘历经波折终于团聚的喜剧。《琵琶记》歌颂了蔡伯喈的忠孝专一与赵五娘的坚毅忠贞，也体现了对当时社会现象的讽刺。"], ["《清明上河图》", "《清明上河图》是北宋画家张择端的存世珍品。画家以精致的工笔记录了北宋都城汴梁郊区和城内汴河两岸的建筑和民生，描绘了清明时节北宋汴梁以及汴河两岸的繁华景象和自然风光。"], ["《人性的枷锁》", "《人性的枷锁》是19世纪英国著名的小说家、戏剧家威廉·萨默塞特·毛姆出版的长篇小说，带有自传色彩。小说讲述了主人公菲利普各方面的成长故事，包括亲情、学业、爱情及宗教等，最终他克服种种人生的枷锁，获得精神自由。小说主要表达了对人性自由全面解放的渴望，也在侧面反映了第一次世界大战中当权者与劳苦人民之间的矛盾。"], ["三易", "“三易”是《连山》《归藏》《周易》的合称。“三易”之说，出自《礼记·春官·太卜》，这三本经书都是讲八卦和八卦重叠而成的六十四卦。相传《连山》为夏代之易，以艮卦为首；《归藏》为商代之易，以坤卦为首。这两书已失传，只有《周易》尚存。"], ["《蜀道难》", "《蜀道难》，原为乐府《瑟调曲》名，是唐代诗人李白的七言古体诗。全诗大体按照由古及今、自秦入蜀的线索来描写入蜀道路上惊险而奇丽的山川，并从中透露出对社会现状的忧虑和关切。该诗被誉为“奇之又奇”之作。"], ["《四书章句集注》", "《四书章句集注》是南宋思想家朱熹的经典著作。内容为四书，即《大学》《中庸》《论语》《孟子》的注本（分为《大学章句》《中庸章句》《论语集注》《孟子集注》）。"], ["《汤姆叔叔的小屋》", "《汤姆叔叔的小屋》是美国作家斯托夫人发表的一部长篇小说，又译作《黑奴吁天录》《汤姆大伯的小屋》。小说以反奴隶制为题材，讲述了汤姆、伊丽莎等几位黑人奴隶所受到的虐待与鞭笞并逃亡的故事。全书都在斥责奴隶制的不道德，并从女性视角出发去烘托女性的力量不可忽视。该小说在一定程度上影响了美国奴隶制的发展。"], ["《滕王阁序》", "《滕王阁序》全名《秋日登洪府滕王阁饯别序》，是骈文名篇，唐代王勃作。《滕王阁序》是王勃在滕王阁宴上的即席之作，文章用铺陈夸张的笔法写出滕王阁的壮丽及周围的风光，叙述了宴会的盛况，寄托了作者建功立业的抱负，也抒发了作者怀才不遇的愤懑之情。"], ["《推销员之死》", "《推销员之死》是美国剧作家阿瑟·米勒创作的戏剧。小说主人公威利·洛曼是一位具有丰富经验的推销员，受美国当时文化的影响，他一直有着不现实的美好愿景，并到处吹嘘夸耀，但事与愿违，最终，威利被公司开除，压力剧增，两个儿子也不务正业，威利失去了生活的动力，最终选择了自杀，用死后的保险赔偿为家人带来一些福利。小说以一个小人物的悲剧人生，来讽刺美国当时虚假繁荣的景象和美国梦的不切实际。"], ["《雾都孤儿》", "《雾都孤儿》是英国作家狄更斯的一部社会小说。小说主要以伦敦为创作背景，讲述了孤儿奥利弗在经历种种磨难之后，最终过上幸福生活的故事。小说真实地反映了英国社会最底层人民的疾苦，是英国文学史上一部经典的著作。《新教伦理与资本主义精神》《新教伦理与资本主义精神》是一部宗教社会学经典著作，作者是德国社会学家马克斯·韦伯。该书着重论述了资本主义发展与新教伦理之间的密切关系。全书分为上下两个部分，主要论述了两大问题——西方资本主义产生的原因和资本主义与社会伦理宗教之间的联系。"], ["《伊豆的舞女》", "《伊豆的舞女》是日本作家川端康成的成名作，是带有自传色彩的短篇小说。小说描写了一个19岁的学生“我”独自去伊豆旅行，逐渐倾心于一位14岁的伊豆舞女，但最终分别的故事。作家用优美的笔触表现了对美好、纯真的情感的追求。"], ["《伊利亚特》", "《伊利亚特》为希腊盲诗人荷马所创作的两部史诗之一。全诗共24卷，内容取材于特洛伊战争，主要描写希腊英雄阿基里斯的两次愤怒对战事的影响。《伊利亚特》想表达的是对英雄和集体主义的赞美。"], ["《月亮和六便士》", "《月亮和六便士》是英国作家毛姆的长篇小说。作品以法国后印象派画家保罗·高更的经历为原型，描写一个伦敦中年证券经纪人斯特里克兰历经坎坷，追求绘画艺术真谛的奇特经历。小说揭示了人们逃避现实的主题，表现了人们对自由的渴望和对艺术的追求。"], ["《朝花夕拾》", "《朝花夕拾》，原名《旧事重提》，是鲁迅创作的散文集。书中收录鲁迅于1926年创作的10篇回忆性散文，包括《狗·猫·鼠》《阿长与〈山海经〉》《二十四孝图》《五猖会》《无常》《从百草园到三味书屋》《父亲的病》《琐记》《藤野先生》《范爱农》。其中，前7篇写作者童年时代在故乡的见闻和受教育的情景，后3篇写作者青年时代离开故乡绍兴到南京、日本求学，再回到故乡绍兴教书的经历。"], ["《赵氏孤儿》", "《赵氏孤儿》是元代纪君祥所作的元杂剧剧本，内容取材于《史记·赵世家》。该剧通过记述赵氏孤儿被救与复仇的故事，塑造了一系列见义勇为的人物，歌颂了他们勇于牺牲、义无反顾的精神。"], ["2030 年可持续发展议程", "《2030年可持续发展议程》是联合国在2015年9月发布的文件。该议程包含了17项可持续发展目标，于2016年1月正式启动。这些发展目标涉及的范围主要为社会、经济和环境三个层面。"], ["G8", "G8，即八国集团，是一个由加拿大、法国、德国、意大利、日本、俄罗斯、英国和美国组成的非正式组织，是一个工业化国家的俱乐部。G8起初的目的是讨论经济问题和协调各国的宏观经济政策，现演变为一个广泛讨论国际经济、政治和社会问题的年度会议。2014年，俄罗斯被暂停八国集团成员国地位。"], ["NSF", "NSF（NationalScienceFoundation）即美国国家科学基金会。它是美国独立的联邦机构，成立于1950年。其任务是通过对基础研究计划的资助，改进科学教育，发展科学信息和增进国际科学合作等办法促进美国科学的发展。美国国家科学基金会的核心机构是国家科学委员会，其成员由美国总统任命，主要任务是确定国家科学基金会的政策。"], ["UNICEF", "UNICEF，即联合国儿童基金会，成立于1946年，是联合国系统内唯一专门致力于在世界范围内促进和维护儿童的生存权、发展权、受保护权和参与权的组织。"], ["创新型国家", "创新型国家指的是以科技创新作为基本战略和经济核心并拥有强大竞争力的国家。创新型国家应该具备的主要特征有：对创新活动的投入高、科技创新在经济中所占的贡献率比率高、自主创新能力强、科技创新的产出高。中国共3http://paper.people.com.cn/rmrbhwb/html/2006-07/10/content_7141069.htm"], ["电子政务", "电子政务是指国家政府机关在政务活动时，充分利用现代科学技术、网络技术等先进手段去提供更高效的公共服务。电子政务的推行有利于提高公众办理政务活动的效率，也有利于使政府的办公更透明化，降低腐败风险；同样，由于电子政务推动了网络化，在一定程度上也可以降低成本。"], ["法治国家", "法治国家是政治制度为民主制度、权力结构为分工制约关系、经济体制为市场经济体制、文化意识具有较高理性程度、依靠法律进行社会控制的国家。法治国家的建立必须依赖依法治国。走中国特色社会主义法治道路，必须坚持中国共产党的领导，必须坚持人民主体地位，必须坚持法律面前人人平等，必须坚持依法治国和以德治国相结合，必须坚持从中国实际出发。"], ["互联网+", "“互联网+”是把互联网的创新成果与经济社会各领域深度融合，推动技术进步、效率提升和组织变革，提升实体经济创新力和生产力，形成更广泛的以互联网为基础设施和创新要素的经济社会发展新形态。"], ["户籍制度改革", "户籍制度改革，就是要促进有能力在城镇稳定就业和生活的常住人口有序实现市民化，稳步推进城镇基本公共服务常住人口全覆盖。2014年，国务院发布《关于进一步推进户籍制度改革的意见》。2019年，国家发展改革委又发布了《放开放宽除个别超大城市外的城市落户限制》，明确提出放开放宽除个别超大城市外的城市落户限制。"], ["基础设施", "基础设施指为社会生产和居民生活提供公共服务的物质工程设施，是用于保证国家或地区社会经济活动正常进行的公共服务系统。它是社会赖以生存发展的一般物质条件，是国民经济各项事业发展的基础。2015年，国务院发布《关于积极推进“互联网+”行动的指导意见》，将互联网也定义为基础设施。5https://www.un.org/zh/aboutun/structure/iaea/"], ["居住证制度", "2014年7月，《国务院关于进一步推进户籍制度改革的意见》发布，提出“全面实施居住证制度”的目标。2015年11月26日，《居住证暂行条例》正式公布。根据条例的有关规定，居住证持有人可以享受居住地的基本公共服务和便利，包括义务教育、基本公共就业服务、办理出入境证件等6大基本公共服务和7项便利。"], ["结构性失业", "结构性失业，亦称“隐性失业”，是指由于经济结构、体制、增长方式等的变动，使劳动力在包括技能、经验、工种、知识、年龄、性别、主观意愿、地区等方面的供给结构与需求结构不吻合而导致的失业。结构性失业的特点是职位空缺和失业并存。"], ["科学发展观", "科学发展观是在深刻把握我国基本国情和新的阶段性特征的基础上、在深入总结改革开放以来实践经验的基础上、在深刻分析国际形势及借鉴国外发展经验基础上形成和发展的，是中国特色社会主义理论体系的接续和发展，也是发展中国特色社会主义必须长期坚持的指导思想。其主要内容包括：关于加快转变经济发展方式，关于发展社会主义民主政治，关于推进社会主义文化强国建设，关于构建社会主义和谐社会等4个方面。"], ["驴象之争", "驴象之争指的是美国总统选举中两党制的竞争。“驴”和“象”的形象源自德裔美国政治漫画家托马斯·纳斯特的讽刺漫画。“驴”是民主党的党徽，民主党人认为驴聪明且勇敢。“象”是共和党的党徽，共和党人认为大象代表了尊严和力量。"], ["美国中央情报局", "美国中央情报局是美国最大的情报机构，总部设在弗吉尼亚州的兰雷乡，是根据杜鲁门签署的《1947年国家安全法》成立的。中央情报局局长作为中央情报局的领导人，要向国家情报总监报告情况。其职责包括：通过人力资源和其他适当手段收集情报；找出关联和评估有关国家安全的情报，并将适当情报提供给有关方面；为在美国国外收集国家情报提供总体方向并进行协调工作；执行总统或国家情报总监指出的其他与影响国家安全情报相关的职责。中央情报局的功能是协助中央情报局局长执行上述的职责。6"], ["美国最高法院", "美国最高法院是美国联邦法院系统的最高审级和最高审判机关，是唯一由宪法规定的联邦法院。最高法院由总统征得参议院同意后任命的9名终身法官组成，其判例对全国有拘束力。同时，最高法院还享有特殊的司法审查权，即有权通过具体案例宣布联邦或各州的法律是否违宪。"], ["民粹主义", "民粹主义又称作平民主义，始于19世纪40~50年代的俄国，过分强调平民的作用与价值，依靠平民来进行社会改革。民粹主义是一种思想意识形态，过分看重平民的价值，把平民化当作政治活动合法化的理由，反对精英主义。某种程度上，民粹主义是极端的民主，是对严重危机的强烈反应，缺乏核心价值观。"], ["民主制度", "民主制度通常指区别于专制制度的另一种国家政治制度,即民主政体或国家政权组织形式。在这种制度下,国家政权和国家大事不是操纵在君主个人或少数政治寡头手中,而是由统治阶级通过一定的组织结构和组织形式共同行使国家权力。中国的人民代表大会制度是中国的根本政治制度,中国共产党领导的多党合作和政治协商制度、民族区域自治制度以及基层群众自治制度是中国的基本政治制度。中国特色社会主义民主政治制度是从中国的社会土壤中生长起来的,适应保障人民权利和推动国家经济社会持续健康发展的需要,因此成为有…"], ["女权主义", "女权主义，又称女性主义、男女平权主义，是资本主义国家妇女在经济、社会、文化、政治等各个领域争取男女平等、争取从根本上改变妇女社会地位和社会作用的一种意识形态与运动。20世纪20年代初，女权主义传入中国。"], ["欧盟峰会", "欧盟峰会又称欧洲理事会（通常称为欧盟首脑会议），是欧盟的最高决策机构，由各成员国国家元首或政府首脑及欧洲理事会主席、欧盟委员会主席参加。欧洲理事会每年至少召开4次会议，6月底和12月底举行正式首脑会议，3月和10月举行特别首脑会议，也会在其他时间举行额外的首脑会议。"], ["欧洲难民危机", "2015年,共有约150万难民涌入欧洲，这是欧洲自二战以来历经的最严重的难民危机。叙利亚、阿富汗和厄立特里亚为申请避难者的三大来源地。这些"], ["前海合作区", "前海深港现代服务业合作区简称前海合作区，总面积120.56平方公里。开发建设前海深港现代服务业合作区是支持香港经济社会发展、提升粤港澳合作水平、构建对外开放新格局的重要举措，对推进粤港澳大湾区建设、支持深圳建设中国特色社会主义先行示范区、增强香港同胞对祖国的向心力具有重要意义。8"], ["全球能源治理", "全球能源治理指国际社会各行为主体通过具有约束力或法律基础的国际规则解决国际能源政治及经济事务的行为方式。它有4个方面的基本特征：其实质是以全球治理机制为基础；其行为体为一个由不同层次行为个体及其行为构成的复杂系统；其方式是参与、谈判和协调；其基础为国际能源秩序。全球能源治理的核心要素包括5个方面：①国际能源治理的价值观；②国际能源治理的规则；③国际能源治理的主体；④国际能源治理的合作机制；⑤国际能源治理的经济协调手段。9"], ["全球治理", "全球治理是包括国家、社会、市场、公民个人在内的各类行为主体为了应对全球变革和全球问题带来的挑战，通过协商合作、共担风险和责任，有效管理全球性公共事务的实践活动。全球治理具有多主体参与、多层次、多领域、多形式等特征。10"], ["上海精神", "上海合作组织成立伊始提出的以“互信、互利、平等、协商、尊重多样文明、谋求共同发展”为基本内容的“上海精神”，是上合组织成员国合作经验的结晶，切实体现了上合组织超越冷战思维的创新理念，是确保上合组织不断发展壮大，凝聚上合组织大家庭的核心价值。"], ["上海自贸区", "上海自贸区的全称是中国（上海）自由贸易试验区，是中国政府设立在上海的区域性自由贸易园区，也是中国大陆境内第一个自由贸易区，位于浦东，属中国自由贸易区范畴。上海自由贸易试验区范围涵盖上海市外高桥保税区、外高桥保税物流园区、洋山保税港区、上海浦东机场综合保税区、金桥出口加工区、张江高科技园区和陆家嘴金融贸易区7个区域。"], ["世博会", "世博会即世界博览会，是一项由主办国政府组织或政府委托有关部门举办的、具有悠久历史和较大影响的国际性博览活动。世博会有综合性世博会和专业性世博会两种形式。参展者向世界各国展示当代的文化、科技和产业等领域有积极影响的科技成果。"], ["世界园艺博览会", "世界园艺博览会是由国际园艺生产者协会（AIPH）批准，以推动各国园艺领域贸易与合作为宗旨的国际性花卉园艺博览会，分为A1类大型国际园艺展览、A2类国际园艺展览、B1类有国外单位参展的园艺展览（长期）和B2类有国外单位参展的园艺展览（短期）4种类型。其中，A1类世界园艺博览会是由国际园艺生产者协会（AIPH）批准，国际展览局（BIE）认可的级别最高、影响最大的园艺博览会。11"], ["万隆精神", "1955年在印尼万隆召开的亚非会议，号召亚非各国人民团结一致、和平相处、友好合作，共同反对帝国主义、殖民主义与种族主义，争取和巩固民族独立，保卫世界和平。该会议倡导的“团结、友谊、合作”的国际关系准则就是“万隆精神”。"], ["我国外交政策", "我国外交政策的基本目标是维护我国的独立和主权，促进世界的和平与发展。我国外交政策的根本原则是独立自主。我国处理国际关系的基本原则是和平共处五项原则。我国对外政策的纲领是反对霸权主义和强权政治，维护世界和平。"], ["亚太经合组织领导人非正式会议", "领导人非正式会议是亚太经合组织最高级别的会议。1993年，美国正式提出召开一次首脑会议。由于没有得到全体成员的赞同，首脑会议被定名为“领导人非正式会议”。同年11月，亚太经合组织首次领导人非正式会议在美国西雅图召开。领导人非正式会议每年举行一次，就各成员共同关心的议题展开深入探讨，并在重点议题上达成广泛共识，会议形成的领导人宣言是指导亚太经合组织各项工作的重要纲领性文件。12"], ["一网通办", "“一网通办”，就是依托于在线政务服务平台，打通不同部门的信息系统，群众只需操作一个办事系统，就能办成不同领域的事项，解决办不完的手续、"], ["银保监会", "银保监会，即中国银行保险监督管理委员会，是将原中国银行业监督管理委员会和中国保险监督管理委员会的职责整合，组建而成的国务院直属事业单位。其主要职责有：依法依规对全国银行业和保险业实行统一监督管理；依据审慎监管和金融消费者保护基本制度，制定银行业和保险业审慎监管与行为监管规则；参加银行业和保险业国际组织与国际监管规则制定，开展银行业和保险业的对外交流与国际合作事务等。战略对话战略对话指国与国之间就最关切的双边和超越双边的战略性议题进行坦诚交流和直接沟通,以减少误判,增信释疑…"], ["战略伙伴关系", "战略伙伴关系是指国家根据自身利益和在国际体系中的位置与其他国家结成某种伙伴关系。与传统意义中国家之间的结盟不同，战略伙伴关系是为了促进各自多方面发展，建立在相互尊重、发展共同利益、开展合作的基础上的国家关系。"], ["政治体制", "政治体制又称政治体系、政治制度，是一个国家或地区的政权组织形式，主要包括行政机关、立法机关和司法机关的组成、职权及其相互关系。它属于上层建筑的范畴，是由一定经济基础决定、并为一定经济基础服务的。社会主"], ["中国特色社会主义先行示范区", "中国特色社会主义先行示范区，指深圳在改革开放和建设中国特色的社会主义过程中，率先尝试，为实现国家富强、民族复兴、人民幸福探索新路。深圳将着力6方面建设先行示范区：建设创新发展与创新文化先行示范区；建设绿色发展先行示范区；建设共享发展先行示范区；建设全面深化改革先行示范区；建设全面扩大开放先行示范区；建设大都市治理现代化先行示范区。"], ["最高人民法院", "最高人民法院成立于1949年10月22日，办公大楼现位于北京市东城区东交民巷27号。最高人民法院是中华人民共和国最高审判机关，负责审理各类案件，制定司法解释，监督地方各级人民法院和专门人民法院的审判工作，并依照法律确定的职责范围，管理全国法院的司法行政工作。除审判案件外，最高人民法院还负责统一管理、统一协调全国法院的执行工作。15"], ["欧元区", "欧元区是指欧盟成员中使用欧盟统一货币的国家区域。1999年1月1日，欧盟国家开始实行单一货币欧元，并在实行欧元的国家实施统一的货币政策。2002年7月，欧元成为欧元区唯一的合法货币。截止到2015年1月，欧元区共有19个成员国，包括奥地利、比利时、芬兰、法国、德国、爱尔兰、意大利、卢森堡、荷兰、葡萄牙、西班牙、希腊、斯洛文尼亚、塞浦路斯、马耳他、斯洛伐克、爱沙尼亚、拉脱维亚、立陶宛。"], ["脱欧", "脱欧即英国脱欧，指英国脱离欧洲联盟的计划。2013年1月23日，英国首相卡梅伦首次提及“脱欧”公投。2016年6月，英国全民公投决定脱欧。2020年1月31日，英国开启了脱欧的实质性进程，正式宣布退出欧盟。"], ["精准扶贫", "习近平总书记于2013年11月在湖南湘西考察时，首次提出了“精准扶贫”。精准扶贫是打赢扶贫攻坚战的基本原则之一，指的是扶持对象精准、项目安排精准、资金使用精准、措施到户精准、因村派人精准、脱贫成效精准。习近平同志指出：“扶贫开发推进到今天这样的程度，贵在精准，重在精准，成败之举在于精准。”"], ["雄安新区", "2017年4月1日，中共中央、国务院决定设立河北雄安新区。新区规划范围涉及河北省雄县、容城、安新3县及周边部分区域，地处北京、天津、保定腹地，区位优势明显、交通便捷通畅，具备高起点高标准开发建设的基本条件。设立雄安新区，是以习近平同志为核心的党中央深入推进京津冀协同发展作出的一项重大决策部署，对于集中疏解北京非首都功能，探索人口经济密集地区优化开发新模式，调整优化京津冀城市布局和空间结构，培育创新驱动发展新引擎，具有重大现实意义和深远历史意义。"], ["CBD", "CBD（CentralBusinessDistrict）即中央商务区，是一个城市里主要商务活动进行的地区，是城市的功能中心，是城市科技、经济、文化的密集区。CBD一般位于城市的黄金地带，具备金融、贸易、服务等多种功能，兼备完善的市政交通与通讯条件。纽约的曼哈顿、东京的银座、香港的中环等都是世界闻名的CBD。"], ["CEPA", "CEPA（CloserEconomicPartnershipArrangement）即2003年内地与香港、澳门特区政府分别签署的《内地与香港关于建立更紧密经贸关系的安排》和《内地与澳门关于建立更紧密经贸关系的安排》。此后，又分别签订了补充协议。其内容涵盖货物贸易领域、服务贸易领域和贸易投资便利化领域。它是国家主体与香港、澳门单独关税区之间签署的自由贸易协议，也是内地第一个全面实施的自由贸易协议。"], ["FOB", "FOB（FreeOnBoard）即船上交货价，即离岸价，是指当卖方在指定的装运港将货物运至买方指定的船上或取得已按此送交的货物，即完成交货。当货物已运至船上时，货物的损耗风险转移至买方，买方自那时起承担一切费用。FOB仅适用于海运或内河运输，并要求卖方负责办理货物出口清关手续。"], ["ISO", "ISO（InternationalOrganizationforStandardization）即国际标准化组织，是一个全球性的非政府组织，是国际标准化领域中一个十分重要的组织。ISO的主要工作是制定国际标准，组织各成员国和技术委员会进行商品和服务的国际交换，以及与其他国际组织合作研究有关标准化的问题。"], ["边际成本", "边际成本是分析商品供求均衡、价格决定等领域经常运用的一个重要概念，指每一单位新增生产的产品（或者购买的产品）带来的总成本的增量。用公式表示为MC=（△TC）/（△Q），其中MC代表边际成本，△TC为总成本变化量，△Q为产品变化量。"], ["财政存量资金", "财政存量资金指政府作为财政收支主体，在其财政年度中因收入支出时间错配而正常持有，收入超预算增长、收入延迟划拨而消极持有，支出计划不完善不可执行而被迫持有的财政资金。简单讲，财政存量资金，就是指收入已经发生、尚未安排预算，或者预算已经安排、尚未形成实际支出的财政资金。也就是各级财政部门和预算单位在年末还没花完的钱，或是没花出去的钱。16"], ["产权制度", "产权制度，是以产权为依托，对财产关系进行合理有效的组合、调节的制度安排。具体表现为建立在一定的生产资料所有制基础上的、对财产占有、使用、支配、处置和收益过程中所形成的各类产权主体的地位、行为权利、责任、相互关系加以规范的法律制度。产权制度与组织制度和管理制度被称为现代企业制度中的三大制度。"], ["出口交货值", "出口交货值指企业生产的、交给外贸部门或自营（委托）出口的（包括销往香港、澳门、台湾地区），用外汇价格结算的以及在国内批量销售或在边境批量出口等的产品价值之和。它是衡量工业企业生产的产品进入国际市场的一个重要指标，是现阶段衡量我国大型工业企业融入世界经济的一个主要参数。"], ["存款储蓄", "公民个人将合法拥有的、暂时不用的货币存入银行或信用合作社等信用机构，当存款到期或客户随时兑换时，由信用机构保证支付利息和归还本金的一种信用行为。存款储蓄包括活期储蓄、定期储蓄、教育储蓄、保值储蓄4种类型。存款储蓄须遵守存款自愿、取款自由、存款有息、为储户保密的原则。"], ["到岸价格", "到岸价格，又称“运费、保险费在内的到达指定目的港的价格”，是卖方负责租船订舱，办理保险手续，支付保险费和运费，并按合同规定将货物运至约定的目的港及凭船单据收取货款价的价格。"], ["地摊经济", "地摊经济是指通过摆地摊来获得收入的一种经济模式。相对其他经营模式，地摊经济的成本低、风险低、价格低，因此门槛也就相对较低。地摊经济在疫情期间也帮助一部分人增加了收入。国务院原总理李克强在山东烟台考察时表示，地摊经济、小店经济是就业岗位的重要来源，是人间的烟火，和“高大上”一样，是中国的生机。"], ["粉丝经济", "粉丝经济是建立在关注者与被关注者之间的创收行为。被关注者多以偶像、演员、行业名人等为主。粉丝经济的用户黏着性一般较高，关注者为被关注者买单意愿较强。粉丝经济有多种经营方式，常见的有粉丝购买演唱会门票、购买影片专辑、购买偶像代言产品等。由于互联网的发展，一些商家平台借势生产一些偶像的周边产品，创造收入。"], ["风险厌恶", "风险厌恶是一个人在承受风险时的偏好特征，可用来测量人们为降低所面临的风险而进行支付的意愿。在降低风险的成本与收益的权衡过程中，风险厌恶者在相同的成本下更倾向于选择低风险的一方。"], ["福布斯", "福布斯集团于1917年在纽约创立。其旗舰刊物《福布斯》（Forbes）杂志，是美国最早的大型商业杂志，也是全球最为著名的财经出版物之一。《福布斯》中文版制作了包含“福布斯中国富豪榜”在内的一系列榜单。"], ["高科技产业", "高科技产业是以高新技术为基础，从事一种或多种高新技术及其产品的研究、生产和技术服务等的企业集合，是知识密集、技术密集的产业，目前主要包括信息技术、生物技术、新材料技术三大领域。"], ["股权激励制度", "股权激励制度是一种长期薪酬激励制度，是解决所有者与管理者代理问题的一项重要的制度创新，指的是允许公司员工持有公司股权，借此使员工与公司的利益达成一致，从而调动员工的工作积极性，在股权的基础上，形成员工与公司收益与风险共担的企业激励制度。"], ["国有控股企业", "国有控股企业指在企业的全部资本中，国家资本占较高比例，并且由国家实际控制的企业，包括绝对控股企业和相对控股企业。其中，国家资本比例大于50%（含50%）的企业为国有绝对控股企业；国家资本比例不足50%，但相对高于企业中的其他经济成分所占比例的企业为国有相对控股企业。"], ["国有资产", "国有资产指属于国家所有的一切财产和财产权利的总和，是国家所有权的客体。具体而言，国有资产包括国家依法或依权力取得和认定的财产，国家资本金及其收益所形成的财产，国家向行政和事业单位拨入经费形成的财产，对企业减税、免税和退税等形成的资产以及接受捐赠、国际援助等所形成的财产。侯丽艳:《经济法概论》,中国政法大学出版社2012年版，第42页。"], ["海洋经济", "国务院在《全国海洋经济发展规划纲要》中给出了海洋经济的定义：海洋经济是开发利用海洋的各类产业及相关经济活动的总和。海洋经济主要的产业有：海洋渔业、海洋油气业、海洋交通运输业、海洋船舶工业、海盐及海洋化工业、滨海旅游业、海水利用业、海洋生物医药业。17"], ["合同", "广义上，合同指所有法律部门中确定权利、义务关系的协议。狭义上，合同是平等主体的自然人、法人、其他组织之间设立、变更、终止民事权利义务关系的协议。"], ["荷兰病", "“荷兰病”指一国特别是中小国家经济的某一初级产品部门异常繁荣而导致其他部门衰落的现象。20世纪60年代，荷兰发现大量天然气，政府大力发展使得出口剧增，经济繁荣。但这却严重打击了荷兰的农业和其他工业部门，到20世纪70年代，荷兰遭受通货膨胀上升、制成品出口下降、收入增长率降低、失业率增加的困扰。"], ["环比增长", "环比增长是通过现在的统计周期与上一个统计周期比较，反映现象逐期的发展程度。例如，计算一年内各月与前一个月对比，说明逐月的发展程度。"], ["汇率", "汇率又称外汇利率，可视为一个国家的货币对另一种货币的价值。具体是指一国货币与另一国货币兑换时的比率或比价，或指用一国货币表示的另一国货币的价格。汇率变动对一国进出口贸易有着直接的调节作用。"], ["货币", "货币是用作交易媒介、储藏价值和记账单位的一种工具，是专门在物资与服务交换中充当等价物的特殊商品，是人们商品价值观的物质附属物和符号附属物。货币的形态有金属货币、实物货币、代用货币、信用货币、存款货币、电子货币。在现代经济领域，货币只有很小的部分以实体通货方式显示，即大部分交易都使用支票或电子货币。"], ["金融科技", "金融科技是指通过在金融领域应用大数据、人工智能、区块链等新技术，向用户提供金融服务，从而提升效率、降低成本的科技。金融科技是金融业未来发展的重头戏。"], ["经济体制", "经济体制即经济管理体制，是在一定的经济制度下，生产关系的具体形式以及组织管理和调节国民经济的制度、方式、方法的总和。我国的基本经济制度是坚持和完善公有制为主体、多种所有制经济共同发展，按劳分配为主体、多种分配方式并存。"], ["经济政策", "经济政策是国家和政府根据一定时期政治、经济形势制定的反映客观经济规律要求并用以指导、影响或干预经济活动的准则，包括宏观经济政策和微观经济政策两个方面。其中，宏观经济政策是国家在一定时期内，按照宏观调控目标的要求而制定的组织、调节、控制经济活动的行为规范和准则。宏观经济政策包括财政政策、货币政策、产业政策、价格政策、收入分配政策等等。"], ["跨境电商", "跨境电子商务是一种国际商业活动，指的是不同国家或关境的交易主体，以电子商务的方式达成交易，而传统电商是在一个国家内通过电子商务平台达"], ["利空", "利空是股市用语，指能够促使股价下跌的因素或信息，如上市公司经营业绩恶化、银行利率调高、经济衰退、通货膨胀、天灾人祸，以及其他政治、经济、军事、外交等方面促使股价下跌的不利消息。"], ["贸易战", "贸易战，亦称“商战”，指国家或地区之间为争夺国际市场或限制他国商品进入本国市场而发生的一系列冲突、对抗和报复行为。贸易战采取的主要方式有征收高额关税、高筑非关税壁垒、削价倾销、外汇贬值以及实行单边配额等。"], ["纳税人", "纳税人，亦称“纳税义务人”或“纳税主体”，是税法上规定的直接负有纳税义务的单位和个人，是税收制度的基本构成要素之一。纳税人的主要义务是按税法规定办理税务登记、进行纳税申报、接受税务检查、依法缴纳税款等。"], ["纳斯达克", "纳斯达克（NASDAQ）是美国全国证券交易商协会自动报价的简称。纳斯达克创建于1971年，目的是为了规范20世纪60年代混乱的场外交易和为小企业提供融资平台。纳斯达克是全世界第一个完全采用电子交易并面向全球的股市，现已成为全球第二大的证券交易市场。"], ["牛市", "牛市是股票市场上预料股票行情看涨的专门术语，指当股票市场上买入者多于卖出者，预料将来股票的价格要上涨的市场情形。"], ["平准基金", "平准基金，又称干预基金，是政府通过特定的机构（证监会、财政部、交易所等）以法定方式建立的基金，主要是为了防止股市暴涨暴跌，稳定证券市场。从平准基金作用的市场来分，目前主要有外汇平准基金、国债平准基金、股市平准基金等几类。"], ["普华永道", "普华永道即普华永道会计师事务所，与毕马威、安永、德勤合称为世界四大会计师事务所。普华永道是四大会计师事务所中规模最大，客户最多的一个。普华永道是在1998年由普华和永道两个会计师事务合并而成，现已在152个国家中设有860余家分公司和办事处，主要提供人力资源支持、财务咨询、管理咨询服务等。"], ["普惠金融体系", "普惠金融体系是联合国率先提出的一个新概念。普惠金融体系的目的在于向社会所有的阶层开放全方位的金融体系服务。它的创新点在于颠覆了传统的金融体系仅对富人服务的理念，使得贫困群体、微小企业等金融弱势群体也能享有合适的金融服务和产品。"], ["企业产权", "企业产权是为了社会经济发展的需要，随着公司制度和法律的创新而产生的一种结果。它以财产所有权为基础，反映了投资主体在法律形式上对企业财产所拥有的权益和义务。企业产权主要包括三种形态：实物、股权、债权形态。"], ["全球创新指数", "全球创新指数由世界知识产权组织联合欧洲工商管理学院和康奈尔大学共同创立。它反映的是全球132个经济体的综合创新能力。每年，世界知识产权组织都会发布《全球创新指数报告》。《2021年全球创新指数报告》显示中国排名第12位，达到前15位，属于创新型国家。"], ["融资", "融资指为支付超过现金的购货款而采取的货币交易手段，或为取得资产而集资所采取的货币手段。融资通常是货币资金的持有者和需求者之间，直接或间接地进行资金融通的活动。"], ["税收优惠", "税收优惠是国家干预经济的重要手段之一。它是指为了配合国家在一定时期的政治、社会和经济发展总目标，政府利用税收制度，按照预定目的，在税收方面采取相应的激励和照顾措施，以减轻某些纳税人应履行的纳税义务。"], ["同比增长", "同比增长一般是指为了消除季节变动的影响，用以说明本期发展水平与去年同期发展水平对比而达到的相对增长速度。"], ["透明度原则", "透明度原则是指成员方所在的政府颁布的相关政策法律等一系列与交易有关的规定和各成员国之间达成的与贸易相关的协定都必须坦诚公布，让交易方与成员国都有所了解。透明度原则是世贸组织的一个非常重要的原则，旨在提高贸易的透明度，促进各国之间的公平交易。"], ["外包", "外包也称资源外包、资源外取、外源化，是指企业动态地配置自身和其他企业的功能和服务，并利用企业外部的资源为企业内部的生产和经营服务。企业为维持组织的核心竞争能力，解决组织中人力不足的困境，可将组织的非核心业务委派给外部的专业公司，以降低营运成本，提高品质，集中人力资源，提高顾客满意度。"], ["网联平台", "网联平台，即非银行支付机构网络支付清算平台，是在央行指导下由中国支付清算协会组织发起的。网联在功能上与银联类似，但主要针对非银行支付机构发起的网络支付业务以及为支付机构服务的业务，满足基于支付账户与银行账户（含电子账户）的网络支付跨行资金清算处理。建设网联平台的最大意义在于切断大量第三方支付机构直连银行的模式，回归支付和清算相独立的业务监管规则。"], ["物流", "物流是物品从供应地向接收地的流动过程，根据实际需要，将储存、运输、装卸、包装、搬运、流通加工、配送、信息处理等基本功能实施有机结合。"], ["消费市场", "消费市场指用来交换消费品（包括劳务）的场所。消费市场是联系生产和消费的桥梁，是与商品销售活动（商品从生产转移到消费者手中）有关的经济关系的总和。消费市场以商品生产和商品交换为基础。"], ["小农经济", "小农经济是指以生产资料个体所有制为基础，以家庭为生产单位，依靠自己的劳动满足自身消费的小规模农业经济。它的特点是：自给自足，生产力水平较低。小农经济是中国封建社会农业生产的主要模式。"], ["熊市", "熊市是牛市的对称，是股票市场上预料股票行情看跌的专门术语，指当股票市场上卖出者多于买入者，预料未来的股票价格要下跌，股市前景悲观时的市场情形。"], ["询盘", "询盘亦称询价，与发盘对称，是指国际贸易业务中，交易的一方准备购买或出售某种商品而向潜在的供货人或买主询问该商品的交易条件或交易可能性的业务行为。"], ["银发经济", "银发经济的消费主体是老年人。随着社会老龄化程度的加深，银发经济越来越凸显其重要性。银发经济主要涵盖日用品经济、保健品经济、旅游经济等方面。"], ["营商环境", "营商环境是指市场主体在经营过程中涉及到的政治、人文、经济、文化等环境的集合。营商环境的好坏会影响当地招商引资的数量，从而对当地的经济发展、税收、社会就业等方面产生影响。"], ["斩仓", "斩仓指的是当投资者的账户净值除以占用的保证金低于规定水平时，投资者没有及时补交保证金的情况下，公司将不得不采取强行平仓的举动，或是投资者为防止亏损扩大而采取的止损行为。"], ["战略性新兴产业", "战略性新兴产业是以重大技术突破和重大发展需求为基础，对经济社会全局和长远发展具有重大引领带动作用，知识技术密集、物质资源消耗少、成长潜力大、综合效益好的产业，包括：新一代信息技术产业、高端装备制造产业、新材料产业、生物产业、新能源汽车产业、新能源产业、节能环保产业、数字创意产业、相关服务业等九大领域。20"], ["政府债券", "政府债券指政府为筹集资金向出资者出具并承诺在一定时期支付利息和偿还本金的债务凭证，包括国家债券即中央政府债券、地方政府债券和政府担保债券等。"], ["直接投资", "直接投资，是“间接投资”的对称，指投资者直接在国外（境外）举办、经营企业，开厂设店，或收买当地原有企业，或与当地企业合作取得各种直接"], ["滞胀", "滞胀的全称是停滞性通货膨胀。在宏观经济学中，特指经济停滞与高通货膨胀、失业以及不景气同时存在的经济现象。它是通货膨胀长期发展的结果。滞胀包括两方面的内容：①经济停滞，包括危机期间的生产下降和非危机期间的经济增长缓慢和波动以及由此引起的大量失业；②持久的通货膨胀以及由此引起的物价上涨。"], ["众筹", "众筹是指筹资者通过互联网平台向大众筹集资金，为个人或组织从事某项活动提供资金支持，而后以实物或部分股权予以回报的新型融资模式。众筹具有低门槛、多样性、依靠大众力量、注重创意的特征。"], ["专利", "专利来源于拉丁语LitteraePatentes，意为公开的信件或公共文献，是中世纪的君主用来颁布某种特权的证明，现一般指某项发明创造的首创者所拥有的受保护的独享权益。"], ["转口贸易", "转口贸易又称中转贸易，是指国际贸易中进出口货物的买卖，不是在生产国与消费国之间直接进行，而是通过第三国转手进行的贸易。这种贸易对中转国来说就是转口贸易。转口贸易主要发生在地理位置优越、贸易限制较少、运输便利的国家和地区，如伦敦、中国香港、新加坡等。"], ["资本市场", "资本市场，又称“长期资金市场”，是指以期限在1年以上的金融工具为媒介，进行长期性资金交易活动的市场。按金融工具的种类划分，资本市场可分为股票市场和债券市场（合称“证券市场”），按其市场职能划分，可分为发行市场和交易市场。"], ["资源配置", "资源配置是指作为生产要素的经济资源在不同用途和不同使用者之间的分配。合理的资源配置是力图将生产要素的各组成部分按一定的比例结合，以使它们各自都得到充分利用，并产生最大的效能。"], ["自由港", "亦称自由口岸，是一国划定的、置于海关辖区以外的特别区域，外国船只可以自由进出，全部或绝大多数外国商品可以豁免关税进出的港口。设立自由港的目的在于利用自由港的特殊条件发展过境贸易，获取运费、堆栈费及加工费等。"], ["自由贸易", "自由贸易是指国家取消对进出口贸易的限制和障碍，取消本国进出口商品各种优待和特权，对进出口商品不加干涉和限制，使商品自由进出口，在国内市场上自由竞争的贸易政策，即政府不采用关税、配额或其他形式来干预国际贸易的政策。"], ["租售同权", "租售同权指租房与买房的居民享有平等的权利享受范围。2017年广州人民政府发布《关于印发广州市加快发展住房租赁市场工作方案的通知》，率先提出“租售同权”。《方案》提出，赋予符合条件的承租人子女享有就近入学等公共服务权益，保障租购同权。后住建部等9部门联合印发《关于在人口净流入的大中城市加快发展住房租赁市场的通知》，提出广州、深圳、南京等12个首批试点城市。"], ["北洋水师", "北洋水师，即“北洋海军”“北洋舰队”，是清政府在洋务运动过程中建立起来的第一支近代化海军舰队。1875年，李鸿章奉命督办海防事宜，筹办海军。清政府向英、德等国购买了一批军舰，并派遣留学生赴英、法学习。1888年，北洋水师正式建立。中日甲午战争中，北洋水师全军覆灭，标志着洋务运动破产。"], ["兵马俑", "兵马俑是古代依据军队的兵、马、车形象而塑造的陶制陪葬俑。兵马俑以陕西临潼秦始皇陵兵马俑和咸阳杨家湾西汉兵马俑为代表。"], ["城邦制度", "城邦制度指古希腊城邦政治制度，于公元前8世纪至公元前6世纪开始形成。城邦是一个以城市为中心的独立主权国家，也是古希腊最早的国家形式，小国寡民是其基本特征。在古希腊人建立的众多城邦中，雅典城邦以其政治民主、经济发达和文化繁荣而著称。"], ["大同译书局", "大同译书局，是清末维新派创办的编译出版机构。1897年秋冬间，梁启超、康广仁等集股创设于上海，由康广仁经理。梁启超确定编译方针为：首译各国变法之书，以备取法；译学堂各种功课书，以便诵读；译宪法书，以明立国之本；译章程书，以资办事之用；译商务书，以兴中国商学，挽回利权。大同译书局曾刊印《大彼得变政考》《经世文新编》《日本书目志》《孔子改制考》《春秋董氏学》等。"], ["大萧条", "大萧条，指的是1929年至1933年，始发于美国，最后扩散到整个资本主义世界的经济危机。大萧条持续时间长，波及范围广，且对经济造成极其严重的破坏，是资本主义经济制度基本矛盾的集中体现，对资本主义世界各国产生"], ["东汉", "东汉，又称后汉，是公元25年刘秀称帝后定都洛阳，重建的汉政权。到公元220年汉献帝被废，东汉共历195年。东汉在科技、医学、文学等方面成就突出。这一时期，蔡伦改进了造纸术，张衡制造了浑天仪、地动仪，华佗发明了麻沸散、创制了五禽戏，张仲景写成了《伤寒杂病论》，许慎创作了《说文解字》等。但东汉后期，宦官、外戚交替专权，最终导致东汉的灭亡。"], ["二重证据法", "二重证据法是中国近代史学方法术语，产生于20世纪20年代中期，最早由王国维提出，主要是指考古发掘的材料与文献记载相互验证的一种考证古史的方法。通过这种方法，新材料可以得到合理的解释，旧材料可以得到重新鉴定，而人们有关古史的立论，可以经过考古发现与文献记载的双重判定，从而也更确凿可信。"], ["改良主义", "改良主义是工人运动中主张以不触动资本主义制度基础的改良，来代替无产阶级革命的资产阶级或小资产阶级思潮。它美化资本主义制度，抹杀资本主义国家的阶级实质,宣扬阶级合作，企图通过微小的改革，麻痹广大人民群众的革命意志，维护和巩固资本主义制度。戊戌变法被视为“改良主义”在中国的一次重要实践。"], ["抗美援朝", "抗美援朝是20世纪50年代初中国人民为保家卫国、制止美国帝国主义在东方的侵略而进行的战斗，是朝鲜战争的一部分，又称抗美援朝运动或抗美援朝战争，抗美援朝战争形成了伟大的“抗美援朝精神”。"], ["美国黑人民权运动", "美国黑人民权运动又译为“非裔美国人民权运动”，是20世纪50年代中期至60年代中期，美国黑人反对种族歧视和种族压迫、争取政治经济和社会平等权利的大规模斗争运动。黑人民权运动是美国60年代改革运动的重要组成部分之一。1954年，联邦最高法院宣布公共教育方面的种族隔离制违宪，揭开了黑人民权运动的序幕。废除种族隔离制、实现种族平等，是此次黑人民权运动的基本目标。美国民权运动领袖马丁·路德·金发表的著名演说《我有一个梦想》成为民权运动的高峰。"], ["明代", "明代是中国历史上最后一个由汉族建立的大一统王朝，共传12世，历16帝，享国276年。1368年朱元璋称帝，定国号为明，都城应天府。明初历经洪武之治、永乐盛世、仁宣之治等治世，政治清明，国力强盛。1644年，李自成攻入北京，明崇祯帝朱由检于煤山（今景山）自缢，明亡。明代是中国继周、汉、唐之后的繁盛时代。"], ["七七事变", "七七事变，又称卢沟桥事变。1937年7月7日夜，日军借口一个士兵失踪，要求进入宛平城搜查，遭到中国守军的拒绝，日军随即进攻宛平城，中国军队奋起抵抗。七七事变是日本帝国主义向中国发动大规模侵略战争的开始，也是中华民族全面抗战的起点。"], ["秦律", "秦律是秦代法律的总称，是秦始皇一统六国以后开始修订的法律条文。秦律于公元前356年正式颁布，内容涉及政治、经济、社会等方面。其本质是维护封建阶级的统治。秦律作为较为完备的法律条文，对中国古代后来的法律产生了一定的影响。"], ["清王朝", "清王朝是中国历史上第二个由少数民族建立的统一政权，也是中国最后一个封建帝制王朝，共历12帝，历时近300年。1616年，建州女真部首领努尔哈赤建立后金。1636年，皇太极改国号为清。1644年入关，迁都北京，并逐步统一全国。清朝前期，统一的多民族国家得到巩固，基本上奠定了我国版图，同时君主专制发展到顶峰。1912年2月12日，清帝退位，清朝的统治终结。"], ["日耳曼人", "日耳曼人是居住在欧洲东北部的一些古代印欧部落的人的总称。他们自称“德意志人”，罗马人和克尔特人称之为“日耳曼人”。约自公元前5世纪起分布于莱茵河下游、北海、波罗的海、维斯瓦河、多瑙河之间的广大地区以及斯堪的纳维亚半岛南部和日德兰半岛。"], ["商朝", "商朝是继夏朝之后我国历史上第二个奴隶制王朝，是中国第一个有直接的同时期的文字记载的王朝。大约在公元前16世纪，商部落首领汤推翻了夏的统治，建立了商朝。商朝处于奴隶制的鼎盛时期，农业、畜牧业、手工业等发展迅速，著名的司母戊大方鼎就是其中的杰出代表。商朝前期的王位继承制度实行的是兄终弟及，后期则是父死子继。"], ["四品", "“四品”在此处指明代宦官的最高品级，不是官员的品级。明朝宦官机构主要以二十四衙门为主体，包括十二监、四司、八局，其中十二监中各监掌管者称太监，居四品，郑和即是十二监中的正四品内官监太监。尽管太监有品级，但是其俸禄却远少于同品级的官员。"], ["太监", "太监即宦官，指古代被阉割后在宫廷内侍奉皇帝及其家族成员的男性官员，史书上称为寺人、内侍、中官、内监等，是我国封建专制主义政治体制特有的产物。宦官的最早文字记载，见于《诗经》和《周礼》。据《周礼》记载，周代已经有寺人。"], ["《天津条约》", "此处特指中英、中法在天津签订的条约。1858年，清政府被迫与英法两国签订了《天津条约》。条约规定：允许外国公使进驻北京，增开沿海沿江十处通商口岸；赔偿英法巨额白银；允许外国军舰和商船在长江各口岸通航等。"], ["铁道游击队", "铁道游击队，名称是“鲁南军区铁道大队”，隶属于八路军“一一五师苏鲁支队”。这是一支在抗日战争时期，由中国共产党领导的抗日武装力量。铁道游击队主要活跃于山东鲁南地区，他们不畏艰险，与日本侵略者展开坚决斗争，为战争的胜利做出巨大贡献。"], ["英国东印度公司", "英国东印度公司也叫不列颠东印度公司，于1600年创立。公司拥有伊丽莎白一世授予的皇家许可证，垄断印度贸易21年之久。它不仅垄断贸易，还拥有军队。英国东印度公司在印度实行殖民统治和经济掠夺，并参与了国际奴隶的贩卖，加快了英国资本主义原始积累的进程。"], ["圆桌会议", "圆桌会议此处指英国政府1930年至1932年间在伦敦召开的由印度各派政治力量和政党代表参加的会议。会议主要讨论印度宪政改革的问题。3次圆桌会议没有达成积极的成果，但为英国政府和议会制定“印度政府组织法”（亦称《1935年宪法》）提供了材料。后“圆桌会议”成为国际上通行的一种会议形式，主要表现与会各方之间无上下席次之分。"], ["智人", "智人，是人属下的物种，历史上曾经出现过多个人属，但随着历史的演进，智人在世界各地逐渐取代了其他人属，占据了统治地位，并最终成为人属下的唯一现存物种。智人可以分为早期智人（古人）和晚期智人（解剖结构上的现代人）。"], ["PM2.5", "PM2.5的中文名称为细颗粒物，其中2.5代表的是直径小于等于2.5微米的颗粒物。其表面积较大，活性较强，易附带病毒、细菌、重金属，并极易进入人体内，对人体造成伤害，还可能会导致癌变或遗传物质的突变以及使呼吸系统受到影响等。其次，PM2.5还会造成对生态系统的破坏，降低能见度。"], ["长江", "长江发源于青藏高原的唐古拉山主峰各拉丹冬雪山西南侧，是世界第三、我国第一大河，也是长江经济带发展、长江三角洲一体化发展等国家战略的重要依托，是连接丝绸之路经济带和21世纪海上丝绸之路的纽带。长江干流全长6300余千米，自西而东流经青海、四川、西藏、云南、重庆、湖北、湖南、江西、安徽、江苏、上海等11个省（自治区、直辖市）注入东海。其流域面积约180万平方千米，约占我国国土面积的18.8%。长江流域是我国重要的生态安全屏障区，也是我国水资源配置的战略水源地。22"], ["次生灾害", "许多自然灾害，特别是等级高、强度大的自然灾害发生以后，常常诱发出一连串的其他灾害，这种现象叫灾害链。灾害链中最早发生的起作用的灾害称为原生灾害；而由原生灾害所诱导出来的灾害则称为次生灾害。23"], ["大陆架", "根据1982年《联合国海洋法公约》的有关规定：沿海国的大陆架包括其领海以外依其陆地领土的全部自然延伸，扩展到大陆边外缘的海底区域的海床和底土，如果从测算领海宽度的基线量起到大陆边的外缘的距离不到200海里，则扩展到200海里的距离；如果超过200海里，则最多可扩展到350海里。大陆架上的自然资源主权，归属沿海国所有，但相向或相邻国家间可以有具体的大陆架界限划定原则。"], ["丹霞地貌", "丹霞地貌是指由红色沙砾构成并以赤壁丹崖为特征的一类地貌，是红层地貌的一种类型。丹霞地貌区奇峰林立，景色瑰丽。其主要分布在中国、美国、中欧和澳大利亚等地，以中国分布最广。2010年“中国丹霞”被联合国教科文组织正式批准列入《世界遗产名录》。"], ["地幔对流", "软流层中的地幔物质由于热量增加、密度减小、体积膨胀产生上升热流，上升的地幔物质遇到地壳底部向四周分流，随着温度下降，地幔物质密度增大，又沉降到地幔中，这一过程称为地幔对流。地幔对流是人们根据对地球的认识而推断出来的一种假说。地幔对流中的上升流动与大洋中脊裂谷和大陆裂谷的形成、地表热点和火山现象密切相关，对地球物理学有重要意义。"], ["洞庭湖", "洞庭湖位于湖南省北部，长江中游荆江河段南岸。湖盆周长803.2公里，总容积220亿立方米，其中天然湖泊容积178亿立方米，河道容积42亿立方米。洞庭湖是长江流域重要的调蓄湖泊，具强大蓄洪能力，曾使长江无数次的洪患化险为夷。洞庭湖也是湖南省乃至全国最重要的商品粮油基地、水产和养殖基地。24"], ["敦煌", "敦煌是国家历史文化名城，位于河西走廊的最西端，地处甘肃、青海、新疆3省交汇处，是历史上著名的边防重镇。敦煌位于古代中国通往西域、中亚和欧洲的交通要道——丝绸之路上，曾经拥有繁荣的商贸活动。敦煌以敦煌石窟和敦煌壁画闻名天下，是世界遗产莫高窟和汉代长城边陲玉门关、阳关的所在地。"], ["高原气候", "高原气候指高原条件下形成的气候。高原气候的主要特点有：太阳辐射强度大，其中紫外线辐射强度尤为显著；温度日较差显著；降水明显受地形影响；多大风、雷暴和冰雹等天气。高原气候下，低压缺氧，易出现高原反应。"], ["海洋气候", "海洋气候是指海洋天气的多年平均物理状态及其时空统计变化特征。它既反映平均状况，也反映极端情况。海洋气候全年气温变化和缓，夏、秋季较迟，冬暖夏凉；全年雨量分配均匀。海洋气候研究能为航海、海洋资源开发和利用、港口建设以及气候预测提供一定的数据依据和服务。"], ["好望角", "好望角是非洲大陆西南端岬角，在南非开普半岛南端，是欧洲、美洲与亚洲间海上交通要冲。因多风暴，被葡萄牙航海家迪亚士称为“风暴角”。后因可由此通往富庶的东方，被葡萄牙国王改称“好望角”，并沿用至今。"], ["黄果树瀑布", "黄果树瀑布位于中国贵州省安顺市镇宁布依族苗族自治县，为黄果树瀑布群中规模最大的一级瀑布，是世界著名大瀑布之一，以水势浩大著称。瀑布高度为77.8米，其中主瀑高67米；瀑布宽101米，主瀑顶宽83.3米。黄果树瀑布属于喀斯特地貌中的侵蚀裂典型瀑布。"], ["江户", "江户即江户城，是日本首都东京都的古称。其位于日本本川东南部，东临东京湾。1603年德川家康在此建幕府，日本明治政府将首都从京都迁至江户，改名东京。作为全国政治、经济中心，江户城得到很大的发展，最终形成了现在东京的规模。"], ["景德镇", "景德镇在东晋时，称“昌南镇”，北宋真宗景德元年定名“景德镇”，被誉为“瓷都”。景德镇以烧制青白瓷闻名，生产的瓷器“白如玉、明如镜、薄如纸、声如磬”。定窑以烧制白瓷著称，汝窑以青瓷著称，钧窑以彩色瓷器著称，尤以胭脂红最为著名。"], ["九寨沟", "九寨沟位于四川省西北部岷山山脉南段的阿坝藏族羌族自治州九寨沟县漳扎镇境内，因沟内有树正、荷叶、则查洼等9个藏族村寨而得名。九寨沟以翠湖、叠瀑、彩林、雪峰、藏情、蓝冰“六绝”著称于世，是中国唯一、世界罕见的以高山湖泊群和瀑布群以及钙化滩流为主体的风景名胜区。九寨沟集原始美、自然美、野趣美为一体，具有极高的游览观赏价值和科普价值，被誉为“人间仙境”“童话世界”。同时，九寨沟作为一个世界罕见的地质地貌带和生物多样性地区，具有无可替代的生态意义和科学研究价值。251992年，九寨…"], ["密西西比河", "密西西比河是美国第一长河，被称作“美国的母亲河”，是仅次于非洲的尼罗河、南美洲的亚马孙河和中国的长江的世界第四长河流。其全长为6021千米，流域面积322万平方千米，占美国本土面积的41%。"], ["暖温带", "暖温带是一种气候带的分区。暖温带主要分布的两种气候类型为温带季风气候和温带大陆性气候，常见气候表现为：夏季高温多雨，冬季寒冷干燥。暖温带的代表性农作物有花生、冬小麦、棉花等。"], ["浅源地震", "浅源地震是指震源深度在70公里以内的地震，发生的频率最高，产生的影响最大。大陆上，浅源地震占绝大部分，占比百分之九十五以上。262008年的汶川大地震、2010年的玉树地震都属于浅源地震。"], ["全球变暖", "全球变暖是一种地球气候变化的现象，指全球气温整体升高。致使全球变暖的主要原因是二氧化碳等温室气体的过量排放，同时人类对森林乱砍滥伐，使得地球吸收二氧化碳的能力减弱。全球变暖的危害很多，比如生态破坏、食物链断裂等。"], ["日心说", "日心说也称地动说，是和地心说相对的关于天体运动的学说。这种学说认为宇宙的中心是太阳，而不是地球。波兰天文学家哥白尼提出的日心说有力地打破了长期以来居于宗教统治地位的地心说，是天文学的一大变革。"], ["少林寺", "少林寺位于河南登封西北少室山北麓五乳峰下，是我国现存古代著名佛教寺庙之一。北魏太和十九年（公元495年），孝文帝为了安置印度高僧跋陀，在嵩山少室山北麓敕建少林寺。孝明帝孝昌三年（527年），达摩来此首传禅宗，使之成为中国佛教禅宗派的“祖庭”。唐初，少林寺和尚辅佐唐太宗开国有功，从此少林僧众习武蔚然成风，代代相传，少林寺成为“少林派”的发源地。现今，少林寺继承和发扬自己独特的优良传统，恢复禅堂，每年举行精进禅七，收集整理古籍善本。少林寺藏经阁已被国家列为全国古籍重点保护单位…"], ["水星凌日", "由于水星和地球的绕日运行轨道不在同一个平面，而是有一个7度的倾角，两者只有两个交点：升交点与降交点。因此，当水星处于这两个交点附近，且太阳、水星、地球三者又恰好排成一条直线时，在地球上可观察到太阳上有一个小黑斑在缓慢移动，这种现象称为“水星凌日”。“水星凌日”现象平均一百年出现13.4次。"], ["塔河油田", "塔河油田位于新疆塔里木盆地北部，是中国第一个以海相碳酸盐岩油田为主、个体原油产量达到亿吨级目标的油田。1997年，部署在奥陶系潜山的沙46"], ["台风", "台风，或称飓风，是指形成于热带或副热带洋面上的热带气旋。世界气象组织将其定义为：中心持续风速在12级至13级的热带气旋为台风或飓风。发生在北太平洋西部、国际日期变更线以西范围内的热带气旋称为“台风”，发生在大西洋或北太平洋东部的热带气旋则称为“飓风”。台风具有季节性，强台风发生时常伴有大暴雨、大海潮、大海啸，且人力不可抗拒，易造成人员伤亡。"], ["太阳风", "太阳风是日冕高温膨胀不断抛出的超声速等离子体带电粒子流，主要由电离氢和电离氦组成。1958年美国物理学家帕克等人最先发现这种现象，并称其为“太阳风”。能证明太阳风存在的最有力证据是彗星在接近太阳时的“长尾巴”。"], ["泰晤士河", "泰晤士河是英格兰南部的河流，发源于英格兰西南部的科茨沃尔德山，全长346公里，流经牛津、伦敦等英国重要城市，注入北海。泰晤士河在英国历史上占有举足轻重的地位，它供应了伦敦两岸居民的生活生产用水和水产品，也对英国航运外贸的发展起到了至关重要的作用，沿岸发展起来的风景胜地更是绝好的旅游资源。泰晤士河被称为“英国的母亲河”。"], ["纬度", "在地球仪上，与赤道平行的圆圈即为纬线。纬线指示东西方向。赤道的纬度为0°，是纬度的起始线。从赤道向北和向南各分90°，称北纬和南纬，分别用N和S表示。纬线在南北极缩成一点。全球0°~30°为低纬度地区，30°~60°为中纬度地区，60°~90°为高纬度地区。"], ["温带气候", "南半球温带区和北半球温带区的代表性气候称为温带气候，其特点是冬冷夏热，四季分明。根据地区的降水特点的不同，可分为温带海洋性气候、温带大陆性气候、温带季风性气候和地中海气候4类。我国大部分地区都属于温带气候。"], ["温室效应", "温室效应，是“大气保温效应”的俗称，指由于大气中温室气体含量增加，地球热量无法充分向外层空间散发而导致地表温度升高的现象。现已发现的温室气体主要有二氧化碳、甲烷和氟利昂等。"], ["巫峡", "巫峡，又名大峡，地处重庆，与西陵峡、瞿塘峡并称为长江三峡，巫峡是三峡中的第二峡，总长度达46公里，绵延不绝壮观异常。巫峡以其秀美幽静的景色闻名天下，吸引国内外众多游客前来游玩。"], ["无废城市", "“无废城市”是以创新、协调、绿色、开放、共享的新发展理念为引领，通过推动形成绿色发展方式和生活方式，持续推进固体废物源头减量和资源化利用，最大限度减少填埋量，将固体废物环境影响降至最低的城市发展模式。“无废城市”是一种先进的城市管理理念，旨在最终实现整个城市固体废物产生量最小、资源化利用充分、处置安全的目标。28"], ["五大连池", "五大连池位于中国黑龙江省黑河市境内，地处小兴安岭山地向松嫩平原的转换地带。因新期火山喷发的熔岩，阻塞了远古河道，形成了5个溪水相连的串珠状火山堰塞湖，五大连池因此而得名。五大连池1060平方公里的区域内，火山林立，熔岩浩瀚，湖泊珠连，矿泉星布；14座新老期火山群峰耸立，800"], ["雾霾", "作为一种大气污染状态，雾霾是对大气中各种悬浮颗粒物含量超标的总述，是特定气候条件与人类活动相互作用的结果，常见于城市。高密度人口的经济及社会活动会排放大量细颗粒物（PM2.5），一旦排放量超过大气循环能力和承载度，细颗粒物浓度将持续集聚。此时，如果受静稳天气等影响，极易出现大范围的雾霾。雾霾的主要成分是二氧化硫、氮氧化物和可吸入颗粒物。雾霾天气会给气候、环境、健康、经济等方面造成显著的负面影响。"], ["西湖", "西湖，又名钱塘湖、西子湖，位于浙江省杭州西部，是我国著名的风景名胜区。西湖三面环山，东面临城，湖周约15公里，面积约6.5平方公里。以白堤、苏堤为界，西湖被分为外西湖、北里湖、岳湖、西里湖和小南湖，有著名的苏堤春晓、平湖秋月、花港观鱼、柳浪闻莺、双峰插云、三潭印月、雷峰夕照、南屏晚钟、曲院风荷、断桥残雪等“西湖十景”。2011年6月，西湖被列入《世界遗产名录》。"], ["香山", "香山位于北京市海淀区，主峰香炉峰，俗称“鬼见愁”，海拔575米。香山之名源于佛教经典，是大悲观世音菩萨得道的地方。重阳阁、碧云寺等都是香山的著名景点。香山的“西山晴雪”是著名的“燕京八景”之一。香山红叶驰名中外，是中国四大赏枫胜地之一。依香山而建的香山公园是一座具有山林特色的皇家园林，也是北京十大公园之一。30"], ["亚洲", "亚洲，是亚细亚洲的简称，位于东半球的东北部，亚欧大陆东部，东临太平洋，南临印度洋，北临北冰洋，是世界上面积最大、人口最多的一个洲。苏伊士运河是亚洲与非洲的分界线。亚洲地势起伏很大，中部高，四围低。亚洲大陆跨寒、温、热三带，气候类型复杂多样，季风气候典型、大陆性气候显著。"], ["堰塞湖", "堰塞湖是由火山熔岩流、冰碛物或地震活动引起山崩、滑坡体等堵截山谷、河谷或河床后贮水而形成的湖泊。堰塞湖在各种自然灾害中占的数量比例不大，但其危害性很强。若堰塞湖蓄水到一定程度，处理不当或遇到强余震、暴雨，则可能溃决，形成大范围洪水灾害。"], ["伊朗高原", "伊朗高原位于亚洲西南部，帕米尔高原和亚美尼亚高原之间，包括伊朗中部和东部、阿富汗以及巴基斯坦的西部。伊朗高原是个封闭性高原，四周高山环绕，中央是辽阔的内陆盆地。伊朗高原是亚热带干旱和半干旱气候，降水稀少，夏季高温、冬季温和，植被以草原、荒漠为主。"], ["月幔", "月幔是月球的组成部分，科学家推测月幔的厚度大约为1000千米，并且月幔可以分为上月幔、下月幔和衰减带。嫦娥四号探测数据的研究结果证实了月幔富含橄榄石。"], ["珠穆朗玛峰", "珠穆朗玛峰是喜马拉雅山脉的主峰，是世界上最高的山脉，目前最新高度为8848.86米。珠峰位于中国与尼泊尔的边境线上，北部在西藏，南部在尼泊尔境内。其峰高势伟，气候多变，雨季暴雨频繁，冬季气温极低。"], ["3D 打印", "3D打印，即快速成型技术的一种，是一种以数字立体模型文件为基础，运用粉末材料、液化材料、丝化材料等，通过逐层堆积的方式来构造物体的技术。3D打印常用于模具制造、工业设计等领域。"], ["CPU", "CPU（centralprocessingunit）即中央处理器，作为计算机系统的运算和控制核心，是信息处理、程序运行的最终执行单元，主要包括运算器和控制器两个部分。中央处理器的功能主要是处理指令、执行操作、控制时间、处理数据。"], ["DNS", "DNS即计算机域名系统（DomainNameSystem），由解析器和域名服务器组成，是因特网的一项核心服务。它作为可以将域名和IP地址相互映射的一个分布式数据库，能够使人更方便地访问互联网，而不用去记住能够被机器直接读取的IP数串。"], ["超文本", "超文本是一种网状文本，它以超链接的方法，将各种不同空间的文字信息组织在一起，用以显示文本及与文本之间相关的内容。超文本的格式有很多，目前最常使用的是超文本标记语言（HTML）及富文本格式（RTF）。"], ["虫洞", "虫洞，又被称作“爱因斯坦-罗森桥”，是1916年由奥地利物理学家路德维希·弗莱姆首次提出的概念，并于1935年由爱因斯坦及纳森·罗森加以完善，指宇宙中可能存在的连接两个不同时空的狭窄隧道。迄今为止，科学家们还没有观察到虫洞存在的证据。"], ["臭氧", "臭氧（化学式为O3）是氧气（化学式为O2）的同素异形体，在常温下，它是一种有特殊臭味的淡蓝色气体。臭氧主要存在于距地球表面20公里~35公里的平流层的臭氧层中。它吸收对人体有害的短波光线，防止其到达地球，以保护地球表面生物不受紫外线侵害。在常温常压下，臭氧稳定性极差，可自行分解为氧气。氧气通过电击可变为臭氧。"], ["地震预警系统", "地震预警是指地震发生时，离震中最近的地震台对已发生的地震进行震级和破坏强度的初步检测，然后通过数据中心传递到可能受影响的地区以便提前采取应急措施。地震预警系统是指实现地震预警的配套设施。按照系统响应的顺序可包括：地震监测台网、地震参数快速判测系统、警报信息快速发布系统和预警信息接收终端。整套系统的特点是高度集成、实时监控、飞速响应。其中，飞速响应这一点至关重要。"], ["蜂窝数据流量", "蜂窝数据流量，即手机流量，指手机上网产生的流量数据。打开手机软件或进行互联网操作时，会和服务器之间交换数据，手机流量就是指这些数据的大小。蜂窝数据是从数据的传输到交换都采用分组技术，用户端配置无线分组"], ["复兴号", "复兴号，是由中国铁路总公司牵头组织研制、具有完全自主知识产权、达到世界先进水平的中国标准动车组列车。“复兴号”的设计寿命达到30年，每6600公里检修，车辆更耐用，维修周期更长，运行效率更高。2017年6月26日，“复兴号”在京沪高铁线上双向首发，中国铁路技术装备由此跃入全新的中国标准动车组时代。"], ["干细胞", "干细胞是一类具有自我更新、高度增殖和多向分化潜能的细胞群体。按照分化潜能的高低，干细胞可以分为全能干细胞、多能干细胞和单能干细胞三大类。全能干细胞具有形成完整个体的分化潜能，多能干细胞具有分化出多种细胞组织的潜能，单能干细胞只能向一种类型或密切相关的两种类型的细胞进行分化。"], ["黑洞", "黑洞是广义相对论所预言的半径收缩到引力半径以内的特殊天体，它被视为是宇宙中密度最高的天体。它是质量很大的恒星演化到最后，发生超新星爆发时残留下来的恒星的内核在引力作用下坍缩而形成的。黑洞是一个空间和时间极度弯曲的地区，由于区域内引力场极强，靠近它的任何物质都会被吸收进去而不得逃脱，即使光也无法逃离。"], ["开普勒定律", "开普勒定律是德国科学家开普勒提出的行星运行的三大定律。第一定律即轨道定律：行星绕太阳运行的轨道是椭圆，太阳位于椭圆的一个焦点上；第二定律即面积定律：太阳中心与行星中心连线在相等的时间内扫过的面积相等；"], ["抗体", "抗体是机体内B淋巴细胞在抗原物质刺激下，合成的能与抗原特异性结合的免疫球蛋白。抗体仅被发现于脊椎动物的血液等体液、B细胞的细胞膜表面。"], ["克隆", "克隆是英文“clone”的音译，指生物体通过体细胞进行的无性繁殖，以及由无性繁殖形成的基因型完全相同的后代个体组成的种群。通常指利用生物技术无性繁殖出与原个体有完全相同基因的个体或种群。"], ["可燃冰", "天然气水合物俗称可燃冰。可燃冰极易燃烧，同等条件下，其燃烧产生的能量比煤、石油、天然气要多出数十倍，而且燃烧后不产生任何残渣和废气，被誉为“属于未来的能源”。可燃冰的最大特点是能量密度高，但存在开采风险。如何安全、经济地开采可燃冰，并且从中分离出甲烷，依然是目前各国研究和利用可燃冰的核心难题。2017年7月9日，由国土资源部中国地质调查局组织实施的南海天然气水合物试采工程全面完成预期目标。此次试开采的成功是世界首次成功实现天然气水合物安全可控开采，实现了历史性的突破。"], ["锂电池", "锂电池是一类由锂金属或锂合金为负极材料、使用非水电解质溶液的电池。锂电池有锂金属电池和锂离子电池两类。2019年诺贝尔化学奖颁给了美国德州大学奥斯汀分校约翰·古迪纳夫、美国纽约州立大学宾汉姆分校斯坦利·威廷汉和日本旭化成株式会社吉野彰三人，以表彰他们对锂离子电池研发的卓越贡献。"], ["牛顿三大定律", "牛顿三大定律即牛顿运动定律，是经典力学的基础，包括牛顿第一运动定律、牛顿第二运动定律和牛顿第三运动定律。牛顿第一定律即惯性定律：一切物体在没有受到力的作用时，总保持静止状态或匀速直线运动状态。牛顿第二定律：物体加速度大小跟作用力成正比，跟物体的质量成反比，加速度的方向跟作用力的方向相同。牛顿第三定律：两个物体之间的作用力和反作用力总是大小相等、方向相反，作用在同一条直线上。"], ["青蒿素", "青蒿素又名黄蒿素，是从菊科植物黄花蒿茎叶中提取分离得到的一种化合物。其多种衍生物如双氢青蒿素、青蒿琥酯、蒿甲醚、蒿乙醚均是治疗疟疾的有效单体。中国药学家屠呦呦及其课题组在1972年11月，成功分离得到抗疟有效单体化合物的结晶，后命名为“青蒿素”。"], ["人类基因测序", "人类基因测序即人类基因组测序，指测定组成人类染色体（指单倍体）中所包含的30亿个碱基对组成的核苷酸序列，从而绘制人类基因组图谱，并且辨识其载有的基因及其序列，达到破译人类遗传信息的最终目的。2003年，中、美、英、日、法、德六国科学家经过13年努力共同绘制完成了人类基因组序列图，在人类揭示生命奥秘、认识自我的漫漫长路上又迈出了重要的一步。"], ["沙罗周期", "沙罗周期是日食和月食的周期，指长达6585.32天的一段时间间隔。“沙罗”为巴比伦文“重复”之意，即每经过一个沙罗周期，地球、太阳和月球的相对位置又会与原先基本相同，因而前一周期内的日、月食又会重新陆续出现。"], ["神舟十二号", "神舟十二号，是我国载人航天工程发射的第十二艘飞船，神舟十二号载人飞行任务是空间站关键技术验证阶段第四次飞行任务，也是空间站阶段首次载人飞行任务。31搭载神舟十二号载人飞船的长征二号F遥十二运载火箭，在酒泉卫星发射中心点火发射，顺利将聂海胜、刘伯明、汤洪波三名航天员送入太空，发射取得圆满成功。飞船入轨后，将按照预定程序，与天和核心舱进行自主快速交会对接。组合体飞行期间，航天员将进驻天和核心舱，完成为期三个月的在轨驻留，开展机械臂操作、太空出舱等活动。32"], ["神舟十三号", "神舟十三号是我国载人航天工程发射的第十三艘飞船，于2021年10月16日在酒泉卫星发射中心发射。神舟十三号采用自主快速交会对接的方式，首次径向停靠空间站。航天员首次在轨驻留六个月，这也是空间站运营期间航天员乘组常态化驻留周期。此外，这是中国女航天员首次进驻中国空间站，航天员王亚平也会成为中国首位实施出舱活动的女航天员。神舟十三号任务是空间站关键技术验证阶段的决胜之战、收官之战，也是空间站在轨建设过程中承前启后的关键之战。33"], ["生物安全", "生物安全一般是指由于生物技术的发展而对生态环境和人体健康带来不利影响以及相应的防控措施，属于国家安全范畴内的一项基本内容。习近平在中共中央政治局第三十三次集体学习时强调，生物安全关乎人民生命健康，关乎国家长治久安，关乎中华民族永续发展，是国家总体安全的重要组成部分，也是影响乃至重塑世界格局的重要力量。34"], ["数据传输", "数据传输是指依照适当的规程，经由一条或多条链路，在数据源和数据宿之间传送数据的过程，也表示借助信道上的信号将数据从一处送往另一处的操作。"], ["数字化管理", "数字化管理是指利用计算机网络技术去量化管理研发、生产、销售等流程的方式。相比传统管理模式，数字化管理更直接客观，对质量、营销、服务的评判准确率更高，在计算机网络技术的加持下速度更快、效率更高。"], ["算法", "算法为一个计算的具体步骤，常用于计算、数据处理和自动推理。精确而言，算法是一个表示为有限长列表的有效方法。算法应包含清晰定义的指令用于计算函数。35"], ["天问一号", "天问一号属于航天探测器，探测对象是火星，于2020年7月在文昌航天发射场成功发射。其探测有三大目标，即火星环绕、火星着陆和火星巡视。天问一号不仅圆满完成了火星探测的三大目标，也标志着我国在行星探测方面迈出了跨越性的一步。"], ["天舟二号", "天舟二号货运飞船是我国空间站关键技术验证及建造阶段首飞货运飞船，于2021年5月29日发射。按照任务规划，天舟二号货运飞船会携带3名航天员消耗品、舱外航天服、平台物资与在轨运行的天和核心舱进行交会对接，为后续飞行任务和空间站进一步开展在轨建造奠定坚实基础。"], ["天舟三号", "天舟三号货运飞船于2021年9月20日在文昌航天发射场发射。天舟三号货运飞船执行我国空间站关键技术验证及建造阶段的第五次飞行任务。按照任务规划，天舟三号货运飞船装载了航天员生活物资、舱外航天服及出舱消耗品、空间站平台物资、部分载荷和推进剂等，与空间站组合体完成交会对接后，转入组合体飞行段，为空间站在轨建造后续飞行任务奠定基础。36"], ["万有引力定律", "万有引力定律是解释物体之间相互作用的引力定律。牛顿于1687年将其发表在《自然哲学的数学原理》上，定律内容为：任意两个质点通过连心线方向上的力相互吸引。该引力的大小与它们的质量乘积成正比，与它们距离的平方成反比，与两物体的化学本质或物理状态以及中介物质无关。"], ["微电子技术", "微电子技术是建立在以集成电路为核心的各种半导体器件基础上的高新电子技术，包括系统电路设计、工艺技术、器件物理、材料制备、自动测试以及组装、封装等一系列专门的技术。微电子技术是当今社会科技领域的重要支柱。"], ["微重力环境", "微重力代表一种受力环境，在这种环境中的有效重力水平极低，在力学上通常用g×10-6来表示。航天器在轨运行时会受到地球引力以外的各种力的干扰，达不到完全失重的状态，而是处于微重力环境状态。"], ["无人机", "根据民航局出台的《轻小无人机运行规定（试行）》中的规定，无人机是由控制站管理（包括远程操控或自主飞行）的航空器，也称远程驾驶航空器。民用领域中，无人机可用于大地测量、遥感等；军事领域中，无人机可用于侦"], ["细胞工程", "细胞工程属于生物工程的一个重要分支，是指应用现代细胞生物学、发育生物学、遗传学和分子生物学的理论与方法，按照人们的需要和设计，在细胞水平上重组细胞结构和内含物，以改变生物的结构和功能，即通过细胞融合、核质移植、染色体或基因移植及组织和细胞培养等方法，快速繁殖和培养出人们所需要的新物种的生物工程技术。"], ["新一代信息技术", "新一代信息技术是国务院确定的七个战略性新兴产业之一，是以物联网、云计算、大数据、人工智能为代表的新兴技术。它既包括集成电路、新型显示、高端软件、高端服务器等核心基础产业的升级，也包括以物联网、云计算、大数据、人工智能为代表的新兴技术的渗透。新一代信息技术分为六个方面：下一代通信网络、物联网、三网融合、新型平板显示、高性能集成电路和以云计算为代表的高端软件。"], ["移动支付", "移动支付是指移动客户端利用手机等电子产品来进行电子货币支付，移动支付将互联网、终端设备、金融机构有效地联合起来，形成了一个新型的支付体系，并且移动支付不仅仅能够进行货币支付，还可以缴纳话费、燃气、水电等生活费用。移动支付开创了新的支付方式，使电子货币开始普及。37"], ["引力波", "在物理学中，引力波是指时空弯曲中的涟漪，以波的形式从辐射源向外传播，以引力辐射的形式传输能量。引力波是唯一可以在高维时空中传递的波，可以为我们提供几乎无阻挡的宇宙图景。1916年，爱因斯坦基于广义相对论预"], ["远程医疗", "远程医疗是指在远程通信技术、计算机技术、遥感遥测等技术的支持下，实现医生远程实时语音和高清图像的交流。远程医疗有助于充分发挥大医院、专科医院的优势，为偏远贫困地区提供相应的医疗帮助。"], ["月球样品", "月球样品是指我国通过实施探月工程在月球表面及表面以下采集的，以及国家航天局通过其他途径获得的月球物质。38嫦娥五号采集的月球样品是我国首次采集的月球样品。"], ["云端", "云端采用了应用程序虚拟化技术，具有软件搜索、下载、使用、管理等多种功能。云端的目的是绿色使用软件，即各类常用软件在独立的虚拟化环境中被封装起来，不与系统产生耦合。"], ["云计算", "云计算是一种分布式计算技术，其最基本的概念，是透过网络将庞大的计算处理程序自动分拆成无数个较小的子程序，再交由多部服务器所组成的庞大系统，经搜寻、计算分析之后将处理结果回传给用户。借助这项技术，网络服务提供者可以在数秒之内处理数以千万计甚至亿计的信息，达到和“超级计算机”同样强大效能的效果。"], ["中国科学院", "中国科学院于1949年成立，是中国自然科学最高学术机构、科学技术最高咨询机构、自然科学与高技术综合研究发展中心。建院以来，中国科学院服"], ["中芯国际", "中芯国际集成电路制造有限公司，总部位于上海，拥有全球化的制造和服务基地，是世界领先的集成电路晶圆代工企业之一，也是中国内地技术最先进、配套最完善、规模最大、跨国经营的集成电路制造企业集团，提供0.35微米到14纳米不同技术节点的晶圆代工与技术服务。40"], ["ETC", "ETC即电子不停车收费（ElectronicTollCollection），是通过“车载电子标签+IC卡”与ETC车道内的微波设备进行通讯，实现车辆不停车支付高速公路通行费功能的全自动收费系统。"], ["白亮污染", "白亮污染，是光污染的一种，指阳光照射强烈时，城市里建筑物的玻璃幕墙、釉面砖墙、磨光大理石和各种涂料等装饰反射光线，明晃白亮、炫眼夺目。白亮污染易引发意外交通事故，并伤害身体健康。"], ["北京冬（残）奥会吉祥物", "北京冬奥会吉祥物“冰墩墩”，以熊猫为原型进行设计创作。冰，象征纯洁、坚强，是冬奥会的特点。墩墩，意喻敦厚、健康、活泼、可爱，契合熊猫的整体形象，象征着冬奥会运动员强壮的身体、坚韧的意志和鼓舞人心的奥林匹克精神。将熊猫形象与富有超能量的冰晶外壳相结合，体现了冬季冰雪运动和现代科技特点。整体形象酷似航天员，寓意创造非凡、探索未来，体现了追求卓越、引领时代，以及面向未来的无限可能。北京冬残奥会吉祥物“雪容融”以灯笼为原型进行设计创作。雪，象征洁白、美丽，是冰雪运动的特点；容，意…"], ["大数据杀熟", "大数据杀熟是说消费者在线上选购同样的产品或服务时，在老用户的页面显示的价钱会比新用户的页面显示的价钱高的情况，平台以此达到利益最大化的目的。"], ["第七次全国人口普查", "中国在2020年开展的全国人口普查，主要调查人口和住户的基本情况，包括姓名、公民身份号码、性别、年龄、民族、受教育程度、行业、职业、迁移流动、婚姻生育、死亡、住房等情况。普查分三个阶段进行，分别是准备阶段、普查登记阶段和数据汇总、发布阶段。开展第七次全国人口普查，是摸清我国人口家底的重要手段，是推动经济高质量发展的内在要求，是完善人口发展战略和政策体系，促进人口长期均衡发展的迫切需要。42"], ["电子竞技", "电子竞技是利用电子设备（如手机、电脑），通过电子游戏的竞赛来竞技的一种比赛。电子竞技逐渐成为人们关注的焦点领域。电子竞技对于参与者的能力也有很高的要求，它非常考验参赛者的反应能力、思维能力和团队合作能力等。"], ["法医学", "法医学是一门以医学为基础的学科，它涉及临床医学、生物医学、自然科学和社会科学等多个方面的专业知识，旨在培养复合型人才。法医学可以应用于与刑事案件、民事纠纷、医疗事故、司法审判、卫生防疫相关的医学鉴定中。"], ["飞扬", "飞扬是北京2022年冬奥会和残奥会火炬，充满着自然的活力。在形态上面，“飞扬”取形于敦煌的“飞天”，两条缠绕的很有质感的丝带螺旋上升，如红旗漫卷，如彩练当空飞舞，体现了中国人对于飞翔的向往；作为国之礼器的火炬承载了深厚的中国文化，“飞扬”在颜色设计上选取了红色和银色，象征冰火相约，激情飞扬，照亮冰雪，温暖世界。43"], ["公共图书馆", "根据《中华人民共和国公共图书馆法》的有关规定，公共图书馆是指向社会公众免费开放，收集、整理、保存文献信息并提供查询、借阅及相关服务，开展社会教育的公共文化设施。其中，文献信息包括图书报刊、音像制品、缩微制品、数字资源等。设立公共图书馆应当具备以下条件：章程，固定的馆址，与其功能相适应的馆舍面积、阅览座位、文献信息和设施设备，必要的办馆资金和稳定的运行经费来源，安全保障设施、制度及应急预案。"], ["国际消费中心城市", "国际消费中心城市是现代国际化大都市的核心功能之一，是消费资源的集聚地，更是一国乃至全球消费市场的制高点，具有很强的消费引领和带动作用。《关于培育建设国际消费中心城市的指导意见》指出，培育建设国际消费中心城市的工作目标是，利用五年左右时间，指导基础条件好、消费潜力大、国际化水平较高、地方意愿强的城市开展培育建设，基本形成若干立足国内、辐射周边、面向世界的具有全球影响力、吸引力的综合性国际消费中心城市，带动形成一批专业化、特色化、区域性国际消费中心城市，使其成为扩大引领消费、…"], ["价格歧视", "价格歧视指的是商家根据不同的消费者群体，针对同一种类、同一时期、同一质量的商品采取差别定价的行为。这是一种商家通过制定不同价格来追求超额利润的定价方式。"], ["巨婴", "巨婴，原意是指身形庞大的婴儿，现在多是说生理年龄已达到成人标准，但心理年龄还停留在婴幼儿时期，是非常不成熟的成年人。"], ["绝对贫困", "绝对贫困指物质层面的贫困，个人和家庭的收入低至无法维持基本物质生存需求，例如衣食住行等。十八大以来，我国把消除贫困人口作为全面达到小康社会的底线任务，并采取了一系列方案来打赢这场脱贫攻坚战，例如为落后贫困的困难地区的学生提供免费的营养膳食，来保证他们的食品安全权，同时也投入大量资金来改善贫困地区人口的义务教育情况、医疗条件、饮水条件等。"], ["空中交通管制", "空中交通管制是指利用通信、导航技术和监控手段对飞机飞行活动进行监视和控制，保证安全飞行和有秩序飞行。根据国际民航组织的规定，空中交通管制的主要任务是：防止飞机在空中相撞，防止飞机同障碍物相撞，保证空中交通无阻和有序飞行。"], ["垃圾分类", "垃圾分类是按照垃圾的成分、属性、利用价值、对环境的影响以及现有处理方式等的特点，在家庭、单位等垃圾产生的源头将垃圾分离成若干不同的类别，进行分类投放、分类收集、分类运输、分类处置。"], ["蓝色农业", "蓝色农业指在水体中开展的海洋水产农牧化活动。具体来说，所有在近岸浅海海域、潮间带以及潮上带室内外水池水槽内开展的虾、贝、藻、鱼类的养殖业都包括在内。"], ["冷链物流", "冷链物流，泛指冷藏冷冻类食品在生产、贮藏运输、销售，到消费前的各个环节中始终处于规定的低温环境下，以保证食品质量，减少食品损耗的一项"], ["粮食安全", "1996年世界粮食首脑会议上把粮食安全定义为，粮食安全就是所有人在任何时候都能在社会物质上和经济上获得足够、安全和富有营养的食物以满足其健康而积极生活的膳食需要，粮食安全的多方面含义包括充足的粮食供应、获得粮食的机会、粮食稳定性及利用。45"], ["劣迹艺人", "劣迹艺人指的是涉嫌违法或违背基本道德的艺人群体。中国演出行业协会出台的《演出行业演艺人员从业自律管理办法》提到了演艺人员不可以触碰的“红线”，例如危害国家统一、吸毒、嫖娼、酒驾等。"], ["流媒体", "流媒体指以流式传输方式在网络中传输音频、视频和多媒体文件的形式。流媒体文件格式是支持采用流式传输及播放的媒体格式。流式传输方式将视频和音频等多媒体文件经过特殊的压缩方式分成一个个压缩包，由服务器向用户计算机连续、实时传送。"], ["路透社", "路透社成立于1850年，是英国最大的通讯社，也是世界四大通讯社之一。因其创办人是保罗·朱利叶斯·路透而得名路透社，总社设在伦敦。路透社提供新闻报道给报刊、电视台等各式媒体，所提供的新闻向来以迅速、准确享誉国际。"], ["马拉松", "马拉松比赛是一种超长距离赛跑，全程42195m。公元前490年，希腊军队在马拉松镇击败波斯入侵军，希腊士兵菲迪皮得斯从马拉松跑回首都雅典报捷后力竭身亡。为纪念这一历史事迹，1896年在第一届奥运会上举行了从马拉松到雅典的赛跑，定名为“马拉松赛跑”。"], ["盲盒", "盲盒是一种无法通过外包装直接了解包装内的具体物品的一种商品。盲盒起初在日本和欧美较为流行，近年来我国的盲盒产业也开始迅速发展。由于设置了不同常规款式以及抽中概率更低但更吸引人的款式，消费者想要抽到自己心仪的盲盒就需要“碰运气”或者多次购买来增加买中的概率。这种消费模式与彩票、娃娃机等均归属于为迎合消费者的惊喜心理而产生的“惊喜经济”的范畴。"], ["美育", "美育是旨在提升受教育者审美观点、审美能力的教育。美育的定义有广义和狭义两种类型。广义的美育指的是在各个方面的美学教育。狭义的美育多指艺术教育，例如绘画。美育可以与德育、智育、体育相互促进，提升受教育者的综合素养。"], ["诺贝尔和平奖", "诺贝尔和平奖得主通常在每年的10月份进行公布，旨在表彰为了世界和平作出杰出贡献的人。这些行为主要集中在促进民族团结、组织和宣传和平会议、取消或者裁减军队装备等方面。"], ["诺贝尔经济学奖", "诺贝尔经济学奖是1968年由瑞典中央银行设立的奖项，正式名称为“瑞典中央银行纪念阿尔弗雷德·诺贝尔经济学奖”。该奖旨在奖励在经济学领域作出杰出贡献的人。1969年诺贝尔经济学奖首次颁奖，此后每年评选和颁发一次。"], ["群体免疫", "群体免疫是指一个群体中有70%~80%的个体对病毒有免疫能力，在一定程度上会阻断疾病的二次传播，也间接保护了剩余不具备免疫能力的个体。"], ["人格理论", "人格理论即阐释人格的结构、形成和发展的理论和学说。弗洛伊德人格学说是精神分析学派的经典学说，核心是以潜意识为基础的，包括人格结构、人格动力、人格发展和人格适应四个部分。弗洛伊德认为，人类的人格结构由三部分构成，即本我、自我、超我。"], ["三孩政策", "三孩政策是在中共中央政治局会议上提出，表明一对夫妻可以生育三个子女。这是应对我国人口老龄化问题的重大举措，也有助于改善我国人口结构，继续发挥我国劳动力等人力资源的优势。"], ["社会信用体系", "社会信用体系是社会主义市场经济体制和社会治理体制的重要组成部分。它以法律、法规、标准和契约为依据，以健全覆盖社会成员的信用记录和信用基础设施网络为基础，以信用信息合规应用和信用服务体系为支撑，以树立诚信文化理念、弘扬诚信传统美德为内在要求，以守信激励和失信约束为奖惩机制，目的是提高全社会的诚信意识和信用水平。46"], ["社交距离", "社交距离是心理学术语，是指人们在交际时保持的距离。心理研究发现每个人都需要一个能够自由控制的自我空间，这个空间距离对于正在交流的人们来说具有提示交流对象的关系和心理状态的作用。由于文化背景及经历不同，"], ["社区团购", "社区团购是以一个真实居住社区为一个单位，其社区居民在互联网平台购物的一种现象，目前市面上比较常见的社区团购平台有多多买菜和美团优选，同一个社区内会设置一些固定的提货点。这是一种新零售模式，将团购形式区域化、小众化，更有利于社区内商品的调动。"], ["社区养老", "社区养老指的是一种以家庭为核心，所在社区为家中老年人提供白天上门照顾、社区日托等服务的养老模式。其可以帮助解决老人白天居家的时候，家人忙于工作难以照顾和陪伴老人的问题。社区养老可以有效整合和利用社区资源，改善老年人的居家养老生活。"], ["团圆行动", "团圆行动指的是2021年由公安部组织并开展的一项寻找被拐儿童的打拐行动。各地的公安机关开始广泛采集被拐卖的儿童信息并开通“团圆行动”免费采血点进行信息收集和匹配。通过打拐体系和措施的不断升级，科技的不断进步，团圆行动取得了显著的成效，帮助上千个家庭获得团聚。"], ["文化多样性", "文化多样性是指各群体和社会表现出的文化的多种不同形式。文化多样性不仅体现在人们通过丰富多彩的文化表现形式来表达、弘扬和传承文化遗产，还体现在人们借助各种方式和技术对文化遗产进行艺术创作、生产、传播、销售和消费。文化多样性是人类社会的基本特征，也是人类文明进步的重要动力。"], ["文理学院", "文理学院，又称博雅学院或通识学院，是美国高校的重要种类之一，一般指奉行博雅教育、以本科教育为主，规模小而精的大学。文理学院注重全面综"], ["新农村", "新农村，即社会主义新农村，是在社会主义制度下，按照新时代的要求，在工业反哺农业、城市支持农村的新阶段，对农村进行经济、政治、文化和社会等方面的建设，最终实现经济繁荣、设施完善、环境优美、文明和谐的农村。"], ["新业态", "新业态是指基于不同产业间的组合、企业内部价值链和外部产业链环节的分化、融合、行业跨界整合以及嫁接信息及互联网技术所形成的新型企业、商业乃至产业的组织形态。信息技术革命、产业升级、消费者需求倒逼是推动新业态产生和发展的三大重要因素。"], ["义务教育", "我国实行九年制义务教育制度。根据《中华人民共和国义务教育法》的内容，义务教育是国家统一实施的所有适龄儿童、少年必须接受的教育，是国家必须予以保障的公益性事业。实施义务教育，不收学费、杂费。国家建立义务教育经费保障机制，保证义务教育制度实施。凡具有中华人民共和国国籍的适龄儿童、少年，不分性别、民族、种族、家庭财产状况、宗教信仰等，依法享有平等接受义务教育的权利，并履行接受义务教育的义务。"], ["直播带货", "直播带货，字面意思是指主播通过直播的形式销售货物的过程。与传统销售方式不同，直播带货是通过一些网络平台，例如淘宝、抖音来进行商品展示介绍并解答顾客疑问。其兴起的主要原因是电子商务的发展并逐渐壮大，吸引了越来越多的消费者。"], ["种族歧视", "种族歧视是一个种族的人对其他种族的人所表现出敌视、排斥以及不平等对待的行为，殖民时期就已出现这种行为。种族歧视一直是讨论的热门话题，种族歧视事件也多频发生，例如2020年在美国发生的白人警察跪压致一名黑人死亡的事件。"], ["住房公积金", "根据《住房公积金管理条例》第二条和第三条内容规定，住房公积金是指国家机关、国有企业、城镇集体企业、外商投资企业、城镇私营企业及其他城镇企业、事业单位、民办非企业单位、社会团体及其在职职工缴存的长期住房储金。职工个人缴存的住房公积金和职工所在单位为职工缴存的住房公积金，属于职工个人所有。"], ["草船借箭", "“草船借箭”是我国古典名著《三国演义》中的一个故事。周瑜因嫉妒诸葛亮的才干，设下一计，要诸葛亮10天造10万支箭。足智多谋的诸葛亮在大雾的掩护下，利用曹操多疑的性格，以几条草船诱敌，终于借足10万支箭，立下奇功。该成语多指运用智谋，凭借他人的人力或财力来达到自己的目的。"], ["大道至简", "“大道至简”是后来的道学学者对《道德经》思想内涵的一种概括，原句为“大道至简，知易行难”，指大道理（即基本原理、方法和规律）是极其简单的，但做起来很难。"], ["家天下", "“家天下”语出戴圣《礼记·礼运》：“今大道既隐，天下为家。”本义指封建帝王把国家作为自己一家的私产，代代相传。现今也用来指有权势的人把自己掌管的单位或部门看作是自家的私产，为所欲为。"], ["精卫填海", "“精卫填海”典出《山海经·北山经》。炎帝的小女儿女娃乘船游东海，溺水而亡，化作一种花脑袋、白嘴壳、红色爪子的鸟。这种鸟栖息在发鸠山，发出“精卫、精卫”的悲鸣，人们便将此鸟称作“精卫鸟”。精卫将从发鸠山衔来的草石投入东海，誓言要填平东海。该成语旧时比喻仇恨极深、立志报复，后比喻意志坚决、不畏艰难。"], ["君子", "“君子”特指有学问、有修养的人，是中国人的道德典范。在周朝之前，君子为贵族的统称，后成为士大夫的统称，即为官之人称君子，平民称小人。儒家认为君子应不单指贵族或士大夫，而是“圣人之下，富有礼义规范的人”，是具有高道德标准的人。"], ["夸父逐日", "夸父逐日是中国古代神话，出自《山海经·海外北经》。讲述了夸父立志追上太阳，但在路上口渴而亡，他的手杖化作桃林，身躯化作夸父山。其既可比喻人有大志，又可比喻自不量力。"], ["戮力同心", "“戮力同心”出自《左传·成公十三年》：“昔逮我献公及穆公相好，戮力同心，申之以盟誓，重之以昏姻。”戮力，意为“并力”；同心，意为“齐心”。该成语指齐心合力，团结一致。"], ["秦晋之好", "春秋时，秦国和晋国是两个势力较大的国家，为了避免受到对方攻击，两国世代联姻，巩固同盟。后来人们用“秦晋之好”比喻两姓联姻。"], ["虽千万人吾往矣", "“虽千万人吾往矣”语出《孟子·公孙丑上》。意为：纵然面对千万人的阻止，我也要勇往直前。该俗语表示一种勇往直前的精神。"], ["天行有常", "“天行有常”是战国末期思想家荀子的观点，出自《荀子·天论》：“天行有常，不为尧存，不为桀亡。”行，指运动变化；常，指常轨、规律。荀子认为自然界的变化有其自身的规律，不以人的意志为转移。"], ["完璧归赵", "“完璧归赵”这一成语源于《史记·廉颇蔺相如列传》，本指蔺相如将和氏璧完好地自秦国送回赵国，后多用来比喻将原物完好地归还物主。"], ["协和万邦", "“协和万邦”出自《尚书·虞书·尧典》：“百姓昭明，协和万邦。”该句意为，社会和睦之后再协调各个邦国的利益，让各个邦国都能够和谐合作。现今指协调不同国家之间的关系，让各个国家都能够相互尊重、相互合作、共同发展。"], ["学富五车", "“学富五车”语出《庄子·天下》：“惠施多方，其书五车，其道舛驳，其言也不中。”惠施是战国时期的人，庄子说他方术虽多，却杂乱不纯，而且言而不当。“其书五车”只是说他藏书丰富。后用“学富五车”形容人知识渊博、读书很多。"], ["知行合一", "“知行合一”是明代王守仁提出的认识论和道德修养命题。王守仁反对程朱理学“知在行先”的说法，认为“知”与“行”是统一的，行是知的基础、知的目的，知是行的主导、达到行的手段。"], ["止于至善", "“止于至善”出自《礼记·大学》：“大学之道，在明明德，在亲民，在止于至善。”“止”意为“到、达到”；“至”意为“最”。“至善”指儒家所追求的一种极高的道德境界，即“仁爱之道”。“止于至善”，即达到最理想的道德境界，是《大学》提出的道德修养“三纲领”之一。"], ["纸上谈兵", "“纸上谈兵”典出《史记·廉颇蔺相如列传》。战国时期赵国名将赵奢之子赵括，年轻时兵书读得很熟，谈起兵事来父亲也难不倒他。后来他接替廉颇为将，在长平之战中，只知道根据兵书办事，不知变通，结果被秦军打败。该成语比喻空发议论，不会解决实际问题。"], ["重义轻利", "“重义轻利”是封建正统思想的义利观，出自《论语·里仁》：“君子喻于义，小人喻于利。”义，指道义、义气，是最高的道德原则；利，指利益、私利。以孔子为代表的儒家把义利对立起来，提倡义重于利、先义后利。"], ["德国古典哲学", "德国古典哲学指18世纪末到19世纪初德国资产阶级反封建时期的哲学，是马克思主义三个理论来源之一，主要代表人物有唯心主义哲学家康德、费希特、谢林、黑格尔和唯物主义哲学家费尔巴哈。康德是德国古典哲学的创始人，其哲学的基本特征是调和唯物主义与唯心主义，把各种相互对立的哲学派别结合在一起。"], ["反乌托邦", "反乌托邦是科幻文学中的一种体裁和流派。该体裁借助丰富的想象描绘脱胎于现实、看似完美实则扼杀人性并充满罪恶的未来社会和现在社会中的可能的世界，表达了对现在、未来和人类社会发展的担忧。冯小庆:“普拉东诺夫反乌托邦三部曲的思想与诗学研究”,黑龙江大学2012年博士学位论文。反乌托邦主义的代表作有英国赫胥黎的《美丽新世界》,英国乔治·奥威尔的《动物庄园》和《一九八四》,俄国扎米亚京的《我们》等。"], ["社会达尔文主义", "社会达尔文主义是在达尔文的生物进化论的基础上发展而来。达尔文的生物进化论的中心思想是“物竞天择，适者生存”，社会达尔文主义也是如此，对象从自然界转换到了人类社会，其主旨是社会会淘汰掉劣等的民族及其文化，只有强者和环境的适应者才会生存延续。其代表人物主要是英国的斯宾塞。"], ["实用主义", "实用主义是19世纪末产生于美国，20世纪上半叶流行于资本主义国家的一个现代哲学派别。其特点是推崇经验，注重“行动”“生活”“效果”。实用主义以确定信念为出发点，以采取行动为主要手段，以获得实际效果为最高目的，认为“有用即是真理，无用即为谬误”。实用主义的创始人为美国的皮尔斯，主要代表人物有美国的詹姆斯、杜威、胡克，英国的席勒，意大利的帕比尼等。"], ["宋学", "宋学狭义上是指宋代的经学；广义上泛指与宋代学术取向相近的其他朝代的经学，主要包括宋元时期的理学和明朝的心学，以及晚清的新学等。在研究儒家经典时，宋学注重从义理方面进行探索，反对琐屑的名物训诂，与汉学相对。"], ["唯美主义", "唯美主义是19世纪末流行于欧洲的一种文艺思潮。唯美主义主张“为艺术而艺术”，片面追求艺术技巧，反对文艺的社会教育作用，鼓吹艺术的无思想性和不问政治。唯美主义的代表作家有王尔德、戈蒂耶等。"], ["现代派文学", "现代派文学是19世纪末起出现在西方的一大批不同于传统文学的流派的总称。现代派文学包括表现主义、意识流、存在主义、荒诞派戏剧、黑色幽默等。其体现了时代特点，反映了现代社会中人的经历和处境，以及人们的审美意象和思想感受。"], ["现实主义", "现实主义是西方现代文学中的一个重要流派，兴盛于19世纪下半叶，是对兴盛于19世纪上半叶的浪漫主义文学的批判。现实主义否定一切理想精神，立足于实际，又称“写实主义”。现实主义作家创作的焦点是生活中的普通大众，他们关心社会政治、经济制度等因素对人民造成的种种压迫和影响。"], ["乡村文学", "乡村文学是致力于表现特定的地理风光、伦理道德与民俗民情的文学作品，具有强烈的民族色彩、浓郁的乡土气息与鲜明的地域特色。乡村文学作品把关注的目光从个性解放转向社会解放，转向农村底层社会，集中在农民身上，描绘了广阔而真实的农村生活图景，展现了具有浓郁地方色彩的世俗风情。"], ["折中主义", "折中主义又称折衷主义，是一种哲学术语，表示既认同某一学派的学说，又接受其他学派的某些观点。折中主义是把各种不同的观点无原则地、机械地拼凑在一起，没有自己独立的见解和固定的立场，是形而上学思维方式的一种表现形式。"], ["编钟", "编钟作为一种大型打击乐器在周朝时就已兴起。我国是世界上第一个制作并使用编列乐钟的国家。由大小不一的钟有序地挂在架子上组成一组或是几组，依据乐谱打击会有悦耳的音调传出，钟身绘制着漂亮的图案纹路。"], ["茶道", "茶道，是中国茶文化的重要概念之一。广义上，茶道包括茶树的种植、茶叶的采制、分类、煮茶技艺、饮茶用水和茶具的选择。狭义上，仅指饮茶过程中的一整套严格的规范，一般包括洗茶、冲泡、“春风拂面”、封壶、分杯、玉液回壶、分壶、奉茶、闻香、品茗等流程。"], ["春社", "春社是古代祭祀土地神之日，宋代以后，以立春后第五个戊日为春社。春社这一天，人们在土地庙集会，准备酒肉祭神，以祈求丰收，然后宴饮。"], ["冠礼", "冠礼是中国古代男子的成人仪式。其主要仪式是加冠，故称“冠礼”，属嘉礼的一种。冠礼起源于氏族社会的成丁礼，西周时演变为贵族男子的成人仪式。举行冠礼的年龄及具体仪式因时代、阶层而各有不同。周代仅限贵族男子于20岁时行冠礼，礼仪一般由父亲或兄长主持。"], ["祭祀", "祭祀指旧时祭神和祭祖的活动，是根据宗教或者社会习俗的要求进行的具有象征意义的一系列行为或传统礼俗仪式。由于环境和民族的不同，各个地方的祭祀文化也各具风格，祭祀的对象、祭品的种类、祭品的处理方法、祭祀的场所和祭祀的禁忌也各不相同。"], ["蜡染", "蜡染，古称“蜡缬”，是一种传统的民间印染工艺，与绞缬（扎染）、夹缬（镂空印花）并称为我国古代三大印花技艺。它起源于汉代以前，流行于我国的中南、西南少数民族地区，至今在苗、布依、仡佬、瑶等民族中仍广为流行，多用作服装、被盖、包帕等装饰。其以蜂蜡、枫树胶等为防染原料，绘制时，用蜡刀蘸蜡液，在白布上点绘图案纹样，后在蓝靛缸浸染，经沸水煮去蜡质，即呈现出蓝白分明、花纹如绘的图案。"], ["历法", "历法是利用天象变化的规律来计算时间、划分季节、判断气候，使人们的各种活动都能适时进行的一种方法。我国目前使用的历法有公历和农历两种。"], ["罗汉拳", "罗汉拳是中国传统拳术中的南拳之一，发源于河南嵩山少林寺，也是少林外家拳法之一。因少林门人供奉释迦牟尼，且此拳取十八罗汉之姿，故称罗汉拳。其主要手法有隔、迫、冲、闪、点、举、压、钩、抄、抛，腿法讲究腾、滚、扫、弹。罗汉拳要求上下相随、步随手变、身如舵摆，灵活多变，劲力要求刚柔相济。拳中刚阳有力，套路编排精巧，整套拳打起来非常流畅、美妙。"], ["民谣", "民谣是歌谣的一种类型，指民间歌谣中无曲调的短小韵文作品。民谣是人民口头创作、流传，并在流传过程中经过集体加工的具有民族形式和民族风格的诗体，集中反映人民的要求和愿望。民谣与民歌最初的区别只在后者能合乐而歌，前者不合乐而只在口头传唱。这一界限现已消失，现在所说的“民歌”一般都包括“民谣”。"], ["《茉莉花》", "《茉莉花》是江苏民歌，有300多年的历史。清朝乾隆年间的戏曲剧本集《缀白裘》是现在能见到的最早刊载《茉莉花》歌词的出版物。1837年，《茉莉花》的曲谱见于木刻本的《小慧集》中，原名为《鲜花调》，是中国最早可见的《茉莉花》曲谱，后被江苏明清俗曲专家张仲樵翻译成简谱。抗战时期的军旅作曲家何仿将民间流传的原曲原词进行修改，创作了脍炙人口的《茉莉花》。"], ["桑巴舞", "桑巴舞是源自巴西的一种民间舞蹈，后以交谊舞的形式流传到欧美。它吸收了葡萄牙人和印第安人舞蹈和音乐艺术的风格。桑巴舞动作热情奔放、敏捷，富有强烈的感染力，被公认为是最大众化的巴西文化表达形式之一。"], ["谥号", "谥号是古代帝王、后妃、大臣等社会地位较高的人死后，按其生前的事迹所给予的总结评价性的称号。谥号是对死者生前行为、品德的总结和评价，是维系封建礼法的一项重要内容。"], ["私塾", "私塾是我国古代社会一种开设于家庭、宗族或乡村内部的私人学校，以儒家思想教育为核心，是私学的重要组成部分。新中国成立后，私塾逐渐消失。私塾在我国2000多年的历史进程中，对传播中国文化、促进教育事业的发展以及启蒙教育等方面起过重要的作用。"], ["图腾", "图腾是古代原始部落迷信某种自然或有血缘关系的亲属、祖先、保护神等，而将之用来做本氏族的徽号或象征的一种标志。原始民族对大自然的崇拜是图腾产生的基础。用图腾解释神话及民俗民风，是人类历史上的一种文化现象。"], ["元宵节", "元宵节又称上元节、元夜、灯节，是中国的传统节日之一，时在农历正月十五日。正月是农历的元月，古人称夜为“宵”，所以称正月十五为元宵节。据一般的资料与民俗传说，正月十五在西汉已经受到重视，汉武帝正月上元夜在甘泉宫祭祀“太一”的活动，被后人视作正月十五祭祀天神的先声。正月十五日晚是一年中第一个月圆之夜，也是一元复始，大地回春的夜晚，人们对此加以庆祝，大街小巷张灯结彩，有赏灯、猜灯谜、吃元宵等习俗。"], ["操纵学派", "“操纵学派”的概念最早出现在赫曼斯《文学的操纵》一书中，受多元系统论影响而发展。该派的核心观点是译者在翻译过程中受赞助人、目标文化中的主流意识形态和诗学等的影响。该派代表人有勒菲弗尔、巴斯内特等。"], ["多元系统论", "多元系统论是以色列学者伊塔玛·伊万·佐哈尔提出的一种理论。该理论认为文学作品不应作为独立的对象，而应被视为整个文学系统中的一部分来研究，且这个文学系统处于不断的动态演变中。"], ["翻译转换理论", "卡特福德是语言学派的代表人物之一，他于1965年在牛津大学出版社出版的《翻译的语言学理论》认为“转换”有两种：层次转换和范畴转换。层次转换即原文和译文的表达处于不同的语言层次，如一种语言中用语法表达而在另一种语言中则用词汇表达。范畴转换有四种：结构转换、词类转换、单位转换（或阶级转换）和内部体系转换。"], ["分析型语言", "分析型语言指在语言类型学上根据表达句法关系的方式划分出的一类语言，与综合语、多式综合语相对。在分析型语言里，句法关系主要由词序和虚词来表达。"], ["梁启超的翻译观点", "梁启超是维新派代表人物，十分重视翻译工作。他认为，欲“通西文、肄西籍”以救国弊有两个方法：一是自幼培养人才；一是译书。前者收效慢，所以“译书为强国第一义”。他提出“择当译之本”“定公译之例”“养能译之才”的论述，“当译之本”指急需翻译的书，如有关法律、农政、哲学等的书；“公译之例”指需要有统一译名的专书，使译者共同遵守；“能译之才”指“于华文、西文及其所译书中所言专门之学，三者皆通，斯为上才”。"], ["明末清初的翻译", "明末清初，许多天主教传教士随欧洲殖民主义者掠夺我国沿海地区来到中国，他们在传教的同时也与当时的士大夫阶级合作翻译了诸多作品。传教士有利玛窦、汤若望、理雅各、南怀仁等，士大夫有徐光启、李之藻、杨廷筠等，他们不仅将中国的四书五经等典籍译到西方，还译入了西方天文学、数学、物理学、军事技术、生物学、文学和经院哲学等科技书籍约120种。明末清初的翻译活动掀起了中国历史上的第二次翻译高潮，加快了中国近代化进程。"], ["女性主义翻译", "在西方20世纪后半期兴起的“以文化为转向”的大背景下，女性主义者把女性主义和翻译相结合，性别因素从此被引进翻译，由此产生了女性主义翻译理论。女性主义翻译理论要求译者以女性主义的方式来改写原文，从而在翻译中凸显女性的身份地位，在语言和政治上实现真正的平等。"], ["施莱尔马赫", "施莱尔马赫是德国神学家、翻译家，现代新教神学的奠基者。他1813年的专论《论不同的翻译方法》首先区分了译者的类型：商业文本译者和艺术文本译者。他认为第二种类型的译者创造性更高，能够给语言带来新的生命。"], ["西方中心主义翻译观", "西方中心主义翻译观即现当代我国的翻译研究等相关领域以西方翻译研究为主导，没有形成自己的研究成果和威望。世界范围内翻译研究领域出现西方中心主义的原因有两个:一是当代欧洲翻译研究的快速发展，二是英语作为国际通用语具有强势的地位。我国翻译研究要去除西方中心主义，中国学者需要了解和研究我国自身的翻译历史和翻译实践活动，了解和研究翻译历史文化传统及地域上与我国相近的东方各国的翻译理论，特别是开展基于中国翻译活动实践的研究，以促进我国的翻译学科理论建设，应对西方翻译学术话语权，增强文…"], ["徐光启", "徐光启是明代的杰出科学家，致力于数学、天文、历法、水利等方面的研究，尤精晓农学，著有“农业百科全书”之称的科技著作《农政全书》。另外，他也翻译了大量西方科技、哲学类著作。他与意大利学者利玛窦合译了《几何原本》，为17世纪中西文化交流做出了重要贡献。他的翻译思想有两大特点：一是求知、求真理，“裨益当世”；二是抓重点、抓急需。1631年徐光启在《历书总目表》提出“欲求超胜，必须会通；会通之前，必须翻译”的翻译思想。"], ["碑拓", "碑拓起源于南朝，是一种印刷技术，方法是用宣纸覆在写有文字或图像的碑版上，然后用墨打拓，宣纸揭下后，就会留有碑版上的文字或图像。碑拓根据拓片材质及拓印方法等不同划分为乌金拓、朱拓、蝉翼拓。碑拓为雕版印刷术的出现提供了条件。"], ["《长津湖》", "《长津湖》是一部以抗美援朝中的长津湖战役为背景而制作的影片，影片主要讲述中国人民志愿军在极其寒冷严酷的环境下英勇战斗，顽强反抗，扭转战争形势的过程。该片由陈凯歌、徐克、林超贤联合监制、导演，吴京、易烊千玺等主演，于2021年9月30日在中国内地上映。"], ["地方剧种", "地方剧种指凝结某一地域的民风习俗，具有鲜明的地域文化色彩、剧种风格以及独特的技术手段的戏曲剧种的通称，是流行于一定地区的演剧形式。地方剧种是“活态”的传统文化表现形式，传承一定的历史文化传统。豫剧、越剧、黄梅戏、评剧等是比较知名的地方剧种。"], ["反切", "反切是中国古代注音方法。其基本原则是用两个汉字组合在一起给一个汉字注音，取上字的声母和下字的韵母和声调，将其结合在一起，成为被注音字的读音。由于汉字读音的不断发展，现在已由拼音取代了反切。"], ["非虚构文学", "非虚构文学是一种涵盖了纪实文学、新写实小说等文学形式的大文学类型，从属于我国20世纪以来蓬勃发展的写实主义文学思潮。它是一种从作品题材、内容和创作技巧上来区分的文学形态，既可以理解为文学的创作方法手段，也可以理解为一种文学创作的类型或文学样式。"], ["工匠精神", "工匠精神即有专长技艺的人对自己的作品要求极高，且对工作具备认真负责、精益求精、臻于至善的精神。工匠精神是从业者职业行为的体现，敬业、精益的工匠职业精神值得每位从业者将其作为自己的职业价值取向。"], ["胡服", "胡服，一般指汉民族以外各少数民族和北方各族胡人的服饰，其典型的搭配特点是贴身短衣配长裤革靴。之后在秦汉、唐宋等时期，胡服在统治者的意愿或当代民俗的影响下，融入了不同文化及风格，得以发展和传承。"], ["岭南文化", "岭南指五岭之南，五岭指越城岭、都庞岭、萌渚岭、骑田岭、大庾岭五座山岭。岭南文化是中华民族传统文化中最具特色和活力的地域文化之一，属于原生型的地域文化。其以农业文化和海洋文化为源头，发展过程中不断吸取和融汇中原文化和海外文化，逐渐形成自身独有的特点。岭南文化务实、开放、兼容、创新。它由三大部分构成：一是固有的本土文化；二是南迁的中原文化；三是舶来的域外文化。"], ["毛诗", "《毛诗》指战国末年时期毛亨和毛苌所辑和注的古文《诗》，流行的《诗经》由此而来。《毛诗》采用古文，故研究此学的被称为古文经学。"], ["女排精神", "女排精神，是中国女子排球队顽强战斗、勇敢拼搏精神的高度概括。中国女排在1981年至1986年缔造了世界排球比赛历史上第一个“五连冠”，而后又在世界杯、奥运会等获得冠军。截至2021年，共获得十次冠军。女排姑娘们在赛场上展现的高超球技与积极向上的精神面貌深深感染着中国人民。2021年9月，女排精神被纳入第一批中国共产党人精神谱系。"], ["三军", "古代的“三军”是周代的军制，天子有六军，诸侯有三军，有的诸侯称上、中、下三军，有的称左、中、右三军。现代的“三军”指海、陆、空三军。"], ["散曲", "散曲是在中国北方民歌基础上，吸收了女真、蒙古等少数民族乐曲而形成的一种可以入乐的新诗体，兴起于元代。按音乐内容划分，散曲可分为北曲和南曲。北曲音乐吸收了北方游牧民族的音乐、词乐和北方民间音乐。南曲则源自南方民间乐曲和传统词乐。"], ["善本", "善本指内容较好，刻印、校勘精良，错误较少，珍贵难得的古书刻本、写本，如旧刻本、精抄本、精校本、手稿、旧拓碑帧，以及印数极少的稀有图书等。它们通常具有历史文物性、艺术代表性或学术资料性。"], ["庶族", "庶族，也称“寒门”，是指士族以外的中小地主。由于生活长期的奢侈腐化，在政治上占主导地位的士族逐渐衰弱，与此同时，许多担任武职的庶族，在战争中奋勇表现，不断取得优异战绩，逐渐掌握军权，以军权为依托进而取得政权。士族与庶族势力此消彼长在一定程度上是魏晋及南朝的朝代更替的原因。"], ["随类赋彩", "“随类赋彩”出自南朝谢赫《古画品录》序文。其意是指作者应该根据不同类型的对象敷施色彩，以求得真实、客观地加以表现。它与气韵生动、骨法"], ["唐代三绝", "唐文宗把“裴旻剑舞”“李白诗歌”“张旭草书”并称为“唐代三绝”。李白的诗雄奇豪放，想象丰富，语言流转自然，音律和谐多变。张旭的草书如龙蚪腾霄，雄强而不失清雅。颜真卿赞叹裴旻的剑舞“剑舞若游电，随风萦且回”、“入阵破骄虏，威名雄震雷”。"], ["饕餮纹", "饕餮纹是商周青铜器上广泛使用的一种兽面纹样，以臣字目、直鼻梁、咧口、额间有冠状饰、面目狰狞为主要特征。因其形状如同兽面，故也称“兽面纹”。首先采用“饕餮纹”这个名称的是宋代的《宣和博古图》。"], ["挽歌", "挽歌即哀悼死者的诗歌，是古人送葬时所唱的歌，由乐曲和歌词两部分组成。春秋战国时期，挽歌已经产生。汉魏以后，唱挽歌成为朝廷规定的丧葬礼俗之一。与此同时，挽歌开始冲破哀悼的樊篱，至六朝时，唱挽歌成为一时之风尚，许多名士借此显示其蔑视礼法、潇洒不羁的态度。他们借挽歌独特的悲哀情调和凄丽风格表达以悲为美的美学观念，同时也展示出独特的生存哲学。"], ["文化遗产", "文化遗产是一个民族在过去时代所遗留下来的物质财富和精神财富的总和，包括物质的、精神的和心理的三个层面的内容。物质的内容指已成为历史或陈迹的文化留给现有文化的各种典籍、建筑、文物、艺术品等实物性的遗留；精神的内容是指凝结在这些实物性遗留中的文化精神，具体表现为特定的道德、哲学、科学、艺术和宗教；心理的内容是指文化在自身的发展过程中长期积淀而成的文化心理结构，影响着现在人们的生存方式、风俗习惯、语言操作等。"], ["文物", "文物是人类社会历史发展进程中遗留下来的，由人类创造或与历史上人类活动有关的具有历史、艺术、科学价值的一切物质遗存的总称。它的基本特征是：第一，必须是由人类创造的，或者是与人类活动有关的；第二，必须是已经成为历史的过去，不可能再重新创造的。"], ["文学批评", "文学批评是从文学鉴赏的角度出发，以文学理论为依据，对文学作品进行分析、研究、评价的一种文学活动。正确的文学批评能够推动文学的创造与传播。"], ["小学", "小学是官学名，即对儿童、少年实施初等教育的学校，始设置于西周时期。其后各代延续，但名称不一，官学如四门小学、内小学等，私学如书馆、蒙馆、义塾等。小学还是汉代文字训诂学的专称。"], ["写本", "写本也称“抄本”，即用手抄写而成的书。唐以后，刻本渐行，就称手写的本子为抄本。因此，唐及唐代以前多称“写本”，唐以后多称“抄本”。"], ["优贡", "优贡是清代科举制度五贡（恩贡、拔贡、副贡、岁贡、优贡）中的一种。每三年各省学政于府、州、县在学生员中选拔文行俱优者，与督抚会考核定数名，贡入京师国子监，称为优贡生。优贡生经朝考合格后可任职。"], ["元曲", "元曲是一种新兴的韵文文学，代表了元代戏剧文学的主要成就。其形式近于宋词，用长短句，但格律较自由、语言通俗。元曲包括元杂剧和散曲两部分。元杂剧形式精炼、体制严整。散曲是在中国北方民歌基础上，吸收了女真、蒙"], ["中国风", "中国风即中国风格，是指一些事物包含了大量中国传统文化中的元素并适应当代全球流行趋势的现象。中国风现已在服饰、音乐等多个领域应用。"], ["奥斯卡金像奖", "奥斯卡金像奖始创于1929年，是美国历史最为悠久、最具权威性和专业性的电影类奖项，也是全世界最具影响力的电影类奖项。奥斯卡金像奖每年举办一届，一般于2月至4月在好莱坞杜比剧院举行，备受全世界瞩目。"], ["歌舞伎", "歌舞伎是日本独有的一种戏剧。它是日本典型的民族表演艺术，起源于1603年出云巫女阿国赴京表演的念佛舞，后改由男子扮演。其发展前期吸收了“能乐”“傀儡剧”和日本民间歌舞的表演艺术和曲调，逐渐形成戏剧形式。明治时代后，日本留洋归国的知识分子和执政者们把歌舞伎当成日本文化的代表。2005年，歌舞伎被列入《非物质文化遗产名录》。"], ["格莱美奖", "格莱美奖创办于1958年，是美国国家录音与科学学会在美国主办的音乐类奖项，其奖杯形状如一架老式的留声机。格莱美奖涵盖流行、摇滚、R&B、说唱、爵士、福音、乡村、拉丁、古典等音乐类型，最重要的奖项是年度专辑奖、年度制作奖、年度歌曲奖和最佳新人奖。"], ["令和", "令和是日本在2019年宣布的新年号，它是第一个从日本古籍里选取的年号，其出处是《万叶集·梅花歌卅二首并序》中的“于时初春令月，气淑风和”一句。令和中的“令”寓意美好，“和”意为顺利。"], ["摩斯码", "摩斯码即摩尔斯电码、摩斯密码，是通过不同的信号顺序来表达不同的英文字母、数字和标点符号的信号代码。摩斯码发明于1837年，属早期的数字化通信形式。它的代码通常包括：点、划、点和划之间的停顿、每个字符之间短的停顿、每个词之间中等的停顿以及句子之间长的停顿。"], ["轻音乐", "轻音乐，又叫“情调音乐”，诞生于英国。轻音乐一般以小型乐队加以演奏，结构简单、节奏明快、旋律优美，可以是原创的也可以是对其他音乐的改编。轻音乐是对古典音乐和流行音乐二者的一个平衡，可谓雅俗共赏。"], ["舞台艺术", "狭义的舞台艺术指舞台美术，包括布景、灯光、化妆、服装、效果、道具等。广义的舞台艺术亦称戏剧艺术，泛指一切在舞台的空间里展示的艺术形式，包括表演艺术、舞台美术等，有别于戏剧的文学部分。"], ["嬉皮士", "嬉皮士是英语Hippie或Hippy的音译词，指20世纪60年代中后期出现在西方的一类颓废派青年。他们由于对现实不满而采取玩世不恭的态度，如蓄长发、穿奇装异服等。"], ["喜剧", "狭义上的喜剧是戏剧的一种类型，一般以嘲讽丑恶、庸俗或落后的社会现象，肯定美好、进步的现实或理想为主要内容。广义上的喜剧是审美范畴之一，与悲剧相对应，是美学研究的重要课题之一。"], ["叙事艺术", "叙事艺术是指讲述一个故事的艺术，讲述者根据不同的寓意，用数量不等的情节，按照一定的次序，以流动的形式来加以连贯地表述，包含了叙事手法和情节结构手法。叙事艺术的关键是善用叙事方式，从准确的视角切入，进行合理的架构和时空安排，运用技术和艺术手段，完成故事的讲述。"], ["语义场", "语义场是通过词与词之间的对比，根据它们词义的共同特点或关系划分类别的体系。"], ["纸草文书", "纸草文书是地中海沿岸地区的古代文献资料，最早见于公元前3000年的古埃及文明初期。纸草是盛产于尼罗河下游的一种水生植物，古埃及人将纸草茎秆剖切成薄片制成书写的材料，称纸草纸。埃及纸草文书是用象形文字书写的，记录了许多有关数学的问题。"], ["辩诉交易", "辩诉交易指的是被告人的辩护律师和检察官在开庭前针对就被告人的定罪进行协商，以此来让检察官撤销、降低指控或者减轻量刑，且被告人做有罪答辩的一种行为。辩诉交易起源于美国，这种做法的主要优点是可以节约司法资源，提高办案效率，同时被告人也一定程度上减轻了刑罚，对双方都有利。"], ["法律关系", "法律关系是法律规范在调整人们行为的过程中形成的一种特殊的权利和义务关系，即法律上的权利义务关系，包括法律关系的主体、法律关系的客体和法律关系的内容三个要素。法律关系是以国家强制力作为保障的。"], ["国际法", "国际法，即国际公法，是以国家间关系为主要调整对象的，对国家具有法律拘束力的原则、规则和制度的总和。国际法的主体是国家而不是个人，且没有统一的超越国家的立法机关和强制执行机构，而是通过国家间的协议来制定、修改和施行。"], ["国家赔偿", "依据《中华人民共和国国家赔偿法》，国家赔偿指的是在国家机关和国家机关工作人员行使职权的过程中，如果公民、法人和其他组织合法权益受到侵犯，造成损害的，受害人可依据该法律，获得国家的赔偿。《中华人民共和国国家赔偿法》规定，国家赔偿包括行政赔偿、刑事赔偿。"], ["继承权", "继承权是指继承人依法承受被继承人遗产的权利。法定继承人或经被继承人于遗嘱指定继承的人，均享有继承权。继承权的主体只能是自然人。继承权是一种财产权，通过继承实现财产所有权的转移。"], ["宽严相济", "宽严相济通常被作为一个法律词汇使用。宽严相济强调的主体精神是：对待违法犯罪行为，宽与严不是对立的，而是相互结合、寻求平衡的，要力求做到严中有宽、宽以济严，宽中有严、严以济宽。2005年12月召开的全国政法工作会议明确，宽严相济是我们在维护社会治安的长期实践中形成的基本刑事政策。50"], ["人格权", "根据《中华人民共和国民法典》第九百九十条规定：“人格权是民事主体享有的生命权、身体权、健康权、姓名权、名称权、肖像权、名誉权、荣誉权、隐私权等权利。除前款规定的人格权外，自然人享有基于人身自由、人格尊严产生的其他人格权益。”"], ["生物安全法", "《中华人民共和国生物安全法》由十三届全国人大常委会第二十二次会议表决通过。这部法律自2021年4月15日起施行。生物安全法聚焦生物安全领域主要风险，完善生物安全风险防控体制机制，着力提高国家生物安全治理能力。生物安全法明确了生物安全的重要地位和原则，规定生物安全是国家安全的重要组成部分。51"], ["伪证罪", "依据《中华人民共和国刑法》规定，伪证罪是指在刑事诉讼中，证人、鉴定人、记录人和翻译人对与案件有重要关系的情节，故意作虚假证明、鉴定、记录、翻译，意图陷害他人或者隐匿罪证的行为。"], ["无因管理", "无因管理指没有法定的或约定的义务，为避免他人利益受损失，自愿管理他人事务或为他人提供服务的行为。根据《中华人民共和国民法典》第九百七十九条规定，“管理人没有法定的或者约定的义务，为避免他人利益受损失而管理他人事务的，可以请求受益人偿还因管理事务而支出的必要费用；管理人因管理事务受到损失的，可以请求受益人给予适当补偿。”"], ["应急预案", "根据《突发事件应急预案管理办法》的规定，应急预案是指各级人民政府及其部门、基层组织、企事业单位、社会团体等为依法、迅速、科学、有序应对突发事件，最大程度减少突发事件及其造成的损害而预先制定的工作方案。"], ["自由裁量权", "自由裁量权是指司法、税务、行政机关及其工作人员在法律法规规定的范围内，自行选择作出决定的权力。自由裁量权过大或使用不当，不仅严重影响法律法规、国家政策的执行，也影响国家机关的形象和权威。"], ["八达岭长城", "八达岭长城位于北京市延庆区军都山关沟古道北口，是中国古代伟大的防御工程万里长城的重要组成部分，是明长城的一个隘口。其地势险要，构筑雄伟，自古以来便是“拱卫陵京”的军事战略要地。八达岭长城为居庸关的重要前哨，古称“居庸之险不在关，而在八达岭”。"], ["明十三陵", "明十三陵位于北京以北30公里的昌平区境内。因明成祖朱棣及以后共计13位皇帝的陵墓建在这里，构成庄严有序的整体布局，故名“明十三陵”。2003年，明十三陵被列为世界文化遗产。53"], ["弄堂", "弄堂，即小巷，是上海和江浙地区特有的民居形式，它是由连排的老房子（包括石库门）所构成的，并与石库门建筑有着密切的关系。它代表近代上海城市文化的特征，创造了形形色色风情独具的弄堂文化。弄堂的行行种种、弄堂的性感、弄堂的感动，它已经成为上海城市的华丽的背景色。弄堂作为休闲娱乐、儿童活动、交易等活动的场所。弄堂可分为广式里弄、新式石库门里弄、新式里弄、花园式里弄等形式。54"], ["日照间距", "日照间距是一种常应用于建筑领域的概念，指的是在前后两栋建筑物之间满足特定日照条件的最小间隔距离。不同建筑类型对应的日照间距要求不同。"], ["四合院", "四合院，是一种传统的合院式建筑，有着三千多年的历史，因其格局为“正房、倒座房、东西厢房围绕中间庭院”而被称为四合院，其中北京四合院最为典型，体现了中国传统的等级思想。"], ["退思园", "退思园是清朝官员任兰生被罢官后返回家乡后建造的，位于江苏省苏州市，集多功能于一体。中部庭院和院南都可以用作待客，花园可赏花游玩，院北可作客房。园区小巧精致，风景优美，是多部影视剧的采景之地。2001年退思园被国务院列为第五批全国重点文物保护单位。"], ["悉尼歌剧院", "悉尼歌剧院位于悉尼市区北部，是一个大型的综合性文艺演出中心，也是澳大利亚的地标建筑，由丹麦建筑师约恩·乌松设计。其外形像巨大的贝壳，也像迎风的帆，内部建筑结构则是仿效玛雅文化和阿兹特克神庙，是20世纪最具特色的建筑之一。2007年，悉尼歌剧院被联合国教科文组织列入《世界遗产名录》。"], ["抗生素", "抗生素是在低浓度下就能选择性地抑制某些生物生命活动的微生物次级代谢产物及其化学半合成或全合成的衍生物。1928年，英国科学家弗莱明首先发现青霉素。抗生素的作用范围广，对细菌、病毒、真菌甚至肿瘤都可起到抑制或杀灭作用。但对抗生素的滥用会产生严重的后果，如超级耐药菌的出现会严重威胁人类的健康。"], ["门诊共济", "门诊共济，指的是医保参保人的门诊费用原来基本是靠个人账户解决，现在通过”共济“统筹报销。2021年4月25日，国务院常务会此前审议通过了《关于建立健全职工基本医疗保险门诊共济保障机制的指导意见》，改革政策主要有三个方面：一是建立普通门诊统筹，逐步将门诊里多发病、常见病纳入医保统筹基金报销。二是加强慢性病、特殊疾病的门诊保障，将费用高、治疗周期长的疾病门诊费用也逐步纳入门诊保障范围。对部分门特、慢病、大病的相关治疗，在门诊看，但是按住院的政策管理。三是参保人除了在定点医疗机…"], ["长期护理险", "长期护理保险于2016年开始试点，是一项以长期处于失能状态的参保人群为保障对象、重点解决重度失能老人基本护理服务需求的社会保险制度，也被称为社保“第六险”。56"], ["方舱医院", "“方舱医院”是解放军野战机动医疗系统的一种，由若干可以移动的模块建成。这些模块可以是真正的房屋，也可以是帐篷等可以临时搭建的处所，在"], ["突发公共卫生事件", "根据《突发公共卫生事件应急条例》第二条，突发公共卫生事件是指突然发生，造成或者可能造成社会公众健康严重损害的重大传染病疫情、群体性不明原因疾病、重大食物和职业中毒以及其他严重影响公众健康的事件。"]];
