<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>南昌大学 · MTI 上岸日志</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#f3efe6;--side:#efe9dd;--card:#fdfcf8;--green:#2e4a38;--green2:#27402f;--rust:#bf5130;--ink:#2d2a23;--mut:#938c7c;--line:#e4ddcd;--sh:0 1px 2px rgba(60,50,30,.05),0 8px 22px rgba(60,50,30,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC",-apple-system,"PingFang SC",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
.serif{font-family:"Noto Serif SC",serif}
.layout{display:flex;min-height:100vh}
.side{width:236px;flex:none;background:var(--side);border-right:1px solid var(--line);padding:26px 20px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{font-family:"Noto Serif SC",serif;font-weight:700;font-size:19px;letter-spacing:1px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.logo small{display:block;font-size:11px;font-style:italic;color:var(--mut);font-weight:500;letter-spacing:.5px;margin-top:5px;line-height:1.5}
nav{margin-top:18px;display:flex;flex-direction:column;gap:3px;flex:1}
.nav{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:11px;cursor:pointer;font-size:14px;color:var(--ink);transition:.15s}
.nav:hover{background:rgba(46,74,56,.07)}
.nav.on{background:var(--green);color:#f3efe6;box-shadow:0 6px 16px rgba(46,74,56,.25)}
.nav svg{width:17px;height:17px;flex:none;opacity:.85}
.count{margin-top:14px;padding-top:16px;border-top:1px solid var(--line)}
.count .lab{font-size:11px;color:var(--mut);letter-spacing:1px}
.count .d{font-family:"Noto Serif SC",serif;font-size:38px;font-weight:700;color:var(--rust);line-height:1}
.count .d small{font-size:13px;color:var(--mut);font-weight:400;margin-left:4px}
.count .ex{font-size:11px;color:var(--mut);margin-top:6px}
main{flex:1;padding:30px 40px 60px;max-width:1000px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.date{color:var(--rust);font-size:13px;font-weight:500;margin-bottom:8px}
h1{font-family:"Noto Serif SC",serif;font-size:32px;font-weight:700;letter-spacing:1px}
.modes{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px}
.modes button{border:0;background:transparent;font-family:inherit;font-size:13px;color:var(--mut);padding:7px 15px;border-radius:8px;cursor:pointer}
.modes button.on{background:var(--ink);color:var(--paper)}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.gcard{background:var(--green);color:#eef2ec;border-radius:18px;padding:26px 28px;position:relative;overflow:hidden}
.gcard::after{content:"";position:absolute;right:-40px;top:-30px;width:180px;height:180px;border:1px solid rgba(255,255,255,.08);border-radius:50%}
.gcard .l{font-size:13px;opacity:.75;letter-spacing:1px}
.gcard .big{font-family:"Noto Serif SC",serif;font-size:62px;font-weight:700;line-height:1.1;margin:6px 0}
.gcard .big small{font-size:22px;opacity:.7}
.gcard .sub{font-size:13px;opacity:.8;margin-bottom:14px}
.gbar{height:7px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden}
.gbar i{display:block;height:100%;background:#e6a23c;border-radius:99px;transition:width .5s}
.rcol{display:flex;flex-direction:column;gap:16px}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.wcard .l{font-size:13px;color:var(--mut)}
.wcard .l .pt{color:var(--rust)}
.wcard .n{font-family:"Noto Serif SC",serif;font-size:34px;font-weight:700;margin-top:4px}
.wcard .n small{font-size:14px;color:var(--mut);font-weight:400}
.cta{background:var(--rust);color:#fff;border:0;border-radius:16px;padding:20px 22px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;text-align:left;box-shadow:0 10px 24px rgba(191,81,48,.25);transition:.15s}
.cta:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(191,81,48,.3)}
.streak{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.sdot{width:46px;height:46px;border-radius:50%;background:#f6ece4;color:var(--rust);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif SC",serif;font-size:20px;font-weight:700;flex:none}
.streak .t{font-size:14px}.streak .t small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.streak .pg{flex:1;text-align:right}
.streak .pg .nm{font-size:13px;color:var(--mut)}
.minibar{height:5px;background:var(--line);border-radius:99px;margin-top:6px;overflow:hidden}.minibar i{display:block;height:100%;background:var(--green);border-radius:99px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;cursor:pointer;transition:.15s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.stat .n{font-family:"Noto Serif SC",serif;font-size:30px;font-weight:700}
.stat .l{font-size:13px;margin-top:4px}
.stat .s{font-size:11px;color:var(--mut);margin-top:7px;letter-spacing:.5px}
.secttl{font-family:"Noto Serif SC",serif;font-size:22px;font-weight:700;margin-bottom:4px}
.sectsub{color:var(--mut);font-size:13px;margin-bottom:18px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-size:13px;padding:6px 14px;border:1px solid var(--line);background:var(--card);border-radius:99px;cursor:pointer;color:var(--mut)}
.chip.on{background:var(--green);color:#eef2ec;border-color:var(--green)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(166px,1fr));gap:11px}
.fc{height:122px;perspective:1000px;cursor:pointer}
.fci{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.75,.25,1);transform-style:preserve-3d}
.fc.flip .fci{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12px}
.ffr{background:var(--card);border:1px solid var(--line);box-shadow:var(--sh)}
.ffr .tm{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700}
.ffr .h{position:absolute;bottom:9px;font-size:10px;color:var(--mut);opacity:.7}
.ffb{transform:rotateY(180deg);background:var(--green);color:#eef2ec}
.ffb .an{font-size:13px;line-height:1.5}
.gr{display:flex;gap:6px;position:absolute;bottom:9px;left:10px;right:10px}
.gr button{flex:1;border:0;font-family:inherit;font-size:11px;padding:5px;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.2);color:#fff}
.fc.done .ffr{opacity:.45}
.fc.done .ffr::before{content:"\2713";position:absolute;top:8px;right:10px;color:var(--green);font-weight:700;font-size:13px}
.row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 18px;margin-bottom:9px;cursor:pointer;box-shadow:var(--sh)}
.row .rt{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700}
.row .ra{max-height:0;overflow:hidden;transition:max-height .3s;color:var(--mut);font-size:13.5px;line-height:1.7}
.row.show .ra{max-height:240px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.subj{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:0 13px 13px 0;padding:15px 18px;margin-bottom:10px}
.subj .h{display:flex;justify-content:space-between;align-items:baseline}
.subj .nm{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700}
.subj .w{color:var(--rust);font-size:13px;letter-spacing:1px}
.subj .d{color:var(--mut);font-size:13px;margin-top:5px;line-height:1.6}
.src{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin-bottom:10px}
.src .h{font-weight:700;font-size:14px;margin-bottom:6px}
.src .d{color:var(--mut);font-size:13px;line-height:1.7}
.src a{color:var(--green);text-decoration:none}
.warn{background:#faf3e8;border:1px solid #ecdcc0;border-radius:13px;padding:14px 18px;font-size:13px;color:#7a5a2a;line-height:1.7;margin-bottom:16px}
/* 抽背 overlay */
.ovl{position:fixed;inset:0;background:rgba(40,34,24,.55);display:none;align-items:center;justify-content:center;z-index:9;padding:20px}
.ovl.on{display:flex}
.quizbox{background:var(--paper);border-radius:22px;padding:26px;width:480px;max-width:100%;box-shadow:0 30px 70px rgba(0,0,0,.3)}
.quizbox .pg{font-size:13px;color:var(--mut);display:flex;justify-content:space-between;margin-bottom:14px}
.qcard{height:200px;perspective:1200px;cursor:pointer;margin-bottom:16px}
.qcard .tm{font-family:"Noto Serif SC",serif;font-size:26px;font-weight:700}
.qbtns{display:flex;gap:10px}
.qbtns button{flex:1;border:0;font-family:inherit;font-size:15px;padding:13px;border-radius:13px;cursor:pointer}
.qno{background:#f0e6dd;color:var(--rust)}.qyes{background:var(--green);color:#fff}
.qclose{position:absolute;top:18px;right:20px;cursor:pointer;color:#fff;font-size:24px}
.hidden{display:none}
@media(max-width:760px){.side{display:none}.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}main{padding:20px}}
.sb{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;margin-right:7px;font-weight:500;vertical-align:1px}
.fc{position:relative}
.fcb{position:absolute;top:7px;left:9px;z-index:3;font-size:9px;padding:1px 6px;border-radius:5px;font-weight:500;pointer-events:none}
.grm{display:flex;gap:8px;margin-top:11px}
.grm button{flex:0 0 auto;min-width:96px;border:0;font-family:inherit;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer}
.grm .yes{background:var(--green);color:#fff}.grm .no{background:#f0e6dd;color:var(--rust)}
</style>

 +'<div class="streak"><div class="sdot">'+st.streak+'</div><div class="t">连续打卡 '+st.streak+' 天<small>保持住，别断更</small></div><div class="pg"><div class="nm">今日已背 '+st.todayCount+' · 错题 '+c.mist+'</div><div class="minibar"><i style="width:'+Math.min(100,Math.round(st.todayCount/30*100))+'%"></i></div></div></div>'
 +'<div class="stats">'
 +'<div class="stat" data-v="ci"><div class="n">'+CI.length+'</div><div class="l">357 高频词条</div><div class="s">缩略·时政·经济·文化·术语</div></div>'
 +'<div class="stat" data-v="ms"><div class="n">'+MS.length+'</div><div class="l">百科名词解释</div><div class="s">文·史·哲·政·经·法</div></div>'
 +'<div class="stat" data-v="mist"><div class="n">'+c.mist+'</div><div class="l">错题本</div><div class="s">标「再看」自动收集</div></div>'
 +'<div class="stat" data-v="subj"><div class="n">8</div><div class="l">学科考点体系</div><div class="s">八大学科·中外并重</div></div>'
 +'</div>';}
function bindDash(){var b=document.getElementById('startBtn');if(b)b.onclick=openQuiz;var ss=document.querySelectorAll('.stat');for(var i=0;i<ss.length;i++)ss[i].onclick=function(){go(this.getAttribute('data-v'));};}

function ciView(){var cats=['全部','缩略语','时政','经济','文化科技','翻译术语'];var chips=cats.map(function(cc){return '<span class="chip'+(cc===ciFilter?' on':'')+'" data-c="'+cc+'">'+cc+'</span>';}).join('');chips+='<span class="chip'+(ciDueOnly?' on':'')+'" id="dueChip" style="margin-left:auto">只看待复习</span>';var list=POOL.filter(function(x){return x.type==='词条'&&(ciFilter==='全部'||x.cat===ciFilter)&&(!ciDueOnly||due0(x.key));});return '<div class="sectsub">'+list.length+' 张 · 点卡翻面；标「会了」按艾宾浩斯排下次复习，标「再看」进错题本</div><div class="chips">'+chips+'</div><div class="cards" id="cig">'+list.map(flashHtml).join('')+'</div>';}
function bindCI(){var ch=document.querySelectorAll('.chip[data-c]');for(var i=0;i<ch.length;i++)ch[i].onclick=function(){ciFilter=this.getAttribute('data-c');render();};var dc=document.getElementById('dueChip');if(dc)dc.onclick=function(){ciDueOnly=!ciDueOnly;render();};document.getElementById('cig').addEventListener('click',function(e){var g=e.target.closest('.gr button');var fc=e.target.closest('.fc');if(g&&fc){grade(fc.getAttribute('data-k'),g.className==='yes');render();return;}if(fc)fc.classList.toggle('flip');});}

function msView(){var list=POOL.filter(function(x){return x.type==='名解';});return '<div class="sectsub">'+list.length+' 条 · 点开看答案，按「会了/再看」记忆并排期</div><div id="msg">'+list.map(function(x){return rowHtml(x);}).join('')+'</div>';}
function mistView(){var list=mistListF();if(!list.length)return '<div class="warn">还没有错题 🎉　在词条/名解里点「再看」的卡片会自动收进这里，方便你集中攻克。</div>';return '<div class="sectsub">'+list.length+' 个易错点（按错次排序）· 攻克后点「会了」升级移出</div><div id="mig">'+list.map(function(x){return rowHtml(x,'<span class="sb" style="background:#fde8e0;color:#bf5130">错'+st.srs[x.key].lapse+'次</span>');}).join('')+'</div>';}
function bindRows(id){var el=document.getElementById(id);if(!el)return;el.addEventListener('click',function(e){var g=e.target.closest('.grm button');var row=e.target.closest('.row');if(g&&row){grade(row.getAttribute('data-k'),g.className==='yes');render();return;}if(row)row.classList.toggle('show');});}

var queue=[],qi=0;
function openQuiz(){queue=dueList().slice();queue.sort(function(){return Math.random()-0.5;});qi=0;if(!queue.length){alert('今天没有到期要复习的卡了，太棒了 🎉');return;}document.getElementById('ovl').classList.add('on');renderQuiz();}
function closeQuiz(){document.getElementById('ovl').classList.remove('on');render();}
window.closeQuiz=closeQuiz;
function renderQuiz(){var box=document.getElementById('quizbox');if(qi>=queue.length){box.innerHTML='<div style="text-align:center;padding:30px 0"><div class="serif" style="font-size:24px;font-weight:700">本轮抽背完成 🎉</div><div style="color:var(--mut);margin:10px 0 20px">掌握度与复习排期已更新</div><button class="qyes" style="padding:12px 24px;border:0;border-radius:12px;color:#fff;cursor:pointer" id="qdone">回到仪表盘</button></div>';document.getElementById('qdone').onclick=closeQuiz;return;}var x=queue[qi];box.innerHTML='<div class="pg"><span>今日抽背 · '+x.type+'</span><span>'+(qi+1)+' / '+queue.length+'</span></div><div class="qcard fc" id="qc"><div class="fci"><div class="ff ffr"><span class="tm">'+esc(x.q)+'</span><span class="h">点击看答案</span></div><div class="ff ffb" style="background:'+ccolor(x)+';padding:20px"><span class="an" style="font-size:15px">'+esc(x.a)+'</span></div></div></div><div class="qbtns"><button class="qno" id="qno">再看（进错题本）</button><button class="qyes" id="qyes">会了（排下次复习）</button></div>';document.getElementById('qc').onclick=function(){this.classList.toggle('flip');};document.getElementById('qyes').onclick=function(){grade(x.key,true);qi++;renderQuiz();};document.getElementById('qno').onclick=function(){grade(x.key,false);qi++;renderQuiz();};}

function initCountdown(){var EXAM=new Date(2026,11,19);var d=Math.max(0,Math.ceil((EXAM-new Date())/86400000));document.getElementById('cdn').innerHTML=d+'<small>天</small>';var wk=['日','一','二','三','四','五','六'];var n=new Date();document.getElementById('date').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+wk[n.getDay()];}
document.getElementById('nav').addEventListener('click',function(e){var n=e.target.closest('.nav');if(n)go(n.getAttribute('data-v'));});
initCountdown();setNav();render();cloudPull(function(){render();});

</script>
