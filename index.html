function ds(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function NEW(k){return !st.srs[k];}
function DUE(k){var r=st.srs[k];return !!r&&r.due<=Date.now();}
function due0(k){return NEW(k)||DUE(k);}
function tickStudy(){var t=ds(new Date());if(st.todayDay!==t){var y=new Date();y.setDate(y.getDate()-1);st.streak=(st.lastDay===ds(y)||st.lastDay==='')?(st.streak+1):1;st.todayDay=t;st.todayCount=0;st.lastDay=t;}st.todayCount++;}
function grade(k,ok){var r=st.srs[k]||{l:0,due:0,lapse:0};if(ok){r.l=Math.min(6,(r.l||0)+1);r.due=Date.now()+INT[Math.min(INT.length-1,r.l)]*86400000;}else{r.lapse=(r.lapse||0)+1;r.l=Math.max(0,(r.l||0)-1);r.due=Date.now()+600000;}st.srs[k]=r;tickStudy();save();}
function save(){localStorage.setItem(SKEY,JSON.stringify(st));cloudPush();}
function cloudPush(){if(!sb)return;sb.from('progress').upsert({id:SB_ID,payload:st,updated_at:new Date().toISOString()}).then(function(r){if(r&&r.error)console.warn(r.error.message);});}
function cloudPull(cb){if(!sb){cb&&cb();return;}sb.from('progress').select('payload').eq('id',SB_ID).maybeSingle().then(function(r){try{if(r&&r.data&&r.data.payload){st=Object.assign({},st,r.data.payload);st.srs=st.srs||{};localStorage.setItem(SKEY,JSON.stringify(st));}}catch(e){}cb&&cb();}).catch(function(){cb&&cb();});}

function counts(){var c={total:POOL.length,master:0,due:0,mist:0};POOL.forEach(function(x){var r=st.srs[x.key];if(!r){c.due++;}else{if(r.l>=4)c.master++;if(r.due<=Date.now())c.due++;if(r.lapse>0)c.mist++;}});return c;}
function dueList(){return POOL.filter(function(x){return due0(x.key);});}
function mistListF(){return POOL.filter(function(x){var r=st.srs[x.key];return r&&r.lapse>0;}).sort(function(a,b){return st.srs[b.key].lapse-st.srs[a.key].lapse;});}
function sbadge(k){if(NEW(k))return '<span class="sb" style="background:#ece9f6;color:#5548b8">新</span>';var r=st.srs[k];if(r.due<=Date.now())return '<span class="sb" style="background:#fde8e0;color:#bf5130">待复习</span>';if(r.l>=4)return '<span class="sb" style="background:#e3f4ee;color:#0c6e52">已掌握 Lv'+r.l+'</span>';return '<span class="sb" style="background:#f0ece2;color:#8a8578">Lv'+r.l+'</span>';}
function cbadge(k){if(NEW(k))return '';var r=st.srs[k];if(r.due<=Date.now())return '<span class="fcb" style="background:#fde8e0;color:#bf5130">待复习</span>';if(r.l>=4)return '<span class="fcb" style="background:#e3f4ee;color:#0c6e52">Lv'+r.l+'</span>';return '<span class="fcb" style="background:#f0ece2;color:#8a8578">Lv'+r.l+'</span>';}
function ccolor(x){return x.type==='名解'?'#b06d12':'#0d9488';}

var cur='dash';var ciFilter='全部';var ciDueOnly=false;
function setNav(){document.getElementById('nav').innerHTML=NAV.map(function(n){return '<div class="nav'+(n[0]===cur?' on':'')+'" data-v="'+n[0]+'">'+IC[n[0]]+'<span>'+n[1]+'</span></div>';}).join('');}
function go(v){cur=v;ciFilter='全部';ciDueOnly=false;setNav();render();window.scrollTo(0,0);}

function flashHtml(x){var k=x.key;return '<div class="fc" data-k="'+esc(k)+'">'+cbadge(k)+'<div class="fci"><div class="ff ffr"><span class="tm">'+esc(x.q)+'</span><span class="h">点击翻面</span></div><div class="ff ffb" style="background:'+ccolor(x)+'"><span class="an">'+esc(x.a)+'</span><div class="gr"><button class="yes">会了</button><button class="no">再看</button></div></div></div></div>';}
function rowHtml(x,extra){var k=x.key;return '<div class="row" data-k="'+esc(k)+'"><div class="rt">'+(extra||'')+sbadge(k)+esc(x.q)+'</div><div class="ra">'+esc(x.a)+'<div class="grm"><button class="yes">会了</button><button class="no">再看</button></div></div></div>';}

function render(){var h1=document.querySelector('h1');var v=document.getElementById('view');
 if(cur==='dash'){h1.textContent='今日，继续上岸。';v.innerHTML=dash();bindDash();}
 else if(cur==='ci'){h1.textContent='357 高频词条';v.innerHTML=ciView();bindCI();}
 else if(cur==='ms'){h1.textContent='名解精编';v.innerHTML=msView();bindRows('msg');}
 else if(cur==='mist'){h1.textContent='错题本';v.innerHTML=mistView();bindRows('mig');}
 else if(cur==='subj'){h1.textContent='448 八大学科';v.innerHTML='<div class="sectsub">百科 50 分的知识地图 · 中外并重</div>'+SUBJ.map(function(s){return '<div class="subj"><div class="h"><span class="nm">'+esc(s[0])+'</span><span class="w">'+s[1]+'</span></div><div class="d">'+esc(s[2])+'</div></div>';}).join('');}
 else if(cur==='essay'){h1.textContent='作文母题';v.innerHTML='<div class="sectsub">六大母题 · 各备人物事例＋金句＋时政案例</div>'+ESSAY.map(function(e){return '<div class="subj"><div class="nm">'+esc(e[0])+'</div><div class="d">'+esc(e[1])+'</div></div>';}).join('');}
 else if(cur==='src'){h1.textContent='资料 · 题源 · 出处';v.innerHTML=SRC.map(function(s){return '<div class="'+(s[0].indexOf('诚实')>-1?'warn':'src')+'"><div class="h">'+esc(s[0])+'</div><div class="d">'+esc(s[1])+'</div></div>';}).join('');}
}
function dash(){var c=counts();var pct=Math.round(c.master/c.total*100);
 return '<div class="grid2"><div class="gcard"><div class="l">总体掌握度</div><div class="big">'+pct+'<small>%</small></div><div class="sub">已掌握 '+c.master+' / '+c.total+'（复习对 4 次=掌握 · 按艾宾浩斯排期）</div><div class="gbar"><i style="width:'+pct+'%"></i></div></div>'
 +'<div class="rcol"><div class="wcard"><div class="l"><span class="pt">●</span> 待复习队列（今日到期）</div><div class="n">'+c.due+' <small>条</small></div></div>'
 +'<button class="cta" id="startBtn">▸ 开始今日抽背（'+c.due+'）</button></div></div>'
 +'<div class="streak"><div class="sdot">'+st.streak+'</div><div class="t">连续打卡 '+st.streak+' 天<small>保持住，别断更</small></div><div class="pg"><div class="nm">今日已背 '+st.todayCount+' · 错题 '+c.mist+'</div><div class="minibar"><i style="width:'+Math.min(100,Math.round(st.todayCount/30*100))+'%"></i></div></div></div>'
 +'<div class="stats">'
 +'<div class="stat" data-v="ci"><div class="n">'+CI.length+'</div><div class="l">357 高频词条</div><div class="s">缩略·时政·经济·文化·术语</div></div>'
 +'<div class="stat" data-v="ms"><div class="n">'+MS.length+'</div><div class="l">百科名词解释</div><div class="s">文·史·哲·政·经·法</div></div>'
 +'<div class="stat" data-v="mist"><div class="n">'+c.mist+'</div><div class="l">错题本</div><div class="s">标「再看」自动收集</div></div>'
 +'<div class="stat" data-v="subj"><div class="n">8</div><div class="l">学科考点体系</div><div class="s">八大学科·中外并重</div></div>'
 +'</div>';}
function bindDash(){var b=document.getElementById('startBtn');if(b)b.onclick=openQuiz;var ss=document.querySelectorAll('.stat');for(var i=0;i<ss.length;i++)ss[i].onclick=function(){go(this.getAttribute('data-v'));};}

function ciView(){var cats=['全部','缩略语','时政','经济','文化科技','翻译术语'];var chips=cats.map(function(cc){return '<span class="chip'+(cc===ciFilter?' on':'')+'" data-c="'+cc+'">'+cc+'</span>';}).join('');chips+='<span class="chip'+(ciDueOnly?' on':'')+'" id="dueChip" style="margin-left:auto">只看待复习</span>';var list=POOL.filter(function(x){return x.type==='词条'&&(ciFilter==='全部'||x.cat===ciFilter)&&(!ciDueOnly||due0(x.key));});return '<div class="sectsub">'+list.length+' 张 · 点卡翻面；标「会了」按艾宾浩斯排下次复习，标「再看」进错题本</div><div class="chips">'+chips+'</div><div class="cards" id="cig">'+list.map(flashHtml).join('')+'</div>';}
function bindCI(){var ch=document.querySelectorAll('.chip[data-c]');for(var i=0;i<ch.length;i++)ch[i].onclick=function(){ciFilter=this.getAttribute('data-c');render();};var dc=document.getElementById('dueChip');if(dc)dc.onclick=function(){ciDueOnly=!ciDueOnly;render();};document.getElementById('cig').addEventListener('click',function(e){var g=e.target.closest('.gr button');var fc=e.target.closest('.fc');if(g&&fc){grade(fc.getAttribute('data-k'),g.className==='yes');render();return;}if(fc)fc.classList.toggle('flip');});}

function msView(){var list=POOL.filter(function(x){return x.type==='名解';});return '<div class="sectsub">'+list.length+' 条 · 点开看答案，按「会了/再看」记忆并排期</div><div id="msg">'+list.map(function(x){return rowHtml(x);}).join('')+'</div>';}
function mistView(){var list=mistListF();if(!list.length)return '<div class="warn">还没有错题 🎉　在词条/名解里点「再看」的卡片会自动收进这里，方便你集中攻克。</div>';return '<div class="sectsub">'+list.length+' 个易错点（按错次排序）· 攻克后点「会了」升级移出</div><div id="mig">'+list.map(function(x){return rowHtml(x,'<span class="sb" style="background:#fde8e0;color:#bf5130">错'+st.srs[x.key].lapse+'次</span>');}).join('')+'</div>';}
function bindRows(id){var el=document.getElementById(id);if(!el)return;el.addEventListener('click',function(e){var g=e.target.closest('.grm button');var row=e.target.closest('.row');if(g&&row){grade(row.getAttribute('data-k'),g.className==='yes');render();return;}if(row)row.classList.toggle('show');});}

var queue=[],qi=0;
function openQuiz(){queue=dueList().slice();queue.sort(function(){return Math.random()-0.5;});qi=0;if(!queue.length){alert('今天没有到期要复习的卡了，太棒了 🎉');return;}document.getElementById('ovl').classList.add('on');renderQuiz();}
function closeQuiz(){document.getElementById('ovl').classList.remove('on');render();}
window.closeQuiz=closeQuiz;
function renderQuiz(){var box=document.getElementById('quizbox');if(qi>=queue.length){box.innerHTML='<div style="text-align:center;padding:30px 0"><div class="serif" style="font-size:24px;font-weight:700">本轮抽背完成 🎉</div><div style="color:var(--mut);margin:10px 0 20px">掌握度与复习排期已更新</div><button class="qyes" style="padding:12px 24px;border:0;border-radius:12px;color:#fff;cursor:pointer" id="qdone">回到仪表盘</button></div>';document.getElementById('qdone').onclick=closeQuiz;return;}var x=queue[qi];box.innerHTML='<div class="pg"><span>今日抽背 · '+x.type+'</span><span>'+(qi+1)+' / '+queue.length+'</span></div><div class="qcard fc" id="qc"><div class="fci"><div class="ff ffr"><span class="tm">'+esc(x.q)+'</span><span class="h">点击看答案</span></div><div class="ff ffb" style="background:'+ccolor(x)+';padding:20px"><span class="an" style="font-size:15px">'+esc(x.a)+'</span></div></div></div><div class="qbtns"><button class="qno" id="qno">再看（进错题本）</button><button class="qyes" id="qyes">会了（排下次复习）</button></div>';document.getElementById('qc').onclick=function(){this.classList.toggle('flip');};document.getElementById('qyes').onclick=function(){grade(x.key,true);qi++;renderQuiz();};document.getElementById('qno').onclick=function(){grade(x.key,false);qi++;renderQuiz();};}

function initCountdown(){var EXAM=new Date(2026,11,19);var d=Math.max(0,Math.ceil((EXAM-new Date())/86400000));document.getElementById('cdn').innerHTML=d+'<small>天</small>';var wk=['日','一','二','三','四','五','六'];var n=new Date();document.getElementById('date').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+wk[n.getDay()];}
document.getElementById('nav').addEventListener('click',function(e){var n=e.target.closest('.nav');if(n)go(n.getAttribute('data-v'));});
initCountdown();setNav();render();cloudPull(function(){render();});

</script>
</body>
</html>
